<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セイノデンキ CRM</title>
<style>
/* System fonts first - instant render, no network */
:root{
  --bg:#f4f3f1;--bg2:#ffffff;--bg3:#ede9e4;--bg4:#e6e0d8;
  --border:#d6cfc6;--border2:#c8bfb4;
  --text:#2c2620;--text2:#6b5e52;--text3:#a0917f;
  --accent:#4a7c5f;--accent2:#c5724a;--accent3:#8b6f47;
  --blue:#4872a8;--green:#3a7d52;--red:#b84040;
  --purple:#6b5fa0;--cyan:#3a8a8a;--yellow:#c8922a;
  --shadow:0 2px 12px rgba(44,38,32,.09);
  --shadow2:0 1px 4px rgba(44,38,32,.06);
  --radius:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);display:flex;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* SIDEBAR */
#sb{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo svg{flex-shrink:0}
.logo-t{font-size:13px;font-weight:900;color:var(--text)}
.logo-s{font-size:9px;color:var(--text3);letter-spacing:.06em}
#sb nav{padding:8px 7px;flex:1;overflow-y:auto}
.nb{width:100%;display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:7px;border:none;cursor:pointer;margin-bottom:1px;background:transparent;color:var(--text2);font-size:13px;font-family:inherit;font-weight:500;text-align:left;transition:background .12s,color .12s}
.nb:hover{background:var(--bg3);color:var(--text)}
.nb.on{background:rgba(74,124,95,.1);color:var(--accent);font-weight:700;box-shadow:inset 3px 0 0 var(--accent)}
.ni{font-size:13px;width:18px;text-align:center}
.nbc{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px}
.nsec{font-size:9px;color:var(--text3);letter-spacing:.07em;padding:8px 9px 3px;font-weight:700;margin-top:4px}
.sb-foot{padding:9px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);background:var(--bg3)}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:4px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* MAIN */
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;box-shadow:0 1px 3px rgba(44,38,32,.05)}
.tb-title{font-size:15px;font-weight:900;color:var(--text);flex:1}
#tbact{display:flex;gap:7px;align-items:center}
#ct{flex:1;overflow-y:auto;padding:18px}

/* INPUTS */
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,124,95,.1)}
select option{background:var(--bg2)}
textarea{resize:vertical}

/* BUTTONS */
.btn{padding:7px 13px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .13s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.bp{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 6px rgba(74,124,95,.2)}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bs{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.bs:hover{background:var(--bg4);color:var(--text)}
.bd{background:rgba(184,64,64,.08);color:var(--red);border:1px solid rgba(184,64,64,.2)}
.bd:hover{background:rgba(184,64,64,.16)}
.bg{background:rgba(58,125,82,.08);color:var(--green);border:1px solid rgba(58,125,82,.2)}
.bb{background:rgba(72,114,168,.08);color:var(--blue);border:1px solid rgba(72,114,168,.2)}
.bsm{padding:4px 8px;font-size:11px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow2)}
.ct{font-size:13px;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:15px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow2)}
.sl{font-size:10px;color:var(--text3);letter-spacing:.05em;margin-bottom:4px;font-weight:700}
.sv{font-size:21px;font-weight:900}
.ss{font-size:11px;color:var(--text3);margin-top:2px}

/* TABLE */
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3)}
th{padding:8px 11px;text-align:left;font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:9px 11px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover td{background:var(--bg3)}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bg-green{background:rgba(58,125,82,.1);color:var(--green)}
.bg-yellow{background:rgba(200,146,42,.1);color:var(--yellow)}
.bg-blue{background:rgba(72,114,168,.1);color:var(--blue)}
.bg-purple{background:rgba(107,95,160,.1);color:var(--purple)}
.bg-gray{background:rgba(160,145,127,.1);color:var(--text3)}
.bg-red{background:rgba(184,64,64,.1);color:var(--red)}
.bg-cyan{background:rgba(58,138,138,.1);color:var(--cyan)}
.tc{background:rgba(72,114,168,.1);color:var(--blue);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.ti{background:rgba(58,125,82,.1);color:var(--green);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.amt{font-size:14px;font-weight:900;color:var(--accent)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(44,38,32,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.mo{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(44,38,32,.16)}
.mo-lg{max-width:860px}
.mt{font-size:15px;font-weight:900;margin-bottom:16px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.fr{margin-bottom:11px}
.fl{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;font-weight:700}
.fr input,.fr select,.fr textarea{width:100%}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mf{display:flex;justify-content:flex-end;gap:7px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}

/* PROJ CARDS */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px;border-top:3px solid;box-shadow:var(--shadow2)}

/* TIMELINE */
.tli{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.tlic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* DETAIL */
.dg{display:grid;grid-template-columns:260px 1fr;gap:13px}
.ir{display:flex;gap:7px;align-items:flex-start;margin-bottom:8px}
.ik{font-size:10px;color:var(--text3);margin-bottom:1px;font-weight:700}
.iv{font-size:13px;color:var(--text2)}

/* TABS */
.tbar{display:flex;gap:2px;margin-bottom:12px;border-bottom:2px solid var(--border)}
.tbtn{padding:7px 13px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .13s}
.tbtn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

/* IMAGES */
.ig{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.ith{position:relative;border-radius:7px;overflow:hidden;aspect-ratio:1;background:var(--bg3);border:1px solid var(--border);cursor:pointer}
.ith img{width:100%;height:100%;object-fit:cover}
.ith .idl{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(184,64,64,.9);border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}
.ith:hover .idl{display:flex}

/* CALENDAR */
.gw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow2)}
.gh{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border)}
.gt{font-size:15px;font-weight:900;flex:1}
.gb{display:flex;overflow:hidden;max-height:600px}
.gdh{display:flex;border-bottom:1px solid var(--border);background:var(--bg3);position:sticky;top:0;z-index:5}
.gdh-c{flex:1;text-align:center;padding:6px 3px;border-right:1px solid var(--border);font-size:11px}
.gdh-c:last-child{border-right:none}
.gdh-dow{font-size:10px;color:var(--text3);font-weight:700}
.gdh-dn{font-size:16px;font-weight:900;line-height:1.1}
.gdh-dn.today{background:var(--accent);color:#fff;border-radius:50%;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.gev{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 4px;font-size:9.5px;font-weight:700;cursor:pointer;overflow:hidden;box-shadow:0 1px 3px rgba(44,38,32,.12);z-index:3;color:#fff}
.gnow{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:10;pointer-events:none}
.gnow::before{content:'';position:absolute;left:-4px;top:-4px;width:9px;height:9px;border-radius:50%;background:var(--red)}
.gcol{flex:1;border-right:1px solid var(--border);position:relative;cursor:pointer}
.gcol:last-child{border-right:none}
.ghr{height:48px;border-bottom:1px dashed rgba(44,38,32,.07)}
.gad{display:flex;min-height:26px;border-bottom:1px solid var(--border);background:rgba(74,124,95,.03)}
.gadc{flex:1;border-right:1px solid var(--border);padding:2px 3px;font-size:9px;cursor:pointer}
.gadc:last-child{border-right:none}
.mtbar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;margin-top:12px;box-shadow:var(--shadow2)}

/* QUOTE EDITOR items */
.qir{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px;margin-bottom:7px;position:relative}
.qia{font-size:11px;font-weight:700;color:var(--accent);text-align:right;padding:5px 7px;background:rgba(74,124,95,.07);border-radius:5px;border:1px solid rgba(74,124,95,.18)}
.qdb{position:absolute;top:7px;right:7px;width:17px;height:17px;border-radius:50%;background:rgba(184,64,64,.1);border:1px solid rgba(184,64,64,.25);color:var(--red);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qadd{width:100%;padding:6px;border-radius:6px;border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;transition:all .13s;display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:9px}
.qadd:hover{border-color:var(--accent);color:var(--accent)}
.qtp{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.qtr{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);padding:2px 0}
.qtr.grand{font-weight:900;font-size:14px;color:var(--accent);border-top:1px solid var(--border);padding-top:6px;margin-top:3px}

/* SUGGEST */
.sugg{position:relative}
.sugl{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:7px;box-shadow:var(--shadow);z-index:50;max-height:150px;overflow-y:auto;margin-top:2px;display:none}
.sugi{padding:7px 11px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px}
.sugi:hover{background:var(--bg3)}
.sugn{padding:7px 11px;cursor:pointer;font-size:12px;color:var(--accent);font-weight:700;border-top:1px solid var(--border)}
.sugn:hover{background:rgba(74,124,95,.07)}

/* CONFIRM */
.cov{position:fixed;inset:0;background:rgba(44,38,32,.45);z-index:300;display:flex;align-items:center;justify-content:center}
.cb{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:26px;max-width:340px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(44,38,32,.18)}

/* EMPTY */
.emp{text-align:center;padding:44px 20px;color:var(--text3)}

/* TOAST */
#toast{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:5px}
.tst{padding:9px 15px;border-radius:8px;font-size:13px;font-weight:500;animation:tin .25s ease;box-shadow:var(--shadow)}
.ts-ok{background:#eaf7f0;border:1px solid #7dbf9a;color:#2d6e4a}
.ts-er{background:#fdf0f0;border:1px solid #d98080;color:#8b3030}
.ts-in{background:#edf3fb;border:1px solid #7da8d4;color:#2c5080}
@keyframes tin{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}

/* PRINT */
@media print{
  @page{size:A4;margin:10mm 12mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}

/* ============================================================
   MOBILE (スマホ対応)
   ============================================================ */
@media (max-width: 768px){
  /* サイドバーを非表示にして全画面使う */
  #sb{
    position:fixed;top:0;left:0;width:260px;height:100vh;
    z-index:100;transform:translateX(-100%);transition:transform .25s ease;
    box-shadow:2px 0 16px rgba(44,38,32,.18);
  }
  #sb.open{ transform:translateX(0); }
  /* サイドバーオーバーレイ */
  #sb-ov{
    display:none;position:fixed;inset:0;background:rgba(44,38,32,.4);
    z-index:99;
  }
  #sb-ov.open{ display:block; }
  /* メインを全幅に */
  #mn{ width:100%;flex:1; }
  /* トップバー */
  #tb{ padding:0 12px;gap:6px; }
  .tb-title{ font-size:13px; }
  /* コンテンツ */
  #ct{ padding:10px;padding-bottom:calc(70px + env(safe-area-inset-bottom,0px)); }
  /* テーブルはスクロール */
  .tw{ overflow-x:auto; }
  /* カードグリッドを1列に */
  .sg{ grid-template-columns:1fr 1fr; }
  .pg{ grid-template-columns:1fr; }
  .dg{ grid-template-columns:1fr; }
  .fg{ grid-template-columns:1fr; }
  /* ハンバーガーボタン表示 */
  #mob-menu-btn{ display:flex; }
  /* モーダルをフルスクリーンに近く */
  .mo{ max-width:100%;margin:0; }
  .mo-lg{ max-width:100%; }
  /* テーブルのフォント縮小 */
  td,th{ padding:6px 8px;font-size:12px; }
}
@media (min-width:769px){
  #mob-menu-btn{ display:none; }
  #sb-ov{ display:none!important; }
}
</style>
</head>
<body>

<div id="sb-ov" onclick="toggleSb()"></div>
<div id="sb">
  <div class="logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="8" fill="#4a7c5f"/>
      <rect x="10" y="20" width="16" height="11" rx="1" fill="white" opacity=".95"/>
      <polygon points="18,7 7,20 29,20" fill="white"/>
      <rect x="15" y="24" width="6" height="7" rx="1" fill="#4a7c5f"/>
      <polygon points="21,9 17,17 20,17 16,25 23,15 20,15" fill="#a8d8a8" opacity=".9"/>
      <ellipse cx="27" cy="10" rx="3.5" ry="2.5" fill="#7ec87e" transform="rotate(-30 27 10)"/>
    </svg>
    <div>
      <div class="logo-t">セイノデンキ</div>
      <div class="logo-s">CRM v5.0</div>
    </div>
  </div>
  <nav id="sb-nav">
    <button class="nb on" data-page="dashboard"><span class="ni">◈</span>ダッシュボード</button>
    <button class="nb" data-page="customers"><span class="ni">👥</span>顧客管理<span class="nbc" id="bc-c">0</span></button>
    <button class="nb" data-page="projects"><span class="ni">⚡</span>案件・工事管理<span class="nbc" id="bc-p">0</span></button>
    <button class="nb" data-page="quotes"><span class="ni">📄</span>見積・請求管理<span class="nbc" id="bc-q">0</span></button>
    <button class="nb" data-page="schedule"><span class="ni">📅</span>スケジュール</button>
    <button class="nb" data-page="settings"><span class="ni">⚙️</span>設定</button>
    <div class="nsec" style="cursor:pointer;display:flex;justify-content:space-between" onclick="toggleDM()">
      データ管理<span id="dm-arr" style="transition:transform .2s">▶</span>
    </div>
    <div id="dm" style="display:none">
      <button class="nb" onclick="exportCSV('customers')"><span class="ni">📤</span>顧客CSV</button>
      <button class="nb" onclick="exportCSV('projects')"><span class="ni">📤</span>案件CSV</button>
      <button class="nb" onclick="exportCSV('quotes')"><span class="ni">📤</span>見積CSV</button>
      <button class="nb" onclick="backupData()"><span class="ni">💾</span>バックアップ</button>
      <button class="nb" onclick="document.getElementById('rf').click()"><span class="ni">📂</span>データ復元</button>
    </div>
  </nav>
  <div class="sb-foot">
    <span class="sdot"></span>自動保存 ON
    <div id="sv-time" style="margin-top:2px">最終保存: —</div>
    <div style="margin-top:1px">v5.0 © セイノデンキ</div>
  </div>
</div>
<input type="file" id="rf" accept=".json" style="display:none" onchange="restoreData(event)">

<div id="mn">
  <div id="tb">
    <button id="mob-menu-btn" onclick="toggleSb()" style="display:none;background:none;border:none;cursor:pointer;padding:6px;font-size:20px;color:var(--text2);flex-shrink:0">☰</button>
    <div class="tb-title" id="pg-title">ダッシュボード</div>
    <div id="tbact"></div>
  </div>
  <div id="ct"></div>
</div>
<div id="toast"></div>

<script>
'use strict';
// ============================================================
// DATA — single in-memory object, flush to localStorage on debounce
// ============================================================
const K={c:'s5c',p:'s5p',q:'s5q',s:'s5s',id:'s5id'};
let D=null; // THE single data object

function initD(){
  if(D)return;
  D={
    customers:  JSON.parse(localStorage.getItem(K.c)||'[]'),
    projects:   JSON.parse(localStorage.getItem(K.p)||'[]'),
    quotes:     JSON.parse(localStorage.getItem(K.q)||'[]'),
    schedules:  JSON.parse(localStorage.getItem(K.s)||'[]'),
    nextId:     parseInt(localStorage.getItem(K.id)||'1'),
    cfg:        JSON.parse(localStorage.getItem('s5cfg')||'{}'),
  };
}

let _st=null;
function save(){
  // update badges instantly from memory
  _bc();
  clearTimeout(_st);
  const el=document.getElementById('sv-time');
  if(el) el.textContent='保存待機中...';
  _st=setTimeout(_flush,8000);
}
function _flush(){
  if(!D)return;
  try{
    localStorage.setItem(K.c,JSON.stringify(D.customers));
    localStorage.setItem(K.p,JSON.stringify(D.projects));
    localStorage.setItem(K.q,JSON.stringify(D.quotes));
    localStorage.setItem(K.s,JSON.stringify(D.schedules));
    localStorage.setItem(K.id,D.nextId);
    if(D.cfg) localStorage.setItem('s5cfg',JSON.stringify(D.cfg));
    const el=document.getElementById('sv-time');
    if(el) el.textContent='最終保存: '+new Date().toLocaleTimeString('ja-JP');
  }catch(e){
    const el=document.getElementById('sv-time');
    if(el) el.textContent='⚠️ 容量不足';
  }
}
window.addEventListener('beforeunload',()=>{clearTimeout(_st);_flush();});

function nid(){return D.nextId++;}
function genCN(){
  const ns=D.customers.map(c=>parseInt((c.cn||'C-0000').slice(2))||0);
  return'C-'+String((ns.length?Math.max(...ns):0)+1).padStart(4,'0');
}
function genQN(){
  const ns=D.quotes.map(q=>parseInt((q.qn||'M-00000').slice(2))||0);

// ============================================================
function jpHols(yr){
  const h={};
  const add=(m,d,n)=>h[`${yr}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`]=n;
  add(1,1,'元日');add(2,11,'建国記念の日');add(2,23,'天皇誕生日');
  add(4,29,'昭和の日');add(5,3,'憲法記念日');add(5,4,'みどりの日');add(5,5,'こどもの日');
  add(8,11,'山の日');add(11,3,'文化の日');add(11,23,'勤労感謝の日');
  const nm=(mo,n)=>{let d=new Date(yr,mo-1,1),dw=d.getDay(),f=dw===1?1:dw===0?2:9-dw;return f+(n-1)*7;};
  add(1,nm(1,2),'成人の日');add(7,nm(7,3),'海の日');add(9,nm(9,3),'敬老の日');add(10,nm(10,2),'スポーツの日');
  add(3,Math.floor(20.8431+0.242194*(yr-1980)-Math.floor((yr-1980)/4)),'春分の日');
  add(9,Math.floor(23.2488+0.242194*(yr-1980)-Math.floor((yr-1980)/4)),'秋分の日');
  Object.entries({...h}).forEach(([ds,n])=>{const d=new Date(ds);if(d.getDay()===0){const ns=new Date(d);ns.setDate(d.getDate()+1);const k=ns.toISOString().slice(0,10);if(!h[k])h[k]='振替休日';}});
  return h;
}

const WE={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌤',53:'🌦',55:'🌧',61:'🌤',63:'🌧',65:'🌧',71:'❄️',73:'❄️',75:'❄️',80:'🌦',81:'🌤',82:'🌧',95:'⛈',96:'⛈',99:'⛈'};
let _wc={};
async function wx(dates){
  const k=dates[0]+'_'+dates[dates.length-1];
  if(_wc[k])return _wc[k];
  try{
    const s=dates[0],e=dates[dates.length-1];
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=38.368&longitude=141.068&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max&wind_speed_unit=ms&timezone=Asia%2FTokyo&start_date='+s+'&end_date='+e);
    const j=await r.json();
    const out={};
    (j.daily?.time||[]).forEach((d,i)=>out[d]={code:j.daily.weathercode[i],max:j.daily.temperature_2m_max[i],min:j.daily.temperature_2m_min[i],wind:Math.round((j.daily.windspeed_10m_max?.[i]||0)*10)/10});
    _wc[k]=out;return out;
  }catch{return{};}
}
function wxHtml(w){
  if(!w)return'';
  return`<div style="font-size:15px;line-height:1">${WE[w.code]||''}</div><div style="font-size:10px;color:#c5724a;font-weight:700">${Math.round(w.max)}°<span style="color:var(--text3);font-weight:400">/${Math.round(w.min)}°</span></div><div style="font-size:9px;color:var(--text3)">💨${w.wind}m/s</div>`;
}

      <div id="dt-body">${dtHistory(pjs,qts)}</div>
      <div style="margin-top:9px;display:flex;gap:6px">
        <button class="btn bp" onclick="showProjMo(null,${c.id})">＋ 案件追加</button>
        <button class="btn bb" onclick="showQuoteMo(null,${c.id})">＋ 見積作成</button>
      </div>
    </div>
  </div>`;
}
function swDTab(t){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('dt-'+t)?.classList.add('on');
  const pjs=D.projects.filter(p=>p.cid===detCid);
  const qts=D.quotes.filter(q=>q.cid===detCid);
  const c=D.customers.find(c=>c.id===detCid);
  if(t==='h') document.getElementById('dt-body').innerHTML=dtHistory(pjs,qts);
  else if(t==='e') document.getElementById('dt-body').innerHTML=dtEquip(c);
  else if(t==='c') document.getElementById('dt-body').innerHTML=dtContract(c);
  else if(t==='p') document.getElementById('dt-body').innerHTML=dtProjs(pjs);
  else if(t==='q') document.getElementById('dt-body').innerHTML=dtQuots(qts);
  else if(t==='r') document.getElementById('dt-body').innerHTML=dtReports(pjs);
}
function dtProjs(pjs){

function dtQuots(qts){

}

// ============================================================
// CALENDAR
// ============================================================
const SH=48; // slot height px

function pgCal(){
  if(calV==='month')calMonth();
  else if(calV==='day')calDay();
  else calWeek();
}
function t2px(t){const[h,m]=(t||'00:00').split(':').map(Number);return(h*60+m)/60*SH;}
function dpx(s,e){return Math.max(t2px(e)-t2px(s),18);}
function calNavH(label){
  return`<div class="gh">
    <div style="display:flex;gap:4px"><button class="btn bs bsm" id="cprev">◀</button><button class="btn bs bsm" id="ctod">今日</button><button class="btn bs bsm" id="cnext">▶</button></div>
    <span class="gt" style="padding-left:10px">${label}</span>
    <div style="display:flex;gap:3px">
      <button class="btn bsm ${calV==='day'?'bp':'bs'}" onclick="calV='day';buildPage()">日</button>
      <button class="btn bsm ${calV==='week'?'bp':'bs'}" onclick="calV='week';buildPage()">週</button>
      <button class="btn bsm ${calV==='month'?'bp':'bs'}" onclick="calV='month';buildPage()">月</button>
    </div>
    <div style="display:flex;gap:5px;margin-left:8px">
      <button class="btn bp bsm" onclick="showSchedMo(null,'${today()}')">＋ スケジュール</button>
      <button class="btn bg bsm" onclick="showProjMo()">＋ 案件</button>
    </div>
  </div>`;
}
function bindNav(pf,tf,nf){
  setTimeout(()=>{
    document.getElementById('cprev')?.addEventListener('click',pf);
    document.getElementById('ctod')?.addEventListener('click',tf);
    document.getElementById('cnext')?.addEventListener('click',nf);
  },0);
}
function mtotBar(){
  const tot=D.projects.filter(p=>{if(!p.ed)return false;const d=new Date(p.ed);return d.getFullYear()===calY&&d.getMonth()===calM&&p.status==='完了';}).reduce((s,p)=>s+p.amount,0);
  return`<div class="mtbar"><div style="font-size:13px;color:var(--text2)">${calY}年${calM+1}月 完了案件売上</div><div class="amt" style="font-size:20px;color:var(--green)">${fmt(tot)}</div></div>`;
}
function calADForDay(ds){
  const dd=new Date(ds);
  return[
    ...D.projects.filter(p=>p.sd&&p.ed&&new Date(p.sd)<=dd&&new Date(p.ed)>=dd),
    ...D.schedules.filter(s=>s.date===ds&&s.allDay)
  ];
}
function calSForDay(ds){return D.schedules.filter(s=>s.date===ds&&!s.allDay);}

function calWeek(){
  const days=Array.from({length:7},(_,i)=>{const d=new Date(calWS);d.setDate(calWS.getDate()+i);return d;});
  const now=new Date();const hols=jpHols(calY);
  const hrs=Array.from({length:24},(_,i)=>i);
  const label=`${days[0].getMonth()+1}月${days[0].getDate()}日 〜 ${days[6].getMonth()+1}月${days[6].getDate()}日（${calY}年）`;
  const dns=['日','月','火','水','木','金','土'];
  const nowPx=(now.getHours()*60+now.getMinutes())/60*SH;
  const isThisWk=days.some(d=>d.toDateString()===now.toDateString());

  const hdrs=days.map(dd=>{
    const ds=dd.toISOString().slice(0,10);const dw=dd.getDay();
    const isT=dd.toDateString()===now.toDateString();const hol=hols[ds];const isRed=dw===0||hol;
    return`<div class="gdh-c" style="${hol?'background:rgba(184,64,64,.04)':''}">
      <div class="gdh-dow" style="color:${isRed?'var(--red)':dw===6?'var(--blue)':'var(--text3)'}">${dns[dw]}</div>
      <div class="gdh-dn ${isT?'today':''}" style="${isRed&&!isT?'color:var(--red)':''}">${dd.getDate()}</div>
      ${hol?`<div style="font-size:8px;color:var(--red);font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">🎌${hol}</div>`:''}
      <div id="wx-w-${ds}" style="min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center"></div>
    </div>`;
  }).join('');

  const adRow=days.map(dd=>{
    const ds=dd.toISOString().slice(0,10);const items=calADForDay(ds);
    return`<div class="gadc" onclick="showSchedMo(null,'${ds}',null,null,true)">${items.map(it=>it.phase!==undefined?`<div style="background:${pc(it.phase)};color:#fff;border-radius:3px;padding:1px 3px;font-size:9px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;margin-bottom:1px" onclick="event.stopPropagation();showProjMo(${it.id})">⚡${it.title}</div>`:`<div style="background:${it.color||'var(--accent)'};color:#fff;border-radius:3px;padding:1px 3px;font-size:9px;font-weight:700;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${it.title}</div>`).join('')}</div>`;
  }).join('');

  const tlabs=hrs.map(h=>`<div style="height:${SH}px;border-bottom:1px dashed rgba(44,38,32,.07);display:flex;align-items:flex-start;justify-content:flex-end;padding-right:5px;padding-top:2px;font-size:10px;color:var(--text3);flex-shrink:0">${String(h).padStart(2,'0')}:00</div>`).join('');

  const dcols=days.map(dd=>{
    const ds=dd.toISOString().slice(0,10);const sc=calSForDay(ds);
    const hlines=hrs.map(()=>`<div class="ghr"></div>`).join('');
    const evs=sc.map(s=>{const top=t2px(s.st);const ht=dpx(s.st,s.et);const pj=s.pid?D.projects.find(p=>p.id===s.pid):null;
      return`<div class="gev" style="top:${top}px;height:${ht}px;background:${s.color||'var(--accent)'}" onclick="event.stopPropagation();showSchedMo(${s.id},'${ds}')"><div style="font-size:9.5px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(s.title)}</div><div style="font-size:8.5px;opacity:.85">${s.st}–${s.et}${pj?' · '+pj.title.slice(0,8):''}</div></div>`;
    }).join('');
    return`<div class="gcol" onclick="clickCal(event,'${ds}',this)">${hlines}${evs}</div>`;
  }).join('');

  document.getElementById('ct').innerHTML=`<div class="gw">${calNavH(label)}
    <div class="gb">
      <div style="display:flex;flex-direction:column;width:50px;flex-shrink:0;border-right:1px solid var(--border)">
        <div style="height:44px;border-bottom:1px solid var(--border);background:var(--bg3)"></div>
        <div style="height:28px;border-bottom:1px solid var(--border);background:rgba(74,124,95,.03);font-size:9px;color:var(--text3);display:flex;align-items:center;justify-content:center">終日</div>
        <div>${tlabs}</div>
      </div>
      <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column">
        <div class="gdh">${hdrs}</div>
        <div class="gad">${adRow}</div>
        <div style="display:flex;position:relative;flex:1">
          <div style="display:flex;flex:1;position:relative">
            ${isThisWk?`<div class="gnow" style="top:${nowPx}px"></div>`:''}
            ${dcols}
          </div>
        </div>
      </div>
    </div>
  </div>${mtotBar()}`;

  calY=days[3].getFullYear();calM=days[3].getMonth();
  bindNav(
    ()=>{calWS=wkStart(new Date(calWS.getTime()-7*86400000));buildPage();},
    ()=>{calWS=wkStart(new Date());buildPage();},
    ()=>{calWS=wkStart(new Date(calWS.getTime()+7*86400000));buildPage();}
  );
  // async weather
  (async()=>{const dates=days.map(d=>d.toISOString().slice(0,10));const w=await wx(dates);dates.forEach(ds=>{const el=document.getElementById('wx-w-'+ds);if(el&&w[ds])el.innerHTML=wxHtml(w[ds]);});})();
}

function calDay(){
  const ds=new Date(calY,calM,calD).toISOString().slice(0,10);
  const hols=jpHols(calY);const hol=hols[ds];
  const now=new Date();const isT=new Date(ds).toDateString()===now.toDateString();
  const nowPx=isT?(now.getHours()*60+now.getMinutes())/60*SH:null;
  const sc=calSForDay(ds);const ad=calADForDay(ds);
  const hrs=Array.from({length:24},(_,i)=>i);
  const label=`${calY}年${calM+1}月${calD}日${hol?' 🎌'+hol:''}`;
  const tlabs=hrs.map(h=>`<div style="height:${SH}px;border-bottom:1px dashed rgba(44,38,32,.08);padding-left:6px;padding-top:2px;font-size:10px;color:var(--text3)">${String(h).padStart(2,'0')}:00</div>`).join('');
  const evs=sc.map(s=>{const top=t2px(s.st);const ht=dpx(s.st,s.et);const pj=s.pid?D.projects.find(p=>p.id===s.pid):null;
    return`<div class="gev" style="top:${top}px;height:${ht}px;background:${s.color||'var(--accent)'};left:58px;right:4px" onclick="event.stopPropagation();showSchedMo(${s.id},'${ds}')"><div style="font-size:11px;font-weight:700">${esc(s.title)}</div><div style="font-size:9px;opacity:.85">${s.st}–${s.et}${pj?' · '+pj.title:''}</div></div>`;
  }).join('');

  document.getElementById('ct').innerHTML=`<div class="gw">${calNavH(label)}
    <div style="padding:7px 11px;border-bottom:1px solid var(--border);background:rgba(74,124,95,.03);min-height:30px">
      <span style="font-size:11px;color:var(--text3);font-weight:700">終日：</span>
      ${ad.length?ad.map(it=>it.phase!==undefined?`<span style="background:${pc(it.phase)};color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;margin-right:3px">⚡${it.title}</span>`:`<span style="background:${it.color||'var(--accent)'};color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;margin-right:3px">${it.title}</span>`).join(''):`<span style="font-size:11px;color:var(--text3)">なし</span>`}
      <span id="wx-day" style="margin-left:12px;font-size:12px"></span>
    </div>
    <div style="flex:1;overflow-y:auto;position:relative;min-height:400px" onclick="clickCal(event,'${ds}',this)">
      ${tlabs}${nowPx!==null?`<div class="gnow" style="top:${nowPx}px;left:52px"></div>`:''}${evs}
    </div>
  </div>${mtotBar()}`;

  bindNav(
    ()=>{const d=new Date(calY,calM,calD-1);calY=d.getFullYear();calM=d.getMonth();calD=d.getDate();buildPage();},
    ()=>{const d=new Date();calY=d.getFullYear();calM=d.getMonth();calD=d.getDate();buildPage();},
    ()=>{const d=new Date(calY,calM,calD+1);calY=d.getFullYear();calM=d.getMonth();calD=d.getDate();buildPage();}
  );
  (async()=>{const w=await wx([ds]);const el=document.getElementById('wx-day');if(el&&w[ds]){const wd=w[ds];el.innerHTML=`${WE[wd.code]||''} ${Math.round(wd.max)}°/${Math.round(wd.min)}° 💨${wd.wind}m/s`;}})();
}

function calMonth(){
  const first=new Date(calY,calM,1).getDay();const dim=new Date(calY,calM+1,0).getDate();
  const now=new Date();const hols=jpHols(calY);
  const dns=['日','月','火','水','木','金','土'];
  let cells=[];
  const pd=new Date(calY,calM,0).getDate();
  for(let i=first-1;i>=0;i--)cells.push({day:pd-i,cur:false,date:null});
  for(let d=1;d<=dim;d++){cells.push({day:d,cur:true,date:`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`});}
  while(cells.length%7)cells.push({day:cells.length-dim-first+1,cur:false,date:null});

  const rows=cells.map((c,idx)=>{
    const dw=idx%7;const isT=c.cur&&now.getFullYear()===calY&&now.getMonth()===calM&&now.getDate()===c.day;
    const hol=c.date?hols[c.date]:null;const isRed=dw===0||hol;
    let ev='';
    if(c.date){
      calADForDay(c.date).slice(0,1).forEach(it=>{ev+=it.phase!==undefined?`<div style="background:${pc(it.phase)};color:#fff;border-radius:3px;padding:1px 3px;font-size:9px;font-weight:700;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer" onclick="event.stopPropagation();showProjMo(${it.id})">⚡${it.title}</div>`:`<div style="background:${it.color||'var(--accent)'};color:#fff;border-radius:3px;padding:1px 3px;font-size:9px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${it.title}</div>`;});
      calSForDay(c.date).slice(0,2).forEach(s=>{ev+=`<div style="background:${s.color||'var(--accent)'}20;color:${s.color||'var(--accent)'};border-left:2px solid ${s.color||'var(--accent)'};border-radius:2px;padding:1px 3px;font-size:9px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;font-weight:700" onclick="event.stopPropagation();showSchedMo(${s.id},'${c.date}')">${s.st} ${esc(s.title)}</div>`;});
    }
    const dnStyle=isT?'background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px':(isRed?'color:var(--red)':dw===6?'color:var(--blue)':'');
    return`<div id="mc-${c.date||idx}" style="min-height:88px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px;${!c.cur?'background:var(--bg3);opacity:.55':hol?'background:rgba(184,64,64,.03)':''};cursor:pointer;position:relative" onclick="${c.date?`showSchedMo(null,'${c.date}')`:''}" >
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px">
        <span style="${dnStyle};font-size:11px;font-weight:700">${c.day}</span>
        <span id="wx-m-${c.date||'x'}" style="display:flex;flex-direction:column;align-items:flex-end;line-height:1"></span>
      </div>
      ${hol?`<div style="font-size:8px;color:var(--red);font-weight:700;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">🎌${hol}</div>`:''}
      ${ev}
    </div>`;
  }).join('');

  document.getElementById('ct').innerHTML=`<div class="gw">${calNavH(`${calY}年 ${calM+1}月`)}
    <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">
      ${dns.map((d,i)=>`<div style="padding:7px 4px;text-align:center;font-size:11px;font-weight:700;color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--text3)'}">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);overflow-y:auto">${rows}</div>
  </div>${mtotBar()}`;

  bindNav(
    ()=>{calM--;if(calM<0){calM=11;calY--;}buildPage();},
    ()=>{const d=new Date();calY=d.getFullYear();calM=d.getMonth();buildPage();},
    ()=>{calM++;if(calM>11){calM=0;calY++;}buildPage();}
  );
  (async()=>{
    const dates=cells.filter(c=>c.cur&&c.date).map(c=>c.date);
    if(!dates.length)return;
    const w=await wx(dates);
    dates.forEach(ds=>{const el=document.getElementById('wx-m-'+ds);if(el&&w[ds])el.innerHTML=wxHtml(w[ds]);});
  })();
}

function clickCal(e,ds,col){
  const r=col.getBoundingClientRect();const y=e.clientY-r.top;
  const tot=Math.floor(y/SH*60);const hh=String(Math.floor(tot/60)).padStart(2,'0');
  const mm=String(Math.round(tot%60/15)*15).padStart(2,'0');
  const st=`${hh}:${mm}`;const eh=Math.min(23,parseInt(hh)+(parseInt(mm)>=30?1:0));
  const et=`${String(eh).padStart(2,'0')}:${parseInt(mm)>=30?'00':'30'}`;
  showSchedMo(null,ds,st,et,false);
}

// QUOTES
// ============================================================
function pgQuotes(){
  const tot=D.quotes.reduce((s,q)=>s+q.amount,0);

function mo(html,lg){
  const existing=document.getElementById('mo-ov');
  if(existing){
    const inner=existing.querySelector('.mo,.mo-lg');
    if(inner){inner.innerHTML=html;inner.className='mo'+(lg?' mo-lg':'');}
    return;
  }
  const ov=document.createElement('div');ov.className='ov';ov.id='mo-ov';
  ov.innerHTML=`<div class="mo${lg?' mo-lg':''}">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)cmo();});
  document.body.appendChild(ov);
}

function showImgMo(pid){
  const p=D.projects.find(p=>p.id===pid);if(!p)return;
  mo(`<div class="mt">🖼 工事写真 — ${esc(p.title)}</div>
  <div id="img-area">${imgGrid(p.imgs||[],pid)}</div>
  <div style="margin-top:9px"><input type="file" id="img-in" accept="image/*" multiple style="display:none" onchange="uploadImgs(${pid},this)"><button class="btn bp" onclick="document.getElementById('img-in').click()">🖼 写真を追加</button><span style="font-size:11px;color:var(--text3);margin-left:7px">5MB/枚まで</span></div>
  <div class="mf"><button class="btn bs" onclick="cmo()">閉じる</button></div>`);
}
function imgGrid(imgs,pid){
  if(!imgs.length)return`<div style="text-align:center;padding:24px;color:var(--text3)">🖼 写真がまだありません</div>`;
  return`<div class="ig">${imgs.map((img,i)=>`<div class="ith" onclick="viewImg('${img.data}','${esc(img.name)}')"><img src="${img.data}" alt="${esc(img.name)}"><button class="idl" onclick="event.stopPropagation();delImg(${pid},${i})">×</button></div>`).join('')}</div>`;
}
function uploadImgs(pid,inp){
  const files=Array.from(inp.files);if(!files.length)return;
  const p=D.projects.find(p=>p.id===pid);if(!p)return;if(!p.imgs)p.imgs=[];
  let done=0;
  files.forEach(f=>{
    if(f.size>5*1024*1024){toast(`${f.name}は5MB超のためスキップ`,'er');done++;return;}
    const r=new FileReader();r.onload=e=>{p.imgs.push({data:e.target.result,name:f.name,added:today()});done++;
      if(done===files.length){save();const a=document.getElementById('img-area');if(a)a.innerHTML=imgGrid(p.imgs,pid);toast(`${files.length}枚追加しました`);}};r.readAsDataURL(f);
  });
}
function delImg(pid,i){const p=D.projects.find(p=>p.id===pid);if(!p)return;p.imgs.splice(i,1);save();const a=document.getElementById('img-area');if(a)a.innerHTML=imgGrid(p.imgs,pid);toast('写真を削除しました');}
function viewImg(src,nm){const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer';ov.innerHTML=`<img src="${src}" style="max-width:90vw;max-height:85vh;object-fit:contain;border-radius:4px"><div style="color:#aaa;font-size:12px;margin-top:9px">${esc(nm)} — クリックで閉じる</div>`;ov.onclick=()=>ov.remove();document.body.appendChild(ov);}

function restoreData(e){

    try{
      const b=JSON.parse(ev.target.result);
      D={customers:b.customers||[],projects:b.projects||[],quotes:b.quotes||[],schedules:b.schedules||[],nextId:b.nextId||200};
      // handle old field names (cid vs customerId, sd/ed vs startDate/endDate)
      D.projects=D.projects.map(p=>({...p,cid:p.cid||p.customerId,sd:p.sd||p.startDate,ed:p.ed||p.endDate,imgs:p.imgs||p.images||[]}));
      D.quotes=D.quotes.map(q=>({...q,cid:q.cid||q.customerId,qn:q.qn||q.quoteNo,cp:q.cp||q.contactPerson}));
      D.schedules=D.schedules.map(s=>({...s,pid:s.pid||s.projectId,st:s.st||s.startTime,et:s.et||s.endTime}));
      D.customers=D.customers.map(c=>({...c,cn:c.cn||c.custNo}));
      _flush();toast('データを復元しました','in');buildPage();_bc();
    }catch{toast('復元に失敗しました','er');}
  };r.readAsText(f);e.target.value='';
}

// --- チェックリスト ---
function _pdCkTog(pid,i,v){const p=D.projects.find(p=>p.id===pid);if(p&&p.detail){p.detail.checklist[i].done=v;save();}}
function _pdCkAdd(pid){
  const p=D.projects.find(p=>p.id===pid);if(!p||!p.detail)return;
  const t=document.getElementById('pd-ck-t')?.value||'';
  if(!t){toast('タスクを入力してください','er');return;}
  p.detail.checklist.push({text:t,done:false,due:document.getElementById('pd-ck-d')?.value||''});
  save();
}
function _pdCkDel(pid,i){const p=D.projects.find(p=>p.id===pid);if(p&&p.detail){p.detail.checklist.splice(i,1);save();}}

// --- 機器 ---
function _pdCkUpd(pid,i,v){const p=D.projects.find(p=>p.id===pid);if(p&&p.detail)p.detail.checklist[i].text=v;}
function _pdCkDue(pid,i,v){const p=D.projects.find(p=>p.id===pid);if(p&&p.detail){p.detail.checklist[i].due=v;save();}}

  p.detail.equipment.push({name:n,spec:document.getElementById('pd-eq-s')?.value||'',qty:document.getElementById('pd-eq-q')?.value||'1',unit:document.getElementById('pd-eq-u')?.value||'台',status:'未発注'});

// --- 人員 ---
function _pdStAdd(pid){
  const p=D.projects.find(p=>p.id===pid);if(!p||!p.detail)return;
  const n=document.getElementById('pd-st-n')?.value||'';
  if(!n){toast('氏名を入力してください','er');return;}
  p.detail.staff.push({name:n,role:document.getElementById('pd-st-r')?.value||'',phone:document.getElementById('pd-st-p')?.value||'',date:document.getElementById('pd-st-d')?.value||'',days:document.getElementById('pd-st-dy')?.value||''});
  save();
}
function _pdStUpd(pid,i){
  const p=D.projects.find(p=>p.id===pid);if(!p||!p.detail)return;
  const it=p.detail.staff[i];if(!it)return;
  it.name=document.getElementById('st-n-'+i)?.value||it.name;
  it.role=document.getElementById('st-r-'+i)?.value||'';
  it.phone=document.getElementById('st-p-'+i)?.value||'';
  it.date=document.getElementById('st-d-'+i)?.value||'';
  it.days=document.getElementById('st-dy-'+i)?.value||'';
}
function _pdStDel(pid,i){const p=D.projects.find(p=>p.id===pid);if(p&&p.detail){p.detail.staff.splice(i,1);save();}}

// --- 工程 ---
function _pdScAdd(pid){
  const p=D.projects.find(p=>p.id===pid);if(!p||!p.detail)return;
  const w=document.getElementById('pd-sc-w')?.value||'';
  if(!w){toast('作業内容を入力してください','er');return;}
  const colors=['var(--accent)','var(--blue)','var(--accent2)','var(--purple)','var(--green)'];
  p.detail.schedule.push({
    day:document.getElementById('pd-sc-d')?.value||'',work:w,
    hours:document.getElementById('pd-sc-h')?.value||'',
    startDay:parseInt(document.getElementById('pd-sc-s')?.value)||p.detail.schedule.length+1,
    days:parseInt(document.getElementById('pd-sc-n')?.value)||1,
    color:colors[p.detail.schedule.length%colors.length]
  });
  save();
}
function _pdScUpd(pid,i){
  const p=D.projects.find(p=>p.id===pid);if(!p||!p.detail)return;
  const it=p.detail.schedule[i];if(!it)return;
  it.day=document.getElementById('sc-d-'+i)?.value||it.day;
  it.work=document.getElementById('sc-w-'+i)?.value||it.work;
  it.hours=document.getElementById('sc-h-'+i)?.value||'';
  it.startDay=parseInt(document.getElementById('sc-s-'+i)?.value)||it.startDay;
  it.days=parseInt(document.getElementById('sc-n-'+i)?.value)||it.days;
}
function _pdScDel(pid,i){const p=D.projects.find(p=>p.id===pid);if(p&&p.detail){p.detail.schedule.splice(i,1);save();}}

// AI ユーティリティ（設定のAPIキーを使って呼び出す）
// ============================================================
async function _aiCall(prompt, maxTokens){
  maxTokens = maxTokens||1000;
  const cfg = D.cfg||{};
  const type = cfg.aiType||'none';
  const key = cfg.aiKey||'';
  if(type==='none'||!key){
    toast('設定でAIを設定してください','er');
    return null;
  }
  try{
    if(type==='claude'){
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})
      });
      const d=await res.json();
      return d.content?.[0]?.text||null;
    } else if(type==='chatgpt'){
      const res=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
        body:JSON.stringify({model:'gpt-4o-mini',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})
      });
      const d=await res.json();
      return d.choices?.[0]?.message?.content||null;
    } else if(type==='gemini'){
      const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+key,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const d=await res.json();
      return d.candidates?.[0]?.content?.parts?.[0]?.text||null;
    }
  }catch(e){
    toast('AI呼び出しエラー: '+e.message,'er');
    return null;
  }
}

function _getAlerts(){
  const today=new Date();today.setHours(0,0,0,0);
  const days=parseInt(D.cfg?.alertDays||14);
  const alerts=[];
  const add=function(type,label,date,cid,custName,detail){
    if(!date)return;
    const d=new Date(date);d.setHours(0,0,0,0);
    const diff=Math.floor((d-today)/(1000*60*60*24));
    if(diff<=days) alerts.push({type,label,date,diff,cid,custName,detail,urgent:diff<=3,overdue:diff<0});
  };
  D.customers.forEach(function(c){
    (c.equipment||[]).forEach(function(eq){
      if(eq.warrantyDate)add('equip',c.name+'｜'+eq.name+' 保証期限',eq.warrantyDate,c.id,c.name,'保証期限');
      if(eq.nextCheck)add('equip',c.name+'｜'+eq.name+' 点検予定',eq.nextCheck,c.id,c.name,'次回点検');
    });
    const ct=c.contracts||{};
    (ct.warranty||[]).forEach(function(it){if(it.expire)add('contract',c.name+'｜保証期限 '+it.title,it.expire,c.id,c.name,'保証');});
    (ct.maintenance||[]).forEach(function(it){if(it.renew)add('contract',c.name+'｜保守契約更新 '+it.title,it.renew,c.id,c.name,'保守契約');});
    (ct.aircleaning||[]).forEach(function(it){if(it.next)add('contract',c.name+'｜エアクリ予定 '+it.title,it.next,c.id,c.name,'エアクリ');});
    (ct.inspection||[]).forEach(function(it){if(it.next)add('contract',c.name+'｜点検予定 '+it.title,it.next,c.id,c.name,'点検契約');});
    (ct.lease||[]).forEach(function(it){if(it.end)add('contract',c.name+'｜リース終了 '+it.title,it.end,c.id,c.name,'リース');});
  });
  D.projects.forEach(function(p){
    if(p.ed&&p.status!=='完了'&&p.status!=='中止'){
      const c=p.cid?D.customers.find(c=>c.id===p.cid):null;
      add('project',(c?c.name:'案件')+'｜'+p.title+' 終了日',p.ed,p.cid,c?.name||'','案件終了');
    }
  });
  return alerts.sort(function(a,b){return a.date.localeCompare(b.date);});
}
function _alertCount(){return _getAlerts().filter(function(a){return !a.overdue||a.diff>=-7;}).length;}
function _alertDates(){
  const alerts=_getAlerts(),dates={};
  alerts.forEach(function(a){
    if(!dates[a.date])dates[a.date]={count:0,urgent:false};
    dates[a.date].count++;
    if(a.urgent||a.diff<=0)dates[a.date].urgent=true;
  });
  return dates;
}
function _checkAlerts(){
  if(D.cfg?.alertPopup===false)return;
  const alerts=_getAlerts().filter(function(a){return a.diff>=0&&a.diff<=3;});
  if(!alerts.length)return;
  const html=alerts.slice(0,5).map(function(a){
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">'+
      '<span style="font-size:18px">'+(a.diff===0?'🔴':a.diff<=3?'🟠':'🟡')+'</span>'+
      '<div style="flex:1"><div style="font-size:12px;font-weight:700">'+esc(a.label)+'</div>'+
      '<div style="font-size:11px;color:var(--text3)">'+(a.diff===0?'今日':'あと'+a.diff+'日')+' — '+a.date+'</div></div></div>';
  }).join('');
  const ov=document.createElement('div');ov.className='cov';ov.id='alert-pop';
  ov.innerHTML='<div class="cb" style="max-width:420px">'+
    '<div style="font-size:22px;margin-bottom:8px">🔔</div>'+
    '<div style="font-size:15px;font-weight:700;margin-bottom:12px">アラート通知 ('+alerts.length+'件)</div>'+
    '<div style="max-height:300px;overflow-y:auto">'+html+'</div>'+
    (alerts.length>5?'<div style="font-size:11px;color:var(--text3);margin-top:6px">他 '+(alerts.length-5)+'件...</div>':'')+
    '<div style="display:flex;gap:7px;justify-content:center;margin-top:14px">'+
    '<button class="btn bs" onclick="document.getElementById(\'alert-pop\')?.remove()">閉じる</button>'+
    '<button class="btn bp" onclick="document.getElementById(\'alert-pop\')?.remove();nav(\'dashboard\')">ダッシュボードで確認</button>'+
    '</div></div>';
  document.body.appendChild(ov);
}

function showAllAlerts(){
  const alerts=_getAlerts();
  if(!alerts.length){toast('アラートはありません');return;}
  const html=alerts.map(function(a){
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">'+
      '<span style="font-size:18px">'+(a.overdue?'🔴':a.diff===0?'🔴':a.diff<=3?'🟠':'🟡')+'</span>'+
      '<div style="flex:1">'+
        '<div style="font-size:13px;font-weight:700">'+esc(a.label)+'</div>'+
        '<div style="font-size:11px;color:var(--text3)">'+(a.overdue?'期限切れ '+Math.abs(a.diff)+'日経過':a.diff===0?'今日':'あと'+a.diff+'日')+' — '+a.date+'</div>'+
      '</div></div>';
  }).join('');
  const existing=document.getElementById('mo-ov');
  if(existing){existing.querySelector('.mo,.mo-lg').innerHTML='<div class="mt">🔔 アラート一覧 ('+alerts.length+'件)</div><div style="max-height:60vh;overflow-y:auto">'+html+'</div><div class="mf"><button class="btn bs" onclick="cmo()">閉じる</button></div>';}
  else mo('<div class="mt">🔔 アラート一覧 ('+alerts.length+'件)</div><div style="max-height:60vh;overflow-y:auto">'+html+'</div><div class="mf"><button class="btn bs" onclick="cmo()">閉じる</button></div>',false);
}

    ...qts.map(function(q){return{type:'quote',date:q.date||q.created||'',
      label:(q.isInvoice?'📄':'📋')+' '+q.title,
      sub:q.qn+' / ¥'+Number(q.amount+(q.tax||0)).toLocaleString('ja-JP'),
      badge:bdg(q.status),action:'showQuoteMo('+q.id+')'};
    })
  ].filter(function(i){return i.date;}).sort(function(a,b){return b.date.localeCompare(a.date);});

      '<div style="flex-shrink:0;width:52px;text-align:center">'+

        '<div style="font-size:13px;font-weight:900">'+it.date.slice(8,10)+'日</div>'+

function saveContract(key,cid,idx){

async function _aiCall(prompt, maxTokens){
  maxTokens = maxTokens||1000;
  const cfg = D.cfg||{};
  const type = cfg.aiType||'none';
  const key = cfg.aiKey||'';
  if(type==='none'||!key){
    toast('設定でAIを設定してください','er');
    return null;
  }
  try{
    if(type==='claude'){
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})
      });
      const d=await res.json();
      return d.content?.[0]?.text||null;
    } else if(type==='chatgpt'){
      const res=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
        body:JSON.stringify({model:'gpt-4o-mini',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})
      });
      const d=await res.json();
      return d.choices?.[0]?.message?.content||null;
    } else if(type==='gemini'){
      const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+key,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const d=await res.json();
      return d.candidates?.[0]?.content?.parts?.[0]?.text||null;
    }
  }catch(e){
    toast('AI呼び出しエラー: '+e.message,'er');
    return null;
  }
}

function dtHistory(pjs,qts){
  var items=[
    ...pjs.map(function(p){return{type:'project',date:p.ed||p.sd||p.created||'',
      label:'⚡ '+p.title,sub:p.phase+' / '+(p.amount?'¥'+Number(p.amount).toLocaleString('ja-JP'):'¥0'),
      badge:bdg(p.phase),action:'showProjDetail('+p.id+')'};
    }),
    ...qts.map(function(q){return{type:'quote',date:q.date||q.created||'',
      label:(q.isInvoice?'📄':'📋')+' '+q.title,
      sub:q.qn+' / ¥'+Number(q.amount+(q.tax||0)).toLocaleString('ja-JP'),
      badge:bdg(q.status),action:'showQuoteMo('+q.id+')'};
    })
  ].filter(function(i){return i.date;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  if(!items.length)return'<div class="emp"><div style="font-size:30px">📅</div><div>履歴がありません</div></div>';
  var html='<div>';
  items.forEach(function(it,i){

      '<div style="flex-shrink:0;width:52px;text-align:center">'+
        '<div style="font-size:10px;color:var(--text3)">'+it.date.slice(0,7).replace('-','/')+'</div>'+
        '<div style="font-size:13px;font-weight:900">'+it.date.slice(8,10)+'日</div>'+
      '</div>'+
      '<div style="flex:1">'+
        '<div style="font-size:13px;font-weight:700;margin-bottom:2px">'+esc(it.label)+'</div>'+
        '<div style="font-size:11px;color:var(--text3);margin-bottom:3px">'+esc(it.sub)+'</div>'+
        it.badge+
      '</div>'+
      '<div style="color:var(--text3);align-self:center">›</div>'+
    '</div>';
  });
  html+='</div>';

}

function dtContract(c){
  if(!c)return'';
  if(!c.contracts)c.contracts={warranty:[],maintenance:[],aircleaning:[],inspection:[],lease:[]};
  const ct=c.contracts;
  const TABS=[
    {key:'warranty',label:'🛡 保証'},
    {key:'maintenance',label:'🔧 保守契約'},
    {key:'aircleaning',label:'❄️ エアクリ'},
    {key:'inspection',label:'🔍 点検契約'},
    {key:'lease',label:'💴 リース'},
  ];
  var tabHtml='<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">';

function swContractTab(key,cid){
  document.querySelectorAll('[id^="cst-"]').forEach(function(b){b.classList.remove('on');});
  document.getElementById('cst-'+key)?.classList.add('on');
  const c=D.customers.find(c=>c.id===cid);
  document.getElementById('ct-body').innerHTML=renderContractTab(key,c);
}

function renderContractTab(key,c){
  if(!c.contracts)c.contracts={warranty:[],maintenance:[],aircleaning:[],inspection:[],lease:[]};
  const items=c.contracts[key]||[];
  const FIELDS={
    warranty:[{id:'title',label:'製品名',ph:'エアコン'},{id:'expire',label:'保証期限',type:'date'},{id:'no',label:'保証書番号'},{id:'shop',label:'販売店'},{id:'memo',label:'備考',ta:true}],
    maintenance:[{id:'title',label:'契約内容',ph:'保守点検'},{id:'period',label:'期間'},{id:'fee',label:'金額'},{id:'renew',label:'更新日',type:'date'},{id:'person',label:'担当者'},{id:'memo',label:'備考',ta:true}],
    aircleaning:[{id:'title',label:'対象機器'},{id:'freq',label:'頻度',ph:'年2回'},{id:'next',label:'次回予定',type:'date'},{id:'last',label:'前回実施',type:'date'},{id:'fee',label:'金額'},{id:'memo',label:'備考',ta:true}],
    inspection:[{id:'title',label:'点検内容'},{id:'cycle',label:'周期',ph:'年1回'},{id:'next',label:'次回予定',type:'date'},{id:'last',label:'前回実施',type:'date'},{id:'fee',label:'金額'},{id:'memo',label:'備考',ta:true}],
    lease:[{id:'title',label:'機器名'},{id:'company',label:'リース会社'},{id:'fee',label:'月額'},{id:'start',label:'開始日',type:'date'},{id:'end',label:'終了日',type:'date'},{id:'memo',label:'備考',ta:true}],
  };
  const fields=FIELDS[key]||[];
  var html='<div style="display:flex;justify-content:flex-end;margin-bottom:6px">'+
    '<button class="btn bp bsm" onclick="showContractMo(\''+key+'\','+c.id+',-1)">＋ 追加</button></div>';
  if(!items.length){html+='<div class="emp" style="padding:20px"><div>データがありません</div></div>';return html;}
  items.forEach(function(item,i){
    html+='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:7px">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">'+
        '<div style="font-size:13px;font-weight:700">'+esc(item.title||'')+'</div>'+
        '<div style="display:flex;gap:4px">'+
          '<button class="btn bs bsm" onclick="showContractMo(\''+key+'\','+c.id+','+i+')">✏️</button>'+
          '<button class="btn bd bsm" onclick="delContract(\''+key+'\','+c.id+','+i+')">🗑</button>'+
        '</div>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;font-size:11px">'+
        fields.filter(function(f){return !f.ta&&f.id!=='title'&&item[f.id];}).map(function(f){
          return'<div><span style="color:var(--text3)">'+f.label+'</span> '+esc(String(item[f.id]||''))+'</div>';
        }).join('')+
      '</div>'+
      (item.memo?'<div style="margin-top:4px;font-size:11px;color:var(--text3)">'+esc(item.memo)+'</div>':'')+
    '</div>';
  });
  return html;
}

function showContractMo(key,cid,idx){
  const c=D.customers.find(c=>c.id===cid);if(!c)return;
  if(!c.contracts)c.contracts={warranty:[],maintenance:[],aircleaning:[],inspection:[],lease:[]};
  const item=idx>=0?(c.contracts[key][idx]||{}):{};
  const FIELDS={
    warranty:[{id:'title',label:'製品名',ph:'エアコン'},{id:'expire',label:'保証期限',type:'date'},{id:'no',label:'保証書番号'},{id:'shop',label:'販売店'},{id:'memo',label:'備考',ta:true}],
    maintenance:[{id:'title',label:'契約内容',ph:'保守点検'},{id:'period',label:'期間'},{id:'fee',label:'金額'},{id:'renew',label:'更新日',type:'date'},{id:'person',label:'担当者'},{id:'memo',label:'備考',ta:true}],
    aircleaning:[{id:'title',label:'対象機器'},{id:'freq',label:'頻度',ph:'年2回'},{id:'next',label:'次回予定',type:'date'},{id:'last',label:'前回実施',type:'date'},{id:'fee',label:'金額'},{id:'memo',label:'備考',ta:true}],
    inspection:[{id:'title',label:'点検内容'},{id:'cycle',label:'周期',ph:'年1回'},{id:'next',label:'次回予定',type:'date'},{id:'last',label:'前回実施',type:'date'},{id:'fee',label:'金額'},{id:'memo',label:'備考',ta:true}],
    lease:[{id:'title',label:'機器名'},{id:'company',label:'リース会社'},{id:'fee',label:'月額'},{id:'start',label:'開始日',type:'date'},{id:'end',label:'終了日',type:'date'},{id:'memo',label:'備考',ta:true}],
  };
  const fields=FIELDS[key]||[];
  var html='<div class="mt">📄 '+(idx>=0?'編集':'追加')+'</div><div class="fg">';
  fields.forEach(function(f){
    if(f.ta){html+='<div class="fr" style="grid-column:1/-1"><label class="fl">'+f.label+'</label><textarea id="ct-'+f.id+'" rows="2">'+esc(item[f.id]||'')+'</textarea></div>';}
    else{html+='<div class="fr"><label class="fl">'+f.label+'</label><input '+(f.type?'type="'+f.type+'" ':'')+' id="ct-'+f.id+'" value="'+esc(item[f.id]||'')+'"'+(f.ph?' placeholder="'+f.ph+'"':'')+' ></div>';}
  });
  html+='</div><div class="mf"><button class="btn bs" onclick="cmo()">キャンセル</button><button class="btn bp" onclick="saveContract(\''+key+'\','+cid+','+idx+')">💾 保存</button></div>';
  mo(html);
}
function saveContract(key,cid,idx){
  const c=D.customers.find(c=>c.id===cid);if(!c)return;
  if(!c.contracts)c.contracts={warranty:[],maintenance:[],aircleaning:[],inspection:[],lease:[]};
  const ids=['title','expire','no','shop','period','fee','renew','person','freq','next','last','cycle','company','start','end','memo'];
  const obj={};
  ids.forEach(function(id){const el=document.getElementById('ct-'+id);if(el)obj[id]=el.value||'';});
  if(!obj.title){toast('必須項目を入力してください','er');return;}
  if(idx>=0)c.contracts[key][idx]=obj;else c.contracts[key].push(obj);
  save();cmo();toast('保存しました');
  document.getElementById('dt-body').innerHTML=dtContract(c);
  setTimeout(function(){swContractTab(key,cid);},50);
}
function delContract(key,cid,idx){
  const c=D.customers.find(c=>c.id===cid);if(!c)return;
  if(!confirm('削除しますか？'))return;
  c.contracts[key].splice(idx,1);save();
  document.getElementById('dt-body').innerHTML=dtContract(c);
}

  D.cfg.tel            = document.getElementById('cfg-tel')?.value||'';
  D.cfg.fax            = document.getElementById('cfg-fax')?.value||'';
  D.cfg.address        = document.getElementById('cfg-addr')?.value||'';
  D.cfg.rep            = document.getElementById('cfg-rep')?.value||'';
  D.cfg.aiType         = document.getElementById('cfg-ai-type')?.value||'none';
  D.cfg.aiKey          = document.getElementById('cfg-ai-key')?.value||'';
  D.cfg.alertDays      = parseInt(document.getElementById('cfg-alert-days')?.value)||14;
  D.cfg.alertPopup     = document.querySelector('input[name="cfg-popup"]:checked')?.value!=='0';
  D.cfg.accentColor    = document.getElementById('cfg-color')?.value||'#4a7c5f';
  save();
  applyCfg();
  toast('設定を保存しました');
}
