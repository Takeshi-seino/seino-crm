<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セイノデンキ CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f2ed;--bg2:#ffffff;--bg3:#eceae4;--bg4:#ddd9d0;
  --border:#cdc7ba;--border2:#b8b0a2;
  --text:#1a2236;--text2:#4a5568;--text3:#8a93a8;
  --accent:#4a7860;--accent2:#b08a18;--accent3:#8b6f47;
  --blue:#3a60a0;--green:#4a7860;--red:#b84040;
  --purple:#6b5fa0;--cyan:#3a8a8a;--yellow:#b08a18;
  --gold:#b08a18;--sage:#4a7860;--navy:#3a60a0;--ink:#1a2236;
  --shadow:0 2px 12px rgba(26,34,54,.08);
  --shadow2:0 1px 4px rgba(26,34,54,.05);
  --radius:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);display:flex;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* SIDEBAR */
#sb{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo svg{flex-shrink:0}
.logo-t{font-size:13px;font-weight:900;color:var(--text)}
.logo-s{font-size:9px;color:var(--text3);letter-spacing:.06em}
#sb nav{padding:8px 7px;flex:1;overflow-y:auto}
.nb{width:100%;display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:7px;border:none;cursor:pointer;margin-bottom:1px;background:transparent;color:var(--text2);font-size:13px;font-family:inherit;font-weight:500;text-align:left;transition:background .12s,color .12s}
.nb:hover{background:var(--bg3);color:var(--text)}
.nb.on{background:rgba(74,124,95,.1);color:var(--accent);font-weight:700;box-shadow:inset 3px 0 0 var(--accent)}
.ni{font-size:13px;width:18px;text-align:center}
.nbc{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px}
.nsec{font-size:9px;color:var(--text3);letter-spacing:.07em;padding:8px 9px 3px;font-weight:700;margin-top:4px}
.sb-foot{padding:9px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);background:var(--bg3)}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:4px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* MAIN */
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;box-shadow:0 1px 3px rgba(44,38,32,.05);overflow:hidden}
.tb-title{font-size:15px;font-weight:900;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#tbact{display:flex;gap:7px;align-items:center}
#ct{flex:1;overflow-y:auto;padding:18px}

/* INPUTS */
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,124,95,.1)}
select option{background:var(--bg2)}
textarea{resize:vertical}

/* BUTTONS */
.btn{padding:7px 13px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .13s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.bp{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 6px rgba(74,124,95,.2)}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bs{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.bs:hover{background:var(--bg4);color:var(--text)}
.bd{background:rgba(184,64,64,.08);color:var(--red);border:1px solid rgba(184,64,64,.2)}
.bd:hover{background:rgba(184,64,64,.16)}
.bg{background:rgba(58,125,82,.08);color:var(--green);border:1px solid rgba(58,125,82,.2)}
.bb{background:rgba(72,114,168,.08);color:var(--blue);border:1px solid rgba(72,114,168,.2)}
.bsm{padding:4px 8px;font-size:11px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow2)}
.ct{font-size:13px;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:15px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow2)}
.sl{font-size:10px;color:var(--text3);letter-spacing:.05em;margin-bottom:4px;font-weight:700}
.sv{font-size:21px;font-weight:900}
.ss{font-size:11px;color:var(--text3);margin-top:2px}

/* TABLE */
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3)}
th{padding:8px 11px;text-align:left;font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 11px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover td{background:var(--bg3)}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bg-green{background:rgba(58,125,82,.1);color:var(--green)}
.bg-yellow{background:rgba(200,146,42,.1);color:var(--yellow)}
.bg-blue{background:rgba(72,114,168,.1);color:var(--blue)}
.bg-purple{background:rgba(107,95,160,.1);color:var(--purple)}
.bg-gray{background:rgba(160,145,127,.1);color:var(--text3)}
.bg-red{background:rgba(184,64,64,.1);color:var(--red)}
.bg-cyan{background:rgba(58,138,138,.1);color:var(--cyan)}
.tc{background:rgba(72,114,168,.1);color:var(--blue);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.ti{background:rgba(58,125,82,.1);color:var(--green);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.amt{font-size:14px;font-weight:900;color:var(--accent)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(44,38,32,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.mo{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(44,38,32,.16)}
.mo-lg{max-width:860px}
.mt{font-size:15px;font-weight:900;margin-bottom:16px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.fr{margin-bottom:11px}
.fl{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;font-weight:700}
.fr input,.fr select,.fr textarea{width:100%}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mf{display:flex;justify-content:flex-end;gap:7px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}

/* PROJ CARDS */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px;border-top:3px solid;box-shadow:var(--shadow2)}

/* TIMELINE */
.tli{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.tlic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* DETAIL */
.dg{display:grid;grid-template-columns:260px 1fr;gap:13px}
.ir{display:flex;gap:7px;align-items:flex-start;margin-bottom:8px}
.ik{font-size:10px;color:var(--text3);margin-bottom:1px;font-weight:700}
.iv{font-size:13px;color:var(--text2)}

/* TABS */
.tbar{display:flex;gap:2px;margin-bottom:12px;border-bottom:2px solid var(--border)}
.tbtn{padding:7px 13px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .13s}
.tbtn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

/* IMAGES */
.ig{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.docbox-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.ith{position:relative;border-radius:7px;overflow:hidden;aspect-ratio:1;background:var(--bg3);border:1px solid var(--border);cursor:pointer}
.ith img{width:100%;height:100%;object-fit:cover}
.ith .idl{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(184,64,64,.9);border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}
.ith:hover .idl{display:flex}

/* CALENDAR */
.gw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow2)}
.gh{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border)}
.gt{font-size:15px;font-weight:900;flex:1}
.gb{display:flex;overflow:hidden;max-height:600px}
.gdh{display:flex;border-bottom:1px solid var(--border);background:var(--bg3);position:sticky;top:0;z-index:5}
.gdh-c{flex:1;text-align:center;padding:6px 3px;border-right:1px solid var(--border);font-size:11px}
.gdh-c:last-child{border-right:none}
.gdh-dow{font-size:10px;color:var(--text3);font-weight:700}
.gdh-dn{font-size:16px;font-weight:900;line-height:1.1}
.gdh-dn.today{background:var(--accent);color:#fff;border-radius:50%;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.gev{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 4px;font-size:9.5px;font-weight:700;cursor:pointer;overflow:hidden;box-shadow:0 1px 3px rgba(44,38,32,.12);z-index:3;color:#fff}
.gnow{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:10;pointer-events:none}
.gnow::before{content:'';position:absolute;left:-4px;top:-4px;width:9px;height:9px;border-radius:50%;background:var(--red)}
.gcol{flex:1;border-right:1px solid var(--border);position:relative;cursor:pointer}
.gcol:last-child{border-right:none}
.ghr{height:48px;border-bottom:1px dashed rgba(44,38,32,.07)}
.gad{display:flex;min-height:26px;border-bottom:1px solid var(--border);background:rgba(74,124,95,.03)}
.gadc{flex:1;border-right:1px solid var(--border);padding:2px 3px;font-size:9px;cursor:pointer}
.gadc:last-child{border-right:none}
.mtbar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;margin-top:12px;box-shadow:var(--shadow2)}

/* QUOTE EDITOR items */
.qir{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px;margin-bottom:7px;position:relative}
.qia{font-size:11px;font-weight:700;color:var(--accent);text-align:right;padding:5px 7px;background:rgba(74,124,95,.07);border-radius:5px;border:1px solid rgba(74,124,95,.18)}
.qdb{position:absolute;top:7px;right:7px;width:17px;height:17px;border-radius:50%;background:rgba(184,64,64,.1);border:1px solid rgba(184,64,64,.25);color:var(--red);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qadd{width:100%;padding:6px;border-radius:6px;border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;transition:all .13s;display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:9px}
.qadd:hover{border-color:var(--accent);color:var(--accent)}
.qtp{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.qtr{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);padding:2px 0}
.qtr.grand{font-weight:900;font-size:14px;color:var(--accent);border-top:1px solid var(--border);padding-top:6px;margin-top:3px}

/* SUGGEST */
.sugg{position:relative}
.sugl{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:7px;box-shadow:var(--shadow);z-index:50;max-height:150px;overflow-y:auto;margin-top:2px;display:none}
.sugi{padding:7px 11px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px}
.sugi:hover{background:var(--bg3)}
.sugn{padding:7px 11px;cursor:pointer;font-size:12px;color:var(--accent);font-weight:700;border-top:1px solid var(--border)}
.sugn:hover{background:rgba(74,124,95,.07)}

/* CONFIRM */
.cov{position:fixed;inset:0;background:rgba(44,38,32,.45);z-index:300;display:flex;align-items:center;justify-content:center}
.cb{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:26px;max-width:340px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(44,38,32,.18)}

/* EMPTY */
.emp{text-align:center;padding:44px 20px;color:var(--text3)}

/* TOAST */
#toast{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:5px}
.tst{padding:9px 15px;border-radius:8px;font-size:13px;font-weight:500;animation:tin .25s ease;box-shadow:var(--shadow)}
.ctx-item{padding:8px 14px;font-size:12px;cursor:pointer;color:var(--text)}.ctx-item:hover{background:var(--bg3)}
.ts-ok{background:#eaf7f0;border:1px solid #7dbf9a;color:#2d6e4a}
.ts-er{background:#fdf0f0;border:1px solid #d98080;color:#8b3030}
.ts-in{background:#edf3fb;border:1px solid #7da8d4;color:#2c5080}
@keyframes tin{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}

/* PRINT */
@media print{
  @page{size:A4 portrait;margin:10mm 10mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}

/* ============================================================
   MOBILE (スマホ対応)
   ============================================================ */
@media (max-width: 768px){
  /* サイドバーを非表示にして全画面使う */
  #sb{
    position:fixed;top:0;left:0;width:260px;height:100vh;
    z-index:100;transform:translateX(-100%);transition:transform .25s ease;
    box-shadow:2px 0 16px rgba(44,38,32,.18);
  }
  #sb.open{ transform:translateX(0); }
  /* サイドバーオーバーレイ */
  #sb-ov{
    display:none;position:fixed;inset:0;background:rgba(44,38,32,.4);
    z-index:99;
  }
  #sb-ov.open{ display:block; }
  /* メインを全幅に */
  #mn{ width:100%;flex:1; }
  /* トップバー */
  #tb{ padding:0 8px;gap:5px;height:48px; }
  .tb-title{ font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  #tbact{ flex-shrink:0;display:flex;gap:4px;align-items:center; }
  #tbact .btn{ padding:5px 8px;font-size:11px; }
  /* コンテンツ */
  #ct{ padding:10px;padding-bottom:calc(70px + env(safe-area-inset-bottom,0px));overflow-x:hidden; }
  /* テーブルはスクロール */
  .tw{ overflow-x:auto; }
  /* カードグリッドを1列に */
  .sg{ grid-template-columns:1fr 1fr; }
  .pg{ grid-template-columns:1fr; }
  .dg{ grid-template-columns:1fr; }
  .fg{ grid-template-columns:1fr; }
  /* 書類ボックスグリッド */
  .docbox-grid{ grid-template-columns:repeat(2,1fr) !important;gap:8px !important; }
  /* ハンバーガーボタン表示 */
  #mob-menu-btn{ display:flex !important; }
  /* トップバーをシンプルに */
  #tbact .btn.bsm{ font-size:10px;padding:3px 6px; }
  /* ボトムナビ表示 */
  #mob-nav{ display:block !important; }
  /* カレンダー月ビュー: スマホでコンパクトに */
  .gw{ font-size:11px;border-radius:0;border-left:none;border-right:none;margin:0 -10px;width:calc(100% + 20px); }
  .gh{ padding:7px 8px;flex-wrap:nowrap;gap:4px; }
  .gt{ font-size:12px; }
  /* 週ビュー: 天気エリアを小さく */
  .gdh-c{ padding:3px 2px; }
  /* 月ビューのセルフォント */
  .gdh-dow{ font-size:9px; }
  .gdh-dn{ font-size:14px; }
  /* コンテンツの下に余白（ボトムナビ分） */
  #ct{ padding-bottom:calc(70px + env(safe-area-inset-bottom,4px)) !important; }
  /* モーダルをフルスクリーンに近く */
  .mo{ max-width:100%;margin:0; }
  .mo-lg{ max-width:100%; }
  /* テーブルのフォント縮小 */
  td,th{ padding:6px 8px;font-size:12px; }
  /* モーダル内inputのズーム防止（iOS Safari対策） */
  .mo input,.mo select,.mo textarea{ font-size:16px !important; }
}
@media (min-width:769px){
  #mob-menu-btn{ display:none !important; }
  #sb-ov{ display:none!important; }
  #mob-nav{ display:none !important; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="sb-ov" onclick="toggleSb()"></div>
<div id="sb">
  <div class="logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="8" fill="#b08a18"/>
      <rect x="4" y="4" width="12" height="12" rx="2" fill="white" opacity="1"/>
      <rect x="20" y="4" width="12" height="12" rx="2" fill="white" opacity=".75"/>
      <rect x="4" y="20" width="12" height="12" rx="2" fill="white" opacity=".45"/>
      <rect x="20" y="20" width="12" height="12" rx="2" fill="white" opacity=".15"/>
    </svg>
    <div>
      <div class="logo-t" style="font-family:'DM Serif Display',serif;letter-spacing:.04em">BizLock</div>
      <div class="logo-s">CRM v5.0</div>
    </div>
  </div>
  <nav id="sb-nav">
    <button class="nb on" data-page="dashboard"><span class="ni">◈</span>ダッシュボード</button>
    <button class="nb" data-page="customers"><span class="ni">👥</span>顧客管理<span class="nbc" id="bc-c">0</span></button>
    <button class="nb" data-page="projects"><span class="ni">⚡</span>案件・工事管理<span class="nbc" id="bc-p">0</span></button>
    <button class="nb" data-page="quotes"><span class="ni">📄</span>見積・請求管理<span class="nbc" id="bc-q">0</span></button>
    <button class="nb" data-page="schedule"><span class="ni">📅</span>スケジュール</button>
    <button class="nb" data-page="staff"><span class="ni">👷</span>スタッフ・協力会社</button>
    <button class="nb" data-page="stock"><span class="ni">📦</span>在庫管理</button>
    <button class="nb" data-page="docbox"><span class="ni">📁</span>書類ボックス</button>
    <button class="nb" data-page="timeshift"><span class="ni">🕐</span>タイムシフト管理</button>
    <button class="nb" data-page="reservation"><span class="ni">📋</span>予約管理</button>
    <button class="nb" data-page="bizcards"><span class="ni">🪪</span>名刺管理<span class="nbc" id="bc-bc">0</span></button>
    <button class="nb" data-page="settings"><span class="ni">⚙️</span>設定</button>
    <div class="nsec" style="cursor:pointer;display:flex;justify-content:space-between" onclick="toggleDM()">
      データ管理<span id="dm-arr" style="transition:transform .2s">▶</span>
    </div>
    <div id="dm" style="display:none">
      <button class="nb" onclick="exportCSV('customers')"><span class="ni">📤</span>顧客CSV</button>
      <button class="nb" onclick="exportCSV('projects')"><span class="ni">📤</span>案件CSV</button>
      <button class="nb" onclick="exportCSV('quotes')"><span class="ni">📤</span>見積CSV</button>
      <button class="nb" onclick="backupData()"><span class="ni">💾</span>バックアップ</button>
      <button class="nb" onclick="document.getElementById('rf').click()"><span class="ni">📂</span>データ復元</button>

}
function _flush(){
  if(!D)return;
  try{
    localStorage.setItem(K.c,JSON.stringify(D.customers));

    localStorage.setItem(K.rsv,JSON.stringify(D.reservations||[]));
    localStorage.setItem(K.db,JSON.stringify(D.docbox||[]));
    localStorage.setItem(K.id,D.nextId);
    if(D.cfg) localStorage.setItem('s5cfg',JSON.stringify(D.cfg));
    const el=document.getElementById('sv-time');
    if(el) el.textContent='最終保存: '+new Date().toLocaleTimeString('ja-JP');
  }catch(e){
    const el=document.getElementById('sv-time');
    if(el) el.textContent='⚠️ 容量不足';
  }
}
window.addEventListener('beforeunload',()=>{clearTimeout(_st);_flush();});

function nid(){return D.nextId++;}
function genCN(){
  const ns=D.customers.map(c=>parseInt((c.cn||'C-0000').slice(2))||0);

}
function genQN(){
  const ns=D.quotes.map(q=>parseInt((q.qn||'M-00000').slice(2))||0);

}

function jpHols(yr){
  const h={};
  const add=(m,d,n)=>h[`${yr}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`]=n;
  add(1,1,'元日');add(2,11,'建国記念の日');add(2,23,'天皇誕生日');
  add(4,29,'昭和の日');add(5,3,'憲法記念日');add(5,4,'みどりの日');add(5,5,'こどもの日');
  add(8,11,'山の日');add(11,3,'文化の日');add(11,23,'勤労感謝の日');
  const nm=(mo,n)=>{let d=new Date(yr,mo-1,1),dw=d.getDay(),f=dw===1?1:dw===0?2:9-dw;return f+(n-1)*7;};
  add(1,nm(1,2),'成人の日');add(7,nm(7,3),'海の日');add(9,nm(9,3),'敬老の日');add(10,nm(10,2),'スポーツの日');
  add(3,Math.floor(20.8431+0.242194*(yr-1980)-Math.floor((yr-1980)/4)),'春分の日');
  add(9,Math.floor(23.2488+0.242194*(yr-1980)-Math.floor((yr-1980)/4)),'秋分の日');
  Object.entries({...h}).forEach(([ds,n])=>{const d=new Date(ds);if(d.getDay()===0){const ns=new Date(d);ns.setDate(d.getDate()+1);const k=ns.toISOString().slice(0,10);if(!h[k])h[k]='振替休日';}});
  return h;
}

const WE={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌤',53:'🌦',55:'🌧',61:'🌤',63:'🌧',65:'🌧',71:'❄️',73:'❄️',75:'❄️',80:'🌦',81:'🌤',82:'🌧',95:'⛈',96:'⛈',99:'⛈'};
let _wc={};
async function wx(dates){
  const k=dates[0]+'_'+dates[dates.length-1];
  if(_wc[k])return _wc[k];
  try{
    const s=dates[0],e=dates[dates.length-1];
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=38.368&longitude=141.068&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max&wind_speed_unit=ms&timezone=Asia%2FTokyo&start_date='+s+'&end_date='+e);
    const j=await r.json();
    const out={};
    (j.daily?.time||[]).forEach((d,i)=>out[d]={code:j.daily.weathercode[i],max:j.daily.temperature_2m_max[i],min:j.daily.temperature_2m_min[i],wind:Math.round((j.daily.windspeed_10m_max?.[i]||0)*10)/10});
    _wc[k]=out;return out;
  }catch{return{};}
}
function wxHtml(w){
  if(!w)return'';
  return`<div style="font-size:15px;line-height:1">${WE[w.code]||''}</div><div style="font-size:10px;color:#c5724a;font-weight:700">${Math.round(w.max)}°<span style="color:var(--text3);font-weight:400">/${Math.round(w.min)}°</span></div><div style="font-size:9px;color:var(--text3)">💨${w.wind}m/s</div>`;
}

function mobCalWeek(){
  const days=Array.from({length:7},function(_,i){const d=new Date(calWS);d.setDate(calWS.getDate()+i);return d;});
  const dns=['日','月','火','水','木','金','土'];
  const now=new Date();
  const hols=jpHols(calY);
  const label=(days[0].getMonth()+1)+'月'+days[0].getDate()+'日〜'+(days[6].getMonth()+1)+'月'+days[6].getDate()+'日';

  const viewBtns='<div style="display:flex;gap:4px;padding:6px 10px;border-bottom:1px solid var(--border)">'+
    '<button class="btn bsm bs" style="flex:1" onclick="calV=&quot;month&quot;;mobCal()">月</button>'+
    '<button class="btn bsm bp" style="flex:1">週</button>'+
    '<button class="btn bsm bs" style="flex:1" onclick="calV=&quot;day&quot;;pgCal()">日</button>'+
    '<button class="btn bp bsm" style="flex:1" onclick="showSchedMo(null,today())">＋</button>'+
  '</div>';

  var rows=days.map(function(dd){
    const ds=dd.toISOString().slice(0,10);
    const dw=dd.getDay();
    const isT=dd.toDateString()===now.toDateString();
    const hol=hols[ds];
    const isRed=dw===0||hol;
    const ad=calADForDay(ds);
    const sc=calSForDay(ds).sort(function(a,b){return(a.st||'').localeCompare(b.st||'');});
    if(!ad.length&&!sc.length)return'';

    var items='';
    ad.forEach(function(it){
      items+='<div style="display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border)">'+
        '<div style="width:3px;height:28px;border-radius:2px;background:'+(it.phase!==undefined?pc(it.phase):(it.color||'var(--accent)'))+';flex-shrink:0"></div>'+
        '<div><div style="font-size:10px;color:var(--text3)">終日</div>'+
        '<div style="font-size:13px;font-weight:700">'+(it.phase!==undefined?'⚡':'')+esc(it.title)+'</div></div>'+
      '</div>';
    });
    sc.forEach(function(s){
      items+='<div class="mob-sched-item" data-sid="'+s.id+'" data-ds="'+ds+'" style="display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border);cursor:pointer">'+
        '<div style="width:3px;height:36px;border-radius:2px;background:'+(s.color||'var(--accent)')+';flex-shrink:0"></div>'+
        '<div><div style="font-size:11px;color:var(--text3);font-weight:700">'+s.st+'–'+s.et+'</div>'+
        '<div style="font-size:13px;font-weight:700">'+esc(s.title)+'</div>'+(s.staffIds&&s.staffIds.length&&D.staff&&D.staff.length?'<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:3px">'+s.staffIds.slice(0,5).map(function(sid){var st=(D.staff||[]).find(function(x){return x.id===sid;});if(!st)return '';var ini=st.type==='partner'?'協':(st.name||'?').slice(0,1);return '<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:'+(st.color||'#4a7c5f')+';font-size:9px;font-weight:700;color:#fff;flex-shrink:0">'+ini+'</span>';}).join('')+'</div>':'')+'</div></div>'+
      '</div>';
    });

    return'<div>'+
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg3);border-bottom:1px solid var(--border)">'+
        '<span style="font-size:13px;font-weight:700;color:'+(isRed?'var(--red)':dw===6?'var(--blue)':'var(--text)')+'">'+
          (isT?'<span style="background:var(--accent);color:#fff;border-radius:50%;padding:2px 7px;">':'')+(dw===0?'日':dw===1?'月':dw===2?'火':dw===3?'水':dw===4?'木':dw===5?'金':'土')+(dd.getMonth()+1)+'/'+dd.getDate()+(isT?'</span>':'')+
        '</span>'+
        '<button class="btn bs bsm" data-ds="'+ds+'" onclick="showSchedMo(null,this.dataset.ds)">＋</button>'+
      '</div>'+
      items+
    '</div>';
  }).join('');

  if(!rows.trim()){
    rows='<div style="padding:30px;text-align:center;color:var(--text3)">この週の予定はありません</div>';
  }

  document.getElementById('ct').innerHTML=
    '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px">'+
      '<div style="display:flex;align-items:center;padding:8px 10px;gap:6px;border-bottom:1px solid var(--border)">'+
        '<button class="btn bs bsm" id="cprev">◀</button>'+
        '<span style="flex:1;text-align:center;font-size:14px;font-weight:700">'+label+'</span>'+
        '<button class="btn bs bsm" id="ctod" style="font-size:11px">今日</button>'+
        '<button class="btn bs bsm" id="cnext">▶</button>'+
      '</div>'+
      viewBtns+
      rows+
    '</div>';

  bindNav(
    function(){calWS=wkStart(new Date(calWS.getTime()-7*86400000));buildPage();},
    function(){calWS=wkStart(new Date());buildPage();},
    function(){calWS=wkStart(new Date(calWS.getTime()+7*86400000));buildPage();}
  );
  setTimeout(function(){
    document.querySelectorAll('.mob-sched-item').forEach(function(el){
      el.addEventListener('click',function(){showSchedMo(parseInt(this.dataset.sid),this.dataset.ds);});
    });
  },0);

function mobCalDay(){
  const ds=new Date(calY,calM,calD).toISOString().slice(0,10);
  const hols=jpHols(calY);const hol=hols[ds];
  const now=new Date();const isT=new Date(ds).toDateString()===now.toDateString();
  const dns=['日','月','火','水','木','金','土'];

// スマホ専用カレンダー（月グリッド＋日程リスト）

function mobCal(){
  const now=new Date();
  const hols=jpHols(calY);
  const dns=['日','月','火','水','木','金','土'];
  const dim=new Date(calY,calM+1,0).getDate();
  const first=new Date(calY,calM,1).getDay();

  // 月グリッド
  let cells=[];
  const pd=new Date(calY,calM,0).getDate();
  for(let i=first-1;i>=0;i--)cells.push({day:pd-i,cur:false,date:null});
  for(let d=1;d<=dim;d++){
    cells.push({day:d,cur:true,
      date:calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')});
  }
  while(cells.length%7)cells.push({day:cells.length-dim-first+1,cur:false,date:null});

  // 選択日（デフォルト今日 or calD）
  const selDate=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(calD).padStart(2,'0');

  // グリッド - 日付クリックはイベントデリゲーション（後でbindする）
  const gridRows=cells.map(function(c,idx){
    const dw=idx%7;
    const isT=c.cur&&now.getFullYear()===calY&&now.getMonth()===calM&&now.getDate()===c.day;
    const isSel=c.date===selDate;
    const hol=c.date?hols[c.date]:null;
    const isRed=dw===0||hol;
    const hasSched=c.date&&(calSForDay(c.date).length>0||calADForDay(c.date).length>0);
    const bg=isSel?'background:var(--accent);color:#fff;':isT?'background:rgba(74,124,95,.3);':isRed?'color:var(--red);':dw===6?'color:var(--blue);':'';
    return'<div class="mob-cal-cell" data-date="'+(c.date||'')+'" style="text-align:center;padding:3px 1px;cursor:pointer;'+(c.cur?'':'opacity:.3')+'">'+
      '<div style="width:26px;height:26px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;'+bg+'">'+c.day+'</div>'+
      (hasSched?'<div style="width:4px;height:4px;border-radius:50%;background:var(--accent);margin:1px auto 0"></div>':'<div style="height:5px"></div>')+
    '</div>';
  }).join('');



  // 選択日の予定リスト
  function selList(ds){
    if(!ds)return'<div style="padding:20px;text-align:center;color:var(--text3)">日付を選択してください</div>';
    const ad=calADForDay(ds);
    const sc=calSForDay(ds).sort(function(a,b){return(a.st||'').localeCompare(b.st||'');});
    if(!ad.length&&!sc.length){
      return'<div style="padding:20px;text-align:center;color:var(--text3)">予定なし<br><button class="btn bp bsm" style="margin-top:10px" data-date="'+ds+'" onclick="showSchedMo(null,this.dataset.date)">＋ 追加</button></div>';
    }
    var html='';
    ad.forEach(function(it){
      html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer" onclick="'+(it.phase!==undefined?'showProjMo('+it.id+')':'')+'">'+
        '<div style="width:4px;height:36px;border-radius:2px;background:'+(it.color||pc(it.phase)||'var(--accent)')+';flex-shrink:0"></div>'+
        '<div style="flex:1">'+
          '<div style="font-size:11px;color:var(--text3);font-weight:700">終日</div>'+
          '<div style="font-size:14px;font-weight:700">'+(it.phase!==undefined?'⚡':'')+esc(it.title)+'</div>'+
        '</div>'+
      '</div>';
    });
    sc.forEach(function(s){
      html+='<div class="mob-sched-item" data-sid="'+s.id+'" data-ds="'+ds+'" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer">'
        '<div style="width:4px;height:44px;border-radius:2px;background:'+(s.color||'var(--accent)')+';flex-shrink:0"></div>'+
        '<div style="flex:1">'+
          '<div style="font-size:12px;color:var(--text3);font-weight:700">'+s.st+' – '+s.et+'</div>'+
          '<div style="font-size:14px;font-weight:700">'+esc(s.title)+'</div>'+
          (s.memo?'<div style="font-size:11px;color:var(--text3)">'+esc(s.memo)+'</div>':'')+
        '</div>'+
      '</div>';
    });
    return html;
  }

  // 表示する日付ラベル
  const selLabel=(function(){
    if(!selDate)return '';
    const d=new Date(selDate);
    return (d.getMonth()+1)+'月'+d.getDate()+'日（'+dns[d.getDay()]+'）';
  })();

  document.getElementById('ct').innerHTML=
    // ヘッダー
    '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px">'+
      '<div style="display:flex;align-items:center;padding:8px 10px;gap:6px;border-bottom:1px solid var(--border)">'+
        '<button class="btn bs bsm" id="cprev">◀</button>'+
        '<span style="flex:1;text-align:center;font-size:15px;font-weight:900">'+calY+'年 '+(calM+1)+'月</span>'+
        '<button class="btn bs bsm" id="ctod" style="font-size:11px">今日</button>'+
        '<button class="btn bs bsm" id="cnext">▶</button>'+
      '</div>'+
      '<div style="display:flex;gap:4px;padding:6px 10px;border-bottom:1px solid var(--border)">'+
        '<button class="btn bsm bp" style="flex:1">月</button>'+
        '<button class="btn bsm bs" style="flex:1" onclick="calV=&quot;week&quot;;pgCal()">週</button>'+
        '<button class="btn bsm bs" style="flex:1" onclick="calV=&quot;day&quot;;pgCal()">日</button>'+
        '<button class="btn bp bsm" style="flex:1" onclick="showSchedMo(null,today())">＋追加</button>'+
      '</div>'+
      // 曜日ヘッダー
      '<div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">'+
        dns.map(function(d,i){return'<div style="text-align:center;padding:5px 0;font-size:11px;font-weight:700;color:'+(i===0?'var(--red)':i===6?'var(--blue)':'var(--text3)')+'">'+d+'</div>';}).join('')+
      '</div>'+
      // カレンダーグリッド
      '<div style="display:grid;grid-template-columns:repeat(7,1fr)">'+gridRows+'</div>'+
    '</div>'+
    // 選択日の予定
    '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border)">'+
        '<span style="font-size:13px;font-weight:700">'+selLabel+'</span>'+
        '<button class="btn bp bsm" data-ds="'+selDate+'" onclick="showSchedMo(null,this.dataset.ds)">＋ 追加</button>'+
      '</div>'+
      '<div id="mob-sched-list">'+selList(selDate)+'</div>'+
    '</div>';

  bindNav(
    function(){calM--;if(calM<0){calM=11;calY--;}calD=1;buildPage();},
    function(){const d=new Date();calY=d.getFullYear();calM=d.getMonth();calD=d.getDate();buildPage();},
    function(){calM++;if(calM>11){calM=0;calY++;}calD=1;buildPage();}
  );
  // グリッドのクリックイベントをデリゲーション
  setTimeout(function(){
    document.querySelectorAll('.mob-cal-cell').forEach(function(el){
      el.addEventListener('click',function(){
        const ds=this.dataset.date;
        if(ds)mobCalSel(ds);
      });
    });
    // 予定リストのクリック
    document.querySelectorAll('.mob-sched-item').forEach(function(el){
      el.addEventListener('click',function(){
        const sid=parseInt(this.dataset.sid);
        const ds=this.dataset.ds;
        if(sid&&ds)showSchedMo(sid,ds);
      });
    });
  },0);
}

function mobCalSel(ds){
  // 日付タップ → 選択日を変更してリストだけ更新
  const d=new Date(ds);
  calY=d.getFullYear();calM=d.getMonth();calD=d.getDate();
  // グリッドの選択状態を更新
  buildPage();
}

function t2px(t){const[h,m]=(t||'00:00').split(':').map(Number);return(h*60+m)/60*SH;}
function dpx(s,e){return Math.max(t2px(e)-t2px(s),18);}

function mtotBar(){
  const tot=D.projects.filter(p=>{if(!p.ed)return false;const d=new Date(p.ed);return d.getFullYear()===calY&&d.getMonth()===calM&&p.status==='完了';}).reduce((s,p)=>s+p.amount,0);
  return`<div class="mtbar"><div style="font-size:13px;color:var(--text2)">${calY}年${calM+1}月 完了案件売上</div><div class="amt" style="font-size:20px;color:var(--green)">${fmt(tot)}</div></div>`;
}
function _calTeamMemberIds(){
  if(!_calTeamFilter) return null;
  const t=(D.teams||[]).find(x=>x.id===_calTeamFilter);
  return t?t.memberIds||[]:[];
}
function _calMatchesTeam(item){
  const mids=_calTeamMemberIds();
  if(!mids) return true; // 全員モード
  // teamIdが一致するか、staffIdsがチームメンバーと重なるか
  if(item.teamId===_calTeamFilter) return true;
  const sids=item.staffIds||[];
  return sids.some(sid=>mids.includes(sid));
}
function calADForDay(ds){
  const dd=new Date(ds);
  const projs=D.projects.filter(p=>p.sd&&p.ed&&new Date(p.sd)<=dd&&new Date(p.ed)>=dd);
  const scheds=D.schedules.filter(s=>s.date===ds&&s.allDay);
  if(!_calTeamFilter) return[...projs,...scheds];
  const mids=_calTeamMemberIds()||[];
  return[
    ...projs.filter(p=>(p.staffIds||[]).some(sid=>mids.includes(sid))),
    ...scheds.filter(s=>_calMatchesTeam(s))
  ];
}
function calSForDay(ds){
  const all=D.schedules.filter(s=>s.date===ds&&!s.allDay);
  if(!_calTeamFilter) return all;
  return all.filter(s=>_calMatchesTeam(s));
}
function _calTeamTabsHtml(){
  const teams=D.teams||[];
  if(!teams.length) return '';
  const isAll=!_calTeamFilter;
  let html='<div style="display:flex;gap:4px;padding:6px 10px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg3);flex-shrink:0">';
  html+='<button class="btn bsm '+(isAll?'bp':'bs')+'" onclick="_calTeamFilter=null;buildPage()" style="white-space:nowrap;flex-shrink:0">全員</button>';
  teams.forEach(t=>{
    const on=_calTeamFilter===t.id;
    html+='<button class="btn bsm '+(on?'bp':'bs')+'" onclick="_calTeamFilter='+t.id+';buildPage()" style="white-space:nowrap;flex-shrink:0;'+(on?'background:'+t.color+';border-color:'+t.color:'')+'">'+esc(t.name)+'</button>';
  });
  html+='</div>';
  return html;
}

function calWeek(){
  const days=Array.from({length:7},function(_,i){const d=new Date(calWS);d.setDate(calWS.getDate()+i);return d;});

  const nowPx=(now.getHours()*60+now.getMinutes())/60*SH2;
  const isThisWk=days.some(function(d){return d.toDateString()===now.toDateString();});
  const label=(days[0].getMonth()+1)+'月'+days[0].getDate()+'日 〜 '+(days[6].getMonth()+1)+'月'+days[6].getDate()+'日（'+calY+'年）';

  // 終日行

          '<div style="background:'+(it.color||'var(--accent)')+';color:#fff;border-radius:2px;padding:1px 2px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(it.title)+'</div>';
      }).join('')+
    '</div>';
  }).join('');

  // 時間ラベル
  var tlabs=Array.from({length:24},function(_,h){
    return'<div style="height:'+SH2+'px;border-bottom:1px dashed rgba(44,38,32,.07);display:flex;align-items:flex-start;justify-content:flex-end;padding-right:4px;padding-top:2px;font-size:9px;color:var(--text3);flex-shrink:0">'+String(h).padStart(2,'0')+':00</div>';
  }).join('');

  // 日付列
  var dcols=days.map(function(dd){
    const ds=dd.toISOString().slice(0,10);
    const sc=calSForDay(ds);
    const hlines=Array.from({length:24},function(){return'<div style="height:'+SH2+'px;border-bottom:1px dashed rgba(44,38,32,.07)"></div>';}).join('');
    const evs=sc.map(function(s){
      const top=(function(t){const p=t.split(':').map(Number);return(p[0]*60+p[1])/60*SH2;})(s.st||'0:00');
      const ht=Math.max((function(st,et){return(function(t){const p=t.split(':').map(Number);return(p[0]*60+p[1])/60*SH2;})(et)-(function(t){const p=t.split(':').map(Number);return(p[0]*60+p[1])/60*SH2;})(st);})(s.st||'0:00',s.et||'0:00'),18);
      return'<div style="position:absolute;left:1px;right:1px;top:'+top+'px;height:'+ht+'px;background:'+(s.color||'var(--accent)')+';border-radius:3px;padding:1px 3px;font-size:9px;font-weight:700;cursor:pointer;overflow:hidden;color:#fff;z-index:3" draggable=\"true\" ondragstart=\"event.stopPropagation();_calDragStart(event,'+s.id+')\" oncontextmenu=\"event.preventDefault();event.stopPropagation();_calCtxMenu(event,'+s.id+')\" onclick=\"event.stopPropagation();showSchedMo('+s.id+',\''+ds+'\')">'+esc(s.title)+'<br><span style="font-size:8px;opacity:.85">'+s.st+'–'+s.et+'</span><div style="display:flex;flex-wrap:wrap;gap:1px;margin-top:2px">'+(s.staffIds&&s.staffIds.length&&D.staff&&D.staff.length?s.staffIds.slice(0,4).map(function(sid){var st=(D.staff||[]).find(function(x){return x.id===sid;});if(!st)return '';var initial=st.type==='partner'?'協':(st.name||'?').slice(0,1);return '<span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:'+(st.color||'#4a7c5f')+';font-size:8px;font-weight:700;color:#fff;flex-shrink:0;margin-right:1px">'+initial+'</span>';}).join(''):'')+'</div></div>';

    return'<div draggable="true" ondragstart="event.stopPropagation();_calDragStart(event,'+s.id+')" style="position:absolute;left:'+(mob?'38':'58')+'px;right:4px;top:'+top+'px;height:'+ht+'px;background:'+(s.color||'var(--accent)')+';border-radius:4px;padding:2px 5px;font-size:11px;font-weight:700;cursor:grab;overflow:hidden;color:#fff" onclick="event.stopPropagation();showSchedMo('+s.id+',\''+ds+'\')">'+esc(s.title)+'<div style="font-size:9px;opacity:.85">'+s.st+'–'+s.et+'</div><div style="display:flex;flex-wrap:wrap;gap:1px;margin-top:2px">'+(s.staffIds&&s.staffIds.length&&D.staff&&D.staff.length?s.staffIds.slice(0,6).map(function(sid){var st=(D.staff||[]).find(function(x){return x.id===sid;});if(!st)return '';var initial=st.type==='partner'?'協':(st.name||'?').slice(0,1);return '<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:'+(st.color||'#4a7c5f')+';font-size:9px;font-weight:700;color:#fff;flex-shrink:0;margin-right:1px">'+initial+'</span>';}).join(''):'')+'</div></div>';
  }).join('');

  document.getElementById('ct').innerHTML=
    '<div class="gw">'+calNavH(label)+
      '<div style="padding:7px 10px;border-bottom:1px solid var(--border);background:rgba(74,124,95,.03);min-height:24px;font-size:11px">'+
        '<span style="color:var(--text3);font-weight:700">終日：</span>'+
        (ad.length?ad.map(function(it){
          return it.phase!==undefined?
            '<span style="background:'+pc(it.phase)+';color:#fff;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;margin-right:3px">⚡'+esc(it.title)+'</span>':
            '<span style="background:'+(it.color||'var(--accent)')+';color:#fff;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;margin-right:3px">'+esc(it.title)+'</span>';
        }).join(''):'<span style="color:var(--text3)">なし</span>')+

        tlabs+
        (nowPx!==null?'<div style="position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:10;top:'+nowPx+'px;left:'+(mob?'34':'52')+'px"><div style="position:absolute;left:-4px;top:-4px;width:9px;height:9px;border-radius:50%;background:var(--red)"></div></div>':'')+

    function(){const d=new Date(calY,calM,calD-1);calY=d.getFullYear();calM=d.getMonth();calD=d.getDate();buildPage();},

    function(){const d=new Date(calY,calM,calD+1);calY=d.getFullYear();calM=d.getMonth();calD=d.getDate();buildPage();}
  );

function calMonth(){
  const first=new Date(calY,calM,1).getDay();const dim=new Date(calY,calM+1,0).getDate();
  const now=new Date();const hols=jpHols(calY);
  const dns=['日','月','火','水','木','金','土'];
  const mob=window.innerWidth<=768;
  const cellH=mob?72:110;
  let cells=[];
  const pd=new Date(calY,calM,0).getDate();
  for(let i=first-1;i>=0;i--)cells.push({day:pd-i,cur:false,date:null});
  for(let d=1;d<=dim;d++){cells.push({day:d,cur:true,date:`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`});}
  while(cells.length%7)cells.push({day:cells.length-dim-first+1,cur:false,date:null});

  const rows=cells.map(function(c,idx){
    const dw=idx%7;const isT=c.cur&&now.getFullYear()===calY&&now.getMonth()===calM&&now.getDate()===c.day;
    const hol=c.date?hols[c.date]:null;const isRed=dw===0||hol;
    var ev='';
    if(c.date){
      calADForDay(c.date).slice(0,1).forEach(function(it){
        ev+=it.phase!==undefined?
          '<div style="background:'+pc(it.phase)+';color:#fff;border-radius:3px;padding:1px 3px;font-size:9px;font-weight:700;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer" onclick="event.stopPropagation();showProjMo('+it.id+')">⚡'+it.title+'</div>':
          '<div style="background:'+(it.color||'var(--accent)')+';color:#fff;border-radius:3px;padding:1px 3px;font-size:9px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+it.title+'</div>';
      });
      calSForDay(c.date).slice(0,mob?1:2).forEach(function(s){
        ev+='<div draggable="true" ondragstart="event.stopPropagation();_calDragStart(event,'+s.id+')" style="background:'+(s.color||'var(--accent)')+'20;color:'+(s.color||'var(--accent)')+';border-left:2px solid '+(s.color||'var(--accent)')+';border-radius:2px;padding:1px 3px;font-size:9px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:grab;font-weight:700" onclick="event.stopPropagation();showSchedMo('+s.id+',\''+c.date+'\')">'+s.st+' '+esc(s.title)+'</div>';
      });
    }
    const dnStyle=isT?'background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px':(isRed?'color:var(--red)':dw===6?'color:var(--blue)':'');
    return'<div id="mc-'+(c.date||idx)+'" data-ds="'+(c.date||'')+'" ondragover="event.preventDefault()" ondrop="_calDropMonth(event,this)" style="min-height:'+cellH+'px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:3px;'+(!c.cur?'background:var(--bg3);opacity:.55':hol?'background:rgba(184,64,64,.03)':'')+';cursor:pointer;position:relative" onclick="'+(c.date?'_calDayTap(\''+c.date+'\')':'')+'" >'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1px">'+
        '<span style="'+dnStyle+';font-size:11px;font-weight:700">'+c.day+'</span>'+
        (!mob?'<span id="wx-m-'+(c.date||'x')+'" style="display:flex;flex-direction:column;align-items:flex-end;line-height:1"></span>':'')+
      '</div>'+
      (!mob&&hol?'<div style="font-size:8px;color:var(--red);font-weight:700;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">🎌'+hol+'</div>':'')+
      ev+
    '</div>';
  }).join('');

  document.getElementById('ct').innerHTML='<div class="gw">'+calNavH(`${calY}年 ${calM+1}月`)+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">'+
      dns.map(function(d,i){return'<div style="padding:5px 3px;text-align:center;font-size:11px;font-weight:700;color:'+(i===0?'var(--red)':i===6?'var(--blue)':'var(--text3)')+'">'+d+'</div>';}).join('')+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr)">'+rows+'</div>'+
  '</div>'+mtotBar();

  bindNav(
    function(){calM--;if(calM<0){calM=11;calY--;}buildPage();},
    function(){const d=new Date();calY=d.getFullYear();calM=d.getMonth();buildPage();},
    function(){calM++;if(calM>11){calM=0;calY++;}buildPage();}
  );
  // 天気はPCのみ非同期読み込み
  if(!mob){
    (async function(){
      const dates=cells.filter(function(c){return c.cur&&c.date;}).map(function(c){return c.date;});
      if(!dates.length)return;
      const w=await wx(dates);
      dates.forEach(function(ds){const el=document.getElementById('wx-m-'+ds);if(el&&w[ds])el.innerHTML=wxHtml(w[ds]);});
    })();
  }
}

function clickCal(e,ds,col){
  const r=col.getBoundingClientRect();const y=e.clientY-r.top;
  const tot=Math.floor(y/SH*60);const hh=String(Math.floor(tot/60)).padStart(2,'0');
  const mm=String(Math.round(tot%60/15)*15).padStart(2,'0');
  const st=`${hh}:${mm}`;const eh=Math.min(23,parseInt(hh)+(parseInt(mm)>=30?1:0));
  const et=`${String(eh).padStart(2,'0')}:${parseInt(mm)>=30?'00':'30'}`;
  showSchedMo(null,ds,st,et,false);
}

function mo(html,lg){
  const existing=document.getElementById('mo-ov');
  if(existing){
    const inner=existing.querySelector('.mo,.mo-lg');
    if(inner){inner.innerHTML=html;inner.className='mo'+(lg?' mo-lg':'');}
    return;
  }
  const ov=document.createElement('div');ov.className='ov';ov.id='mo-ov';
  ov.innerHTML='<div class="mo'+(lg?' mo-lg':'')+'">'+html+'</div>';
  ov.addEventListener('click',e=>{if(e.target===ov)cmo();});
  document.body.appendChild(ov);
}

function showImgMo(pid){
  const p=D.projects.find(p=>p.id===pid);if(!p)return;
  mo(`<div class="mt">🖼 工事写真 — ${esc(p.title)}</div>
  <div id="img-area">${imgGrid(p.imgs||[],pid)}</div>
  <div style="margin-top:9px"><input type="file" id="img-in" accept="image/*" multiple style="display:none" onchange="uploadImgs(${pid},this)"><button class="btn bp" onclick="document.getElementById('img-in').click()">🖼 写真を追加</button><span style="font-size:11px;color:var(--text3);margin-left:7px">5MB/枚まで</span></div>
  <div class="mf"><button class="btn bs" onclick="cmo()">閉じる</button></div>`);
}
function imgGrid(imgs,pid){
  if(!imgs.length)return`<div style="text-align:center;padding:24px;color:var(--text3)">🖼 写真がまだありません</div>`;
  return`<div class="ig">${imgs.map((img,i)=>`<div class="ith" onclick="viewImg('${img.data}','${esc(img.name)}')"><img src="${img.data}" alt="${esc(img.name)}"><button class="idl" onclick="event.stopPropagation();delImg(${pid},${i})">×</button></div>`).join('')}</div>`;
}
function uploadImgs(pid,inp){
  const files=Array.from(inp.files);if(!files.length)return;
  const p=D.projects.find(p=>p.id===pid);if(!p)return;if(!p.imgs)p.imgs=[];
  let done=0;
  files.forEach(f=>{
    if(f.size>5*1024*1024){toast(`${f.name}は5MB超のためスキップ`,'er');done++;return;}
    const r=new FileReader();r.onload=e=>{p.imgs.push({data:e.target.result,name:f.name,added:today()});done++;
      if(done===files.length){save();const a=document.getElementById('img-area');if(a)a.innerHTML=imgGrid(p.imgs,pid);toast(`${files.length}枚追加しました`);}};r.readAsDataURL(f);
  });
}
function delImg(pid,i){const p=D.projects.find(p=>p.id===pid);if(!p)return;p.imgs.splice(i,1);save();const a=document.getElementById('img-area');if(a)a.innerHTML=imgGrid(p.imgs,pid);toast('写真を削除しました');}
function viewImg(src,nm){const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer';ov.innerHTML=`<img src="${src}" style="max-width:90vw;max-height:85vh;object-fit:contain;border-radius:4px"><div style="color:#aaa;font-size:12px;margin-top:9px">${esc(nm)} — クリックで閉じる</div>`;ov.onclick=()=>ov.remove();document.body.appendChild(ov);}

function _qeSug(q){

  sl.innerHTML=ms.map(c=>`<div class="sugi" onclick="_qeSel(${c.id})"><span style="font-size:10px;color:var(--accent);font-weight:700">${c.cn}</span><span>${c.name}</span></div>`).join('')+
    `<div class="sugn" onclick="_qeNew('${esc(q)}')">＋ 「${esc(q)}」を新規顧客として登録</div>`;
  sl.style.display='block';
}
function _qeSel(cid){
  window._qeSelCid=cid;const c=D.customers.find(c=>c.id===cid);if(!c)return;
  document.getElementById('qe-cn').value=c.name;

  const sel=document.getElementById('qe-pi');if(sel){sel.innerHTML='<option value="">— 案件を選択 —</option>'+D.projects.filter(p=>p.cid===cid).map(p=>`<option value="${p.id}">${p.title}</option>`).join('');}
}
function _qeNew(nm){
  const newC={id:nid(),cn:genCN(),name:nm,contact:'',phone:'',email:'',address:'',type:'法人',status:'アクティブ',memo:'見積書より自動登録',created:today()};

function _qeRI(){
  const el=document.getElementById('qe-items');if(!el)return;
  el.innerHTML=QI.map((it,i)=>`<div class="qir">
    <div style="display:grid;grid-template-columns:1fr 58px 46px 88px 22px;gap:5px;align-items:center;margin-bottom:5px">
      <input type="text" value="${esc(it.name)}" placeholder="品名・内容" oninput="QI[${i}].name=this.value">
      <input type="number" value="${it.qty}" min="0" oninput="QI[${i}].qty=this.value;_qeCA(${i})" style="text-align:right">
      <input type="text" value="${esc(it.unit)}" placeholder="式" oninput="QI[${i}].unit=this.value">
      <input type="number" value="${it.price}" min="0" oninput="QI[${i}].price=this.value;_qeCA(${i})" style="text-align:right">
      <button class="qdb" onclick="QI.splice(${i},1);_qeRI();_qeC()">×</button>
    </div>
    <div style="display:flex;gap:7px;align-items:center">
      <input type="text" value="${esc(it.note)}" placeholder="備考（任意）" oninput="QI[${i}].note=this.value" style="flex:1;font-size:11px">

function _qeAdd(){QI.push({name:'',qty:'1',unit:'式',price:'0',note:''});_qeRI();_qeC();}
function _qeCA(i){// update only changed row amount + totals
  const it=QI[i];const el=document.getElementById('qa-'+i);
  if(el)el.textContent='¥'+fmtN((parseFloat(it.qty)||0)*(parseFloat(it.price)||0));
  _qeC();
}
function _qeC(){
  const sub=QI.reduce((s,it)=>s+(parseFloat(it.qty)||0)*(parseFloat(it.price)||0),0);
  const rate=parseFloat(document.getElementById('qe-tr')?.value||'10');
  const tax=Math.floor(sub*rate/100);
  const upd=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent='¥'+fmtN(v);};
  upd('qe-ts',sub);upd('qe-tt',tax);upd('qe-tg',sub+tax);
  return{sub,tax,total:sub+tax};
}
function _collectQ(){
  const{sub,tax}=_qeC();
  const toNm=gv('qe-cn')||gv('qe-cn');
  return{qn:gv('qe-no'),title:gv('qe-ti'),cid:window._qeSelCid||null,pid:parseInt(gv('qe-pi'))||null,toName:toNm,subject:gv('qe-sb'),date:gv('qe-dt'),validity:gv('qe-vl'),cp:gv('qe-cp'),taxRate:parseFloat(gv('qe-tr')),deliveryPlace:gv('qe-pl'),deliveryDate:gv('qe-dd'),payment:gv('qe-py'),status:gv('qe-st'),memo:gv('qe-me'),items:JSON.parse(JSON.stringify(QI)),amount:sub,tax};
}

  save();_flush();cmo();buildPage();
}
function _saveQP(id){
  if(!gv('qe-ti')){toast('見積書名を入力してください','er');return;}
  const obj=_collectQ();let sid=id;
  if(id&&id!=='null'){const i=D.quotes.findIndex(q=>q.id===id);D.quotes[i]={...D.quotes[i],...obj};}

function pgReservation(){
  if(!D.reservations) D.reservations=[];
  var now=new Date();
  var todayStr=now.toISOString().slice(0,10);
  var DOW=['日','月','火','水','木','金','土'];

  var _rsvView=window._rsvViewState||'today';
  var _rsvCalY=window._rsvCalY||now.getFullYear();
  var _rsvCalM=window._rsvCalM!==undefined?window._rsvCalM:now.getMonth();

  function filtered(){return D.reservations||[];}
  function todayList(){return filtered().filter(function(r){return r.date===todayStr;}).sort(function(a,b){return a.time.localeCompare(b.time);});}

  function render(){
    var tl=todayList();
    var totalPeople=tl.filter(function(r){return r.status!=='キャンセル';}).reduce(function(s,r){return s+(r.people||0);},0);
    var confirmed=tl.filter(function(r){return r.status==='予約中';}).length;
    var arrived=tl.filter(function(r){return r.status==='来店済';}).length;
    var cancelled=tl.filter(function(r){return r.status==='キャンセル';}).length;

    var viewBtns='<div style="display:flex;gap:5px">'+
      '<button class="btn '+(_rsvView==='today'?'bp':'bs')+' bsm" onclick="window._rsvSetView(\'today\')">今日</button>'+
      '<button class="btn '+(_rsvView==='list'?'bp':'bs')+' bsm" onclick="window._rsvSetView(\'list\')">一覧</button>'+
      '<button class="btn '+(_rsvView==='cal'?'bp':'bs')+' bsm" onclick="window._rsvSetView(\'cal\')">カレンダー</button>'+
      '<button class="btn bp bsm" onclick="window._rsvOpenMo()">＋ 予約追加</button>'+
    '</div>';

    var html='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">'+viewBtns+'</div>';

    // サマリカード
    html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">'+
      '<div class="card" style="padding:10px;text-align:center"><div style="font-size:20px;font-weight:700">'+tl.length+'</div><div style="font-size:10px;color:var(--text3)">今日の予約</div></div>'+
      '<div class="card" style="padding:10px;text-align:center"><div style="font-size:20px;font-weight:700">'+totalPeople+'</div><div style="font-size:10px;color:var(--text3)">合計人数</div></div>'+
      '<div class="card" style="padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--green)">'+arrived+'</div><div style="font-size:10px;color:var(--text3)">来店済</div></div>'+
      '<div class="card" style="padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--red)">'+cancelled+'</div><div style="font-size:10px;color:var(--text3)">キャンセル</div></div>'+
    '</div>';

    if(_rsvView==='today'){
      if(!tl.length){
        html+='<div class="card" style="padding:30px;text-align:center;color:var(--text3)">今日の予約はありません<br><button class="btn bp bsm" onclick="window._rsvOpenMo()" style="margin-top:10px">＋ 予約を追加</button></div>';
      }else{
        tl.forEach(function(r){
          var stCol=r.status==='来店済'?'var(--green)':r.status==='キャンセル'?'var(--red)':'var(--blue)';
          html+='<div class="card" style="padding:12px 14px;margin-bottom:6px;cursor:pointer;border-left:3px solid '+stCol+'" onclick="window._rsvOpenMo('+r.id+')">'+
            '<div style="display:flex;align-items:center;gap:10px">'+
              '<div style="font-size:16px;font-weight:900;color:var(--accent);min-width:44px">'+esc(r.time)+'</div>'+
              '<div style="flex:1">'+
                '<div style="font-size:13px;font-weight:700">'+esc(r.name||'名無し')+' <span style="font-size:12px;font-weight:400;color:var(--text3)">'+esc(String(r.people||1))+'名</span></div>'+
                (r.course?'<div style="font-size:11px;color:var(--text3)">'+esc(r.course)+'</div>':'')+
                (r.note?'<div style="font-size:11px;color:var(--text3)">📝 '+esc(r.note)+'</div>':'')+
              '</div>'+
              '<div style="font-size:11px;font-weight:700;color:'+stCol+'">'+esc(r.status)+'</div>'+
            '</div>'+
          '</div>';
        });
      }
    }else if(_rsvView==='list'){
      var listData=filtered().filter(function(r){return r.date>=todayStr;}).sort(function(a,b){return a.date.localeCompare(b.date)||a.time.localeCompare(b.time);});
      if(!listData.length){
        html+='<div class="card" style="padding:30px;text-align:center;color:var(--text3)">予約データがありません</div>';
      }else{
        html+='<div class="tw"><table><thead><tr><th>日時</th><th>お名前</th><th>人数</th><th>コース</th><th>状況</th><th></th></tr></thead><tbody>';
        listData.forEach(function(r){
          var isToday=r.date===todayStr;
          html+='<tr style="cursor:pointer'+(isToday?';background:rgba(74,124,95,.06)':'')+'" onclick="window._rsvOpenMo('+r.id+')">'+
            '<td style="font-weight:'+(isToday?'700':'400')+'">'+esc(r.date.slice(5))+' '+esc(r.time)+'</td>'+
            '<td>'+esc(r.name||'')+'</td>'+
            '<td style="text-align:center">'+esc(String(r.people||1))+'名</td>'+
            '<td style="color:var(--text3)">'+esc(r.course||'')+'</td>'+
            '<td>'+bdg(r.status)+'</td>'+
            '<td><button class="btn bs bsm" onclick="event.stopPropagation();window._rsvOpenMo('+r.id+')">編集</button></td>'+
          '</tr>';
        });
        html+='</tbody></table></div>';
      }
    }else if(_rsvView==='cal'){
      var y=_rsvCalY,m=_rsvCalM;
      var firstDow=new Date(y,m,1).getDay();
      var lastDay=new Date(y,m+1,0).getDate();
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
        '<button class="btn bs bsm" onclick="window._rsvChangeMonth(-1)">◀</button>'+
        '<div style="font-size:13px;font-weight:700">'+y+'年'+(m+1)+'月</div>'+
        '<button class="btn bs bsm" onclick="window._rsvChangeMonth(1)">▶</button>'+
      '</div>';
      html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
      DOW.forEach(function(d,i){

      for(var d=1;d<=lastDay;d++){

        var dow=new Date(y,m,d).getDay();
        var dayRsvs=filtered().filter(function(r){return r.date===ds&&r.status!=='キャンセル';});
        var isToday=ds===todayStr;
        var totalP=dayRsvs.reduce(function(s,r){return s+(r.people||0);},0);
        html+='<div onclick="window._rsvDayTap(\''+ds+'\')" style="min-height:52px;border-radius:6px;padding:4px;cursor:pointer;background:'+(isToday?'rgba(74,124,95,.12)':'var(--bg2)')+';border:'+(isToday?'1.5px solid var(--accent)':'0.5px solid var(--border)')+'">'+
          '<div style="font-size:11px;font-weight:'+(isToday?'900':'500')+';color:'+(dow===0?'var(--red)':dow===6?'var(--blue)':'var(--text)')+'">'+d+'</div>'+
          (dayRsvs.length>0?'<div style="font-size:9px;color:var(--accent);font-weight:700">'+dayRsvs.length+'件</div><div style="font-size:9px;color:var(--text3)">'+totalP+'名</div>':'')+
        '</div>';
      }
      html+='</div>';
    }

    document.getElementById('ct').innerHTML=html;
  }

  // 予約モーダル
  window._rsvOpenMo=function(id){
    var r=id?(D.reservations||[]).find(function(x){return x.id===id;}):null;
    var statusOpts=['予約中','来店済','キャンセル'].map(function(s){return '<option '+(r?.status===s?'selected':'')+'>'+s+'</option>';}).join('');
    mo('<div class="mt">'+(r?'予約を編集':'予約を追加')+'</div>'+
      '<div class="fg">'+
        '<div class="fr"><label class="fl">日付</label><input type="date" id="rsv-date" value="'+(r?.date||todayStr)+'"></div>'+
        '<div class="fr"><label class="fl">時間</label><input type="time" id="rsv-time" value="'+(r?.time||'18:00')+'"></div>'+
        '<div class="fr"><label class="fl">お名前</label><input id="rsv-name" value="'+esc(r?.name||'')+'" placeholder="山田 花子"></div>'+
        '<div class="fr"><label class="fl">人数</label><input type="number" id="rsv-people" value="'+(r?.people||2)+'" min="1" max="99" style="width:80px"> 名</div>'+
        '<div class="fr"><label class="fl">コース</label><input id="rsv-course" value="'+esc(r?.course||'')+'" placeholder="コース名（任意）"></div>'+
        '<div class="fr"><label class="fl">電話番号</label><input id="rsv-tel" value="'+esc(r?.tel||'')+'" placeholder="090-0000-0000"></div>'+
        '<div class="fr" style="grid-column:1/-1"><label class="fl">状況</label><select id="rsv-status">'+statusOpts+'</select></div>'+
        '<div class="fr" style="grid-column:1/-1"><label class="fl">メモ・特記事項</label><textarea id="rsv-note" rows="2" placeholder="アレルギー・記念日など">'+esc(r?.note||'')+'</textarea></div>'+
      '</div>'+
      '<div class="mf">'+
        (r?'<button class="btn bd" onclick="window._rsvDel('+r.id+')">🗑 削除</button>':'')+
        '<button class="btn bs" onclick="cmo()">キャンセル</button>'+
        '<button class="btn bp" onclick="window._rsvSave('+(r?.id||'null')+')">💾 保存</button>'+
      '</div>');
  };

  window._rsvSave=function(id){
    if(!D.reservations)D.reservations=[];
    var obj={
      date:document.getElementById('rsv-date')?.value||todayStr,
      time:document.getElementById('rsv-time')?.value||'18:00',
      name:document.getElementById('rsv-name')?.value.trim()||'',
      people:parseInt(document.getElementById('rsv-people')?.value)||1,
      course:document.getElementById('rsv-course')?.value.trim()||'',
      tel:document.getElementById('rsv-tel')?.value.trim()||'',
      status:document.getElementById('rsv-status')?.value||'予約中',
      note:document.getElementById('rsv-note')?.value.trim()||'',
    };
    if(!obj.name){toast('お名前を入力してください','er');return;}
    if(id&&id!=='null'){
      var idx=D.reservations.findIndex(function(r){return r.id===id;});
      if(idx>=0)D.reservations[idx]={...D.reservations[idx],...obj};
    }else{
      D.reservations.push({...obj,id:nid(),created:new Date().toISOString()});
    }
    save();_flush();cmo();toast('予約を保存しました ✅');render();
  };

  window._rsvDel=function(id){
    D.reservations=(D.reservations||[]).filter(function(r){return r.id!==id;});
    save();_flush();cmo();toast('削除しました');render();
  };

  window._rsvSetView=function(v){_rsvView=v;window._rsvViewState=v;render();};
  window._rsvDayTap=function(ds){_rsvView='today';window._rsvViewState='today';render();};
  window._rsvChangeMonth=function(d){
    _rsvCalM+=d;
    if(_rsvCalM>11){_rsvCalM=0;_rsvCalY++;}
    if(_rsvCalM<0){_rsvCalM=11;_rsvCalY--;}
    window._rsvCalY=_rsvCalY;window._rsvCalM=_rsvCalM;
    render();
  };

  render();
}

var _dbSrch='',_dbComposing=false,_dbDsrT=null;
var _dbTab='all'; // all, photo, contract, drawing, report

function collectAllDocs(){
  // 全ソースからファイルを集約して1つの配列にする
  var docs=[];

  // 1. 手動アップロード（D.docbox）
  (D.docbox||[]).forEach(function(d){
    docs.push({
      src:'manual', id:d.id, name:d.name||'', type:d.type||'other',
      data:d.data, mime:d.mime||'', cid:d.cid||null, pid:d.pid||null, sid:d.sid||null,
      date:d.date||d.created||'', memo:d.memo||'', tags:d.tags||[],
      custName:d.cid?cname(d.cid):'', projName:d.pid?pname(d.pid):''
    });
  });

  // 2. 案件の工事写真（imgs）
  (D.projects||[]).forEach(function(p){
    (p.imgs||[]).forEach(function(img,i){
      docs.push({
        src:'proj-img', id:'pi-'+p.id+'-'+i, name:img.name||'工事写真', type:'photo',
        data:img.data, mime:'image/jpeg', cid:p.cid||null, pid:p.id, sid:null,
        date:img.added||p.created||'', memo:p.title,
        custName:p.cid?cname(p.cid):'', projName:p.title||''
      });
    });
  });

  // 3. 施工内容の写真（workRecords）
  (D.projects||[]).forEach(function(p){
    (p.workRecords||[]).forEach(function(wr){
      (wr.beforeImgs||[]).forEach(function(img,i){
        docs.push({
          src:'wr-before', id:'wb-'+p.id+'-'+wr.id+'-'+i, name:img.name||'施工前', type:'photo',
          data:img.data, mime:'image/jpeg', cid:p.cid||null, pid:p.id, sid:null,
          date:wr.date||'', memo:wr.title+' (施工前)',
          custName:p.cid?cname(p.cid):'', projName:p.title||''
        });
      });
      (wr.afterImgs||[]).forEach(function(img,i){
        docs.push({
          src:'wr-after', id:'wa-'+p.id+'-'+wr.id+'-'+i, name:img.name||'施工後', type:'photo',
          data:img.data, mime:'image/jpeg', cid:p.cid||null, pid:p.id, sid:null,
          date:wr.date||'', memo:wr.title+' (施工後)',
          custName:p.cid?cname(p.cid):'', projName:p.title||''
        });
      });
    });
  });

  // 4. 保有機器の写真
  (D.customers||[]).forEach(function(c){
    (c.equipment||[]).forEach(function(eq,ei){
      (eq.photos||[]).forEach(function(ph,pi){
        docs.push({
          src:'equip', id:'eq-'+c.id+'-'+ei+'-'+pi, name:eq.name||'機器写真', type:'photo',
          data:ph, mime:'image/jpeg', cid:c.id, pid:null, sid:null,
          date:'', memo:eq.name+(eq.model?' '+eq.model:''),
          custName:c.name||'', projName:''
        });
      });
    });
  });

  // 日付降順ソート
  docs.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
  return docs;
}

function pname(pid){
  var p=(D.projects||[]).find(function(pr){return pr.id===pid;});
  return p?p.title:'';
}

function saveDocUpload(){
  var fileInput=document.getElementById('db-file');
  if(!fileInput||!fileInput.files.length){toast('ファイルを選択してください','er');return;}
  if(!D.docbox) D.docbox=[];

  var type=document.getElementById('db-type').value;
  var cid=parseInt(document.getElementById('db-cid').value)||null;
  var pid=parseInt(document.getElementById('db-pid').value)||null;
  var date=document.getElementById('db-date').value||today();
  var memo=document.getElementById('db-memo').value.trim();
  var customName=document.getElementById('db-name').value.trim();

  var files=Array.from(fileInput.files);
  var done=0;
  files.forEach(function(f){
    if(f.size>5*1024*1024){toast(f.name+'は5MB超のためスキップ','er');done++;return;}
    var r=new FileReader();
    r.onload=function(e){
      D.docbox.push({
        id:nid(),
        name:customName||(files.length>1?f.name:customName||f.name),
        type:type,
        data:e.target.result,
        mime:f.type||'',
        cid:cid, pid:pid, sid:null,
        date:date,
        created:today(),
        memo:memo,
        tags:[]
      });
      done++;
      if(done===files.length){
        save();_flush();cmo();buildPage();
        toast(files.length+'件の書類を追加しました ✅');
      }
    };
    r.readAsDataURL(f);
  });
}

// TIMESHIFT タイムシフト管理
// ============================================================
let _tsView='month',_tsY=new Date().getFullYear(),_tsM=new Date().getMonth(),_tsD=new Date().getDate(),_tsStore='all';

// スタッフ略称名を生成（3〜4文字、重複時はアルファベット付加）
function _tsShortNames(staffList){
  var result={};
  // まず各スタッフの略称候補を生成
  var candidates=staffList.map(function(s){
    var nm=(s.name||'').replace(/\s+/g,'');
    // 姓名を分離して姓3文字を基本候補に
    var parts=(s.name||'').trim().split(/\s+/);
    if(parts.length>=2){
      var sei=parts[0];var mei=parts[1];
      return {id:s.id, short:sei.slice(0,3), full:nm};
    }
    return {id:s.id, short:nm.slice(0,4), full:nm};
  });
  // 重複チェック→重複があれば名前1文字追加、それでもダメならA,B...付加
  var used={};
  candidates.forEach(function(c){
    var key=c.short;
    if(!used[key]){used[key]=[c];} else {used[key].push(c);}
  });
  Object.keys(used).forEach(function(key){
    var group=used[key];
    if(group.length===1){
      result[group[0].id]=key;
    }else{
      // 名前の1文字目を追加して区別を試みる
      var resolved={};
      group.forEach(function(c){
        var parts=((staffList.find(function(s){return s.id===c.id;})||{}).name||'').trim().split(/\s+/);
        var longer=parts.length>=2?parts[0].slice(0,2)+parts[1].slice(0,1):c.full.slice(0,4);
        if(!resolved[longer]){resolved[longer]=[c.id];}else{resolved[longer].push(c.id);}
      });
      var alpha=0;
      Object.keys(resolved).forEach(function(lk){
        var ids=resolved[lk];
        if(ids.length===1){
          result[ids[0]]=lk;
        }else{
          ids.forEach(function(id){
            result[id]=lk+String.fromCharCode(65+alpha);
            alpha++;
          });
        }
      });
    }
  });
  return result;
}

function _tsDaysInMonth(){return new Date(_tsY,_tsM+1,0).getDate();}
function _tsDateStr(d){return _tsY+'-'+String(_tsM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function _tsDayDateStr(){return _tsY+'-'+String(_tsM+1).padStart(2,'0')+'-'+String(_tsD).padStart(2,'0');}
function _tsKey(staffId,ds){return 'main_'+staffId+'_'+ds;}
function _tsGet(staffId,ds){return(D.timeShifts||{})[_tsKey(staffId,ds)]||null;}
function _tsWorkHours(shift){
  if(!shift||shift.type==='off')return 0;
  var p=function(t){var a=(t||'0:00').split(':');return parseInt(a[0])*60+(parseInt(a[1])||0);};
  var total=p(shift.et)-p(shift.st);
  if(shift.brk){var bp=shift.brk.split('-');if(bp.length===2)total-=(p(bp[1])-p(bp[0]));}
  return Math.max(0,total/60);
}
function _tsDow(ds){return['日','月','火','水','木','金','土'][new Date(ds).getDay()];}
function _tsIsWeekend(ds){var d=new Date(ds).getDay();return d===0||d===6;}

function pgTimeShift(){
  if(!D.timeShifts)D.timeShifts={};
  var staff=(D.staff||[]).filter(function(s){return s.type==='staff';});
  if(_tsView==='day') return _tsRenderDay(staff);
  _tsRenderMonth(staff);
}

      '<div style="font-size:8px;color:'+(we?'var(--red)':'var(--text3)')+'">'+dw+'</div>'+

        var sMin=p(sh.st);var eMin=p(sh.et);
        var left=Math.round(sMin/1440*100);var width=Math.round((eMin-sMin)/1440*100);

        label='<div style="font-size:8px;color:var(--text3);text-align:center;margin-top:14px">'+h.toFixed(1)+'</div>';
      }else if(sh&&sh.type==='off'){

        esc(sn)+

    var count=0;
    staff.forEach(function(s){var sh=_tsGet(s.id,ds);if(sh&&sh.type==='work')count++;});

    '<span style="font-size:15px;font-weight:900;min-width:120px;text-align:center">'+_tsY+'年'+(_tsM+1)+'月</span>'+
    '<button class="btn bs bsm" onclick="_tsM++;if(_tsM>11){_tsM=0;_tsY++;}buildPage()">▶</button>'+
    '<button class="btn bs bsm" onclick="var n=new Date();_tsY=n.getFullYear();_tsM=n.getMonth();buildPage()">今月</button>'+

    '</div>';

function _tsRenderDay(staff){

    '<button class="btn bs bsm" onclick="var d=new Date(_tsY,_tsM,_tsD-1);_tsY=d.getFullYear();_tsM=d.getMonth();_tsD=d.getDate();buildPage()">◀</button>'+

  '</div>';

  // 時間軸ヘッダー（6時〜22時）

  var shortNames=_tsShortNames(staff);
  var mob=window.innerWidth<=768;
  var rows='';
  staff.forEach(function(s){
    var sh=_tsGet(s.id,ds);
    var cells='';
    if(sh&&sh.type==='work'){
      var p=function(t){var a=(t||'0:00').split(':');return parseInt(a[0])*60+(parseInt(a[1])||0);};
      var sMin=p(sh.st);var eMin=p(sh.et);
      var brkS=-1,brkE=-1;
      if(sh.brk){var bp=sh.brk.split('-');if(bp.length===2){brkS=p(bp[0]);brkE=p(bp[1]);}}
      hours.forEach(function(h){
        var hMin=h*60;var hEnd=(h+1)*60;
        var inWork=sMin<hEnd&&eMin>hMin;
        var inBrk=brkS>=0&&brkS<hEnd&&brkE>hMin;
        var bg='transparent';
        if(inWork&&inBrk)bg='repeating-linear-gradient(45deg,'+(s.color||'var(--accent)')+'33,'+(s.color||'var(--accent)')+'33 4px,rgba(200,146,42,.2) 4px,rgba(200,146,42,.2) 8px)';
        else if(inWork)bg=(s.color||'var(--accent)')+'44';
        cells+='<td style="min-width:40px;height:28px;border-left:1px solid var(--border);background:'+bg+';cursor:pointer" onclick="_tsOpenMo('+s.id+',\''+ds+'\')"></td>';
      });

      hours.forEach(function(){
        cells+='<td style="min-width:40px;height:28px;border-left:1px solid var(--border);background:rgba(184,64,64,.06);text-align:center;cursor:pointer" onclick="_tsOpenMo('+s.id+',\''+ds+'\')"></td>';
      });
    }else{
      hours.forEach(function(){
        cells+='<td style="min-width:40px;height:28px;border-left:1px solid var(--border);cursor:pointer" onclick="_tsOpenMo('+s.id+',\''+ds+'\')"></td>';
      });
    }
    var wh=_tsWorkHours(sh);
    var whTxt=sh?(sh.type==='off'?'<span style="color:var(--red)">休</span>':wh.toFixed(1)+'h'):'<span style="color:var(--text3)">—</span>';
    var sn=shortNames[s.id]||esc(s.name).slice(0,4);
    var nameW=mob?'48':'70';var hW=mob?'32':'42';
    rows+='<tr>'+
      '<td style="position:sticky;left:0;z-index:2;background:var(--bg2);min-width:'+nameW+'px;white-space:nowrap;font-size:'+(mob?'10':'12')+'px;font-weight:700;padding:4px '+(mob?'3':'6')+'px;border-right:1px solid var(--border)">'+esc(sn)+'</td>'+
      '<td style="position:sticky;left:'+nameW+'px;z-index:2;background:var(--bg2);min-width:'+hW+'px;text-align:right;font-size:'+(mob?'9':'10')+'px;font-weight:700;color:var(--accent);padding:4px '+(mob?'2':'4')+'px;border-right:1px solid var(--border)">'+whTxt+'</td>'+
      cells+'</tr>';
  });

  // カバレッジバー
  var coverCells='';
  hours.forEach(function(h){
    var hMin=h*60;var hEnd=(h+1)*60;
    var count=0;
    staff.forEach(function(s){
      var sh=_tsGet(s.id,ds);
      if(!sh||sh.type!=='work')return;
      var p=function(t){var a=(t||'0:00').split(':');return parseInt(a[0])*60+(parseInt(a[1])||0);};
      if(p(sh.st)<hEnd&&p(sh.et)>hMin)count++;
    });
    var ratio=staff.length?count/staff.length:0;
    var clr=ratio>=0.5?'var(--green)':ratio>=0.25?'var(--yellow)':'var(--red)';
    coverCells+='<td style="min-width:40px;text-align:center;padding:3px 0;font-size:10px;font-weight:700;border-left:1px solid var(--border);color:'+(count?clr:'var(--text3)')+'">'+count+'</td>';
  });

  document.getElementById('ct').innerHTML=
    '<div style="max-width:100%;margin:0 auto">'+navHtml+
      '<div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);box-shadow:var(--shadow2)">'+
        '<table style="border-collapse:collapse;width:max-content;min-width:100%">'+
          '<thead><tr><th style="position:sticky;left:0;z-index:3;background:var(--bg3);min-width:'+(mob?'48':'70')+'px;padding:4px '+(mob?'3':'6')+'px;border-right:1px solid var(--border);font-size:10px;text-align:left">名前</th><th style="position:sticky;left:'+(mob?'48':'70')+'px;z-index:3;background:var(--bg3);min-width:'+(mob?'32':'42')+'px;padding:4px 2px;border-right:1px solid var(--border);font-size:9px;text-align:right">時間</th>'+thHtml+'</tr></thead>'+
          '<tbody>'+rows+
            '<tr style="border-top:2px solid var(--border)"><td style="position:sticky;left:0;z-index:2;background:var(--bg3);padding:4px '+(mob?'3':'6')+'px;border-right:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text3)">人数</td><td style="position:sticky;left:'+(mob?'48':'70')+'px;z-index:2;background:var(--bg3);border-right:1px solid var(--border)"></td>'+coverCells+'</tr>'+
          '</tbody>'+
        '</table>'+
      '</div>'+
      (!staff.length?'<div class="card" style="text-align:center;padding:24px;margin-top:12px;color:var(--text3)">スタッフが登録されていません</div>':'')+
    '</div>';
}

        '<div class="fr"><label class="fl">休憩終了</label><input type="time" id="ts-be" value="'+brk[1]+'"></div>'+
      '</div>'+

      (sh?'<button class="btn bd" onclick="_tsDel('+staffId+',\''+ds+'\')">🗑 削除</button>':'')+
      '<button class="btn bs" onclick="cmo()">キャンセル</button>'+
      '<button class="btn bp" onclick="_tsSave('+staffId+',\''+ds+'\')">💾 保存</button>'+

function _tsSave(staffId,ds){
  if(!D.timeShifts)D.timeShifts={};
  var type=document.getElementById('ts-type')?.value;
  var key=_tsKey(staffId,ds);
  if(type==='work'){
    D.timeShifts[key]={
      type:'work',
      st:document.getElementById('ts-st')?.value||'09:00',
      et:document.getElementById('ts-et')?.value||'18:00',
      brk:(document.getElementById('ts-bs')?.value||'12:00')+'-'+(document.getElementById('ts-be')?.value||'13:00')
    };
    toast('シフトを保存しました ✅');
  }else if(type==='off'){
    D.timeShifts[key]={type:'off'};
    toast('希望休を設定しました ✅');
  }else{
    delete D.timeShifts[key];
    toast('シフトを解除しました');
  }
  save();_flush();cmo();buildPage();
}

function printOrderSheet(){
  if(!D.stockItems) D.stockItems=[];
  var targets=D.stockItems.filter(function(i){return i.qty<=(i.reorder||0);});
  if(!targets.length){toast('発注点以下の品目はありません','in');return;}

  var cfg=D.cfg||{};
  var now=new Date();
  var ds=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';

  // 発注先ごとにグループ化
  var groups={};
  targets.forEach(function(i){
    var sup=i.supplier||'（発注先未設定）';
    if(!groups[sup]) groups[sup]=[];
    groups[sup].push(i);
  });

  // テーブル行を生成

    var items=groups[sup];
    tableRows+='<tr><td colspan="6" style="background:var(--bg3);font-weight:900;font-size:12px;padding:6px 10px;border-bottom:2px solid var(--border)">発注先：'+esc(sup)+' （'+items.length+'件）</td></tr>';
    items.forEach(function(i){
      var orderQty=Math.max(1,(i.reorder||0)-i.qty);
      tableRows+='<tr>'+
        '<td style="font-weight:700">'+esc(i.name)+'</td>'+
        '<td style="text-align:center">'+esc(i.unit||'')+'</td>'+

        '<td style="color:var(--text3)">'+esc(i.supplier||'')+'</td>'+

  mo('<div class="mt">🖨️ 発注書プレビュー</div>'+

      '</div>'+
      '<div style="text-align:right">'+
        '<div style="font-size:20px;font-weight:900;color:var(--red)">'+targets.length+'品目</div>'+
        '<div style="font-size:11px;color:var(--text3)">'+Object.keys(groups).length+'社</div>'+
      '</div>'+
    '</div>'+
    '<div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px">'+
      '<table style="width:100%;border-collapse:collapse;font-size:12px">'+
        '<thead><tr style="background:var(--bg3)">'+
          '<th style="padding:6px 8px;text-align:left">品名</th>'+
          '<th style="padding:6px 4px;text-align:center;width:40px">単位</th>'+
          '<th style="padding:6px 4px;text-align:right;width:60px">現在庫</th>'+
          '<th style="padding:6px 4px;text-align:right;width:60px">発注点</th>'+
          '<th style="padding:6px 4px;text-align:right;width:60px">発注数</th>'+
