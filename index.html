<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="セイノデンキCRM">
<meta name="theme-color" content="#4a7c5f">
<title>セイノデンキ CRM</title>
<style>
/* System fonts first - instant render, no network */
:root{
  --bg:#f4f3f1;--bg2:#ffffff;--bg3:#ede9e4;--bg4:#e6e0d8;
  --border:#d6cfc6;--border2:#c8bfb4;
  --text:#2c2620;--text2:#6b5e52;--text3:#a0917f;
  --accent:#4a7c5f;--accent2:#c5724a;--accent3:#8b6f47;
  --blue:#4872a8;--green:#3a7d52;--red:#b84040;
  --purple:#6b5fa0;--cyan:#3a8a8a;--yellow:#c8922a;
  --shadow:0 2px 12px rgba(44,38,32,.09);
  --shadow2:0 1px 4px rgba(44,38,32,.06);
  --radius:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);display:flex;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* SIDEBAR */
#sb{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo svg{flex-shrink:0}
.logo-t{font-size:13px;font-weight:900;color:var(--text)}
.logo-s{font-size:9px;color:var(--text3);letter-spacing:.06em}
#sb nav{padding:8px 7px;flex:1;overflow-y:auto}
.nb{width:100%;display:flex;align-items:baseline;gap:8px;padding:8px 9px;border-radius:7px;border:none;cursor:pointer;margin-bottom:1px;background:transparent;color:var(--text2);font-size:13px;font-family:inherit;font-weight:500;text-align:left;transition:background .12s,color .12s}
.nb:hover{background:var(--bg3);color:var(--text)}
.nb.on{background:rgba(74,124,95,.1);color:var(--accent);font-weight:700;box-shadow:inset 3px 0 0 var(--accent)}
.ni{font-size:13px;width:18px;text-align:center}
.nbc{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px}
.nsec{font-size:9px;color:var(--text3);letter-spacing:.07em;padding:8px 9px 3px;font-weight:700;margin-top:4px}
.sb-foot{padding:9px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);background:var(--bg3)}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:4px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* MAIN */
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;box-shadow:0 1px 3px rgba(44,38,32,.05)}
.tb-title{font-size:15px;font-weight:900;color:var(--text);flex:1}
#tbact{display:flex;gap:7px;align-items:center}
#ct{flex:1;overflow-y:auto;padding:18px}

/* INPUTS */
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,124,95,.1)}
select option{background:var(--bg2)}
textarea{resize:vertical}

/* BUTTONS */
.btn{padding:7px 13px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .13s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.bp{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 6px rgba(74,124,95,.2)}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bs{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.bs:hover{background:var(--bg4);color:var(--text)}
.bd{background:rgba(184,64,64,.08);color:var(--red);border:1px solid rgba(184,64,64,.2)}
.bd:hover{background:rgba(184,64,64,.16)}
.bg{background:rgba(58,125,82,.08);color:var(--green);border:1px solid rgba(58,125,82,.2)}
.bb{background:rgba(72,114,168,.08);color:var(--blue);border:1px solid rgba(72,114,168,.2)}
.bsm{padding:4px 8px;font-size:11px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow2)}
.ct{font-size:13px;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:15px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow2)}
.sl{font-size:10px;color:var(--text3);letter-spacing:.05em;margin-bottom:4px;font-weight:700}
.sv{font-size:21px;font-weight:900}
.ss{font-size:11px;color:var(--text3);margin-top:2px}

/* TABLE */
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3)}
th{padding:8px 11px;text-align:left;font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:9px 11px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover td{background:var(--bg3)}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bg-green{background:rgba(58,125,82,.1);color:var(--green)}
.bg-yellow{background:rgba(200,146,42,.1);color:var(--yellow)}
.bg-blue{background:rgba(72,114,168,.1);color:var(--blue)}
.bg-purple{background:rgba(107,95,160,.1);color:var(--purple)}
.bg-gray{background:rgba(160,145,127,.1);color:var(--text3)}
.bg-red{background:rgba(184,64,64,.1);color:var(--red)}
.bg-cyan{background:rgba(58,138,138,.1);color:var(--cyan)}
.tc{background:rgba(72,114,168,.1);color:var(--blue);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.ti{background:rgba(58,125,82,.1);color:var(--green);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.amt{font-size:14px;font-weight:900;color:var(--accent)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(44,38,32,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.mo{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(44,38,32,.16)}
.mo-lg{max-width:860px}
.mt{font-size:15px;font-weight:900;margin-bottom:16px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.fr{margin-bottom:11px}
.fl{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;font-weight:700}
.fr input,.fr select,.fr textarea{width:100%}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mf{display:flex;justify-content:flex-end;gap:7px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}

/* PROJ CARDS */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px;border-top:3px solid;box-shadow:var(--shadow2)}

/* TIMELINE */
.tli{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.tlic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* DETAIL */
.dg{display:grid;grid-template-columns:260px 1fr;gap:13px}
.ir{display:flex;gap:7px;align-items:flex-start;margin-bottom:8px}
.ik{font-size:10px;color:var(--text3);margin-bottom:1px;font-weight:700}
.iv{font-size:13px;color:var(--text2)}

/* TABS */
.tbar{display:flex;gap:2px;margin-bottom:12px;border-bottom:2px solid var(--border)}
.tbtn{padding:7px 13px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .13s}
.tbtn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

/* IMAGES */
.ig{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.ith{position:relative;border-radius:7px;overflow:hidden;aspect-ratio:1;background:var(--bg3);border:1px solid var(--border);cursor:pointer}
.ith img{width:100%;height:100%;object-fit:cover}
.ith .idl{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(184,64,64,.9);border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}
.ith:hover .idl{display:flex}

/* CALENDAR */
.gw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow2)}
.gh{display:flex;align-items:baseline;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border)}
.gt{font-size:15px;font-weight:900;flex:1}
.gb{display:flex;flex-direction:column;overflow:hidden;height:580px}
.gdh{display:flex;flex:1}
.gdh-c{flex:1;text-align:center;padding:6px 3px;border-right:1px solid var(--border);font-size:11px}
.gdh-c:last-child{border-right:none}
.gdh-dow{font-size:10px;color:var(--text3);font-weight:700}
.gdh-dn{font-size:16px;font-weight:900;line-height:1.1}
.gdh-dn.today{background:var(--accent);color:#fff;border-radius:50%;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.gev{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 4px;font-size:9.5px;font-weight:700;cursor:grab;overflow:hidden;box-shadow:0 1px 3px rgba(44,38,32,.12);z-index:3;color:#fff;transition:opacity .1s,box-shadow .1s;user-select:none}
.gev:active{cursor:grabbing}
.gev.dragging{opacity:.55;box-shadow:0 4px 16px rgba(44,38,32,.3);z-index:50}
.gev.resizing{opacity:.85;box-shadow:0 4px 16px rgba(44,38,32,.3);z-index:50}
.gcol.drag-over{background:rgba(74,124,95,.07)}
.drag-ghost{position:fixed;pointer-events:none;z-index:999;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;color:#fff;box-shadow:0 4px 16px rgba(44,38,32,.3);opacity:.85;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.gev-resize{position:absolute;bottom:0;left:0;right:0;height:7px;cursor:ns-resize;background:rgba(255,255,255,.25);border-radius:0 0 4px 4px;display:flex;align-items:center;justify-content:center}
.gev-resize::after{content:'';width:20px;height:2px;background:rgba(255,255,255,.6);border-radius:1px}
.resize-tooltip{position:fixed;background:rgba(0,0,0,.75);color:#fff;font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;pointer-events:none;z-index:999;display:none}
.gnow{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:10;pointer-events:none}
.gnow::before{content:'';position:absolute;left:-4px;top:-4px;width:9px;height:9px;border-radius:50%;background:var(--red)}
.gcol{flex:1;border-right:1px solid var(--border);position:relative;cursor:pointer}
.gcol:last-child{border-right:none}
.ghr{height:48px;border-bottom:1px dashed rgba(44,38,32,.08)}
.gad{display:flex;min-height:26px;background:rgba(74,124,95,.03)}
.gadc{flex:1;border-right:1px solid var(--border);padding:2px 3px;font-size:9px;cursor:pointer}
.gadc:last-child{border-right:none}
.mtbar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;margin-top:12px;box-shadow:var(--shadow2)}

/* QUOTE EDITOR items */
.qir{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px;margin-bottom:7px;position:relative}
.qia{font-size:11px;font-weight:700;color:var(--accent);text-align:right;padding:5px 7px;background:rgba(74,124,95,.07);border-radius:5px;border:1px solid rgba(74,124,95,.18)}
.qdb{position:absolute;top:7px;right:7px;width:17px;height:17px;border-radius:50%;background:rgba(184,64,64,.1);border:1px solid rgba(184,64,64,.25);color:var(--red);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qadd{width:100%;padding:6px;border-radius:6px;border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;transition:all .13s;display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:9px}
.qadd:hover{border-color:var(--accent);color:var(--accent)}
.qtp{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.qtr{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);padding:2px 0}
.qtr.grand{font-weight:900;font-size:14px;color:var(--accent);border-top:1px solid var(--border);padding-top:6px;margin-top:3px}

/* SUGGEST */
.sugg{position:relative}
.sugl{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:7px;box-shadow:var(--shadow);z-index:50;max-height:150px;overflow-y:auto;margin-top:2px;display:none}
.sugi{padding:7px 11px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px}
.sugi:hover{background:var(--bg3)}
.sugn{padding:7px 11px;cursor:pointer;font-size:12px;color:var(--accent);font-weight:700;border-top:1px solid var(--border)}
.sugn:hover{background:rgba(74,124,95,.07)}

/* CONFIRM */
.cov{position:fixed;inset:0;background:rgba(44,38,32,.45);z-index:300;display:flex;align-items:center;justify-content:center}
.cb{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:26px;max-width:340px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(44,38,32,.18)}

/* EMPTY */
.emp{text-align:center;padding:44px 20px;color:var(--text3)}

/* TOAST */
#toast{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:5px}
.tst{padding:9px 15px;border-radius:8px;font-size:13px;font-weight:500;animation:tin .25s ease;box-shadow:var(--shadow)}
.ts-ok{background:#eaf7f0;border:1px solid #7dbf9a;color:#2d6e4a}
.ts-er{background:#fdf0f0;border:1px solid #d98080;color:#8b3030}
.ts-in{background:#edf3fb;border:1px solid #7da8d4;color:#2c5080}
@keyframes tin{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}

/* PRINT */
@media print{
  @page{size:A4;margin:10mm 12mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}

/* ============================================================
   RESPONSIVE — スマホ・タブレット対応
   ============================================================ */
@media (max-width: 768px){
  /* ダッシュボード: 2カラム → 1カラム */
  #ct > div[style*="grid-template-columns:1.3fr 1fr"],
  #ct > div[style*="grid-template-columns:1fr 1fr"] {
    display: flex !important;
    flex-direction: column !important;
  }
  /* 今週スケジュール: 横スクロール */
  #ct > div:last-child > div:last-child > div {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  /* テーブルヘッダー/セルを非表示にしてカード化 */
  .tw table { display: block; }
  .tw thead { display: none; }
  .tw tbody { display: flex; flex-direction: column; gap: 8px; padding: 8px; }
  .tw tbody tr {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 11px 12px;
    align-items: center;
  }
  .tw tbody td {
    display: inline-flex;
    border-bottom: none !important;
    padding: 2px 0;
    font-size: 13px;
  }
  /* 顧客管理: 名前を大きく */
  .tw tbody td:nth-child(2) { font-size: 14px; font-weight: 700; width: 100%; }
  /* ボタン系のtdを右端に */
  .tw tbody td:last-child { margin-left: auto; display: flex; gap: 4px; }
  /* カレンダーナビ */
  .gh { flex-wrap: wrap; gap: 6px; padding: 8px; }
  .gt { font-size: 13px; }
  /* カレンダー月ビュー文字サイズ */
  .gdh-c { font-size: 10px; padding: 4px 1px; }
  /* FAB: フローティング追加ボタン */
  #fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 28px;
    border: none;
    box-shadow: 0 4px 16px rgba(74,124,95,.4);
    cursor: pointer;
    z-index: 90;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .15s;
  }
  #fab:active { transform: scale(.92); }
  /* スマホ専用カレンダー */
  .mob-cal { display: flex; flex-direction: column; height: calc(100vh - 52px); background: var(--bg2); }
  .mob-cal-header { padding: 12px 16px 8px; border-bottom: 1px solid var(--border); }
  .mob-cal-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .mob-cal-title { font-size: 22px; font-weight: 900; flex: 1; }
  .mob-cal-title span { font-size: 15px; color: var(--text3); font-weight: 400; margin-left: 4px; }
  .mob-cal-dow { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; padding: 0 4px; }
  .mob-cal-dow div { font-size: 11px; font-weight: 700; padding: 4px 0; }
  .mob-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); flex: 1; overflow-y: auto; padding: 0 4px; }
  .mob-cal-cell { min-height: 72px; padding: 4px 2px; border-bottom: 1px solid var(--border); position: relative; cursor: pointer; }
  .mob-cal-cell.today .mob-cal-dn { background: var(--accent); color: #fff; border-radius: 50%; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; }
  .mob-cal-cell.other-month { opacity: .3; }
  .mob-cal-dn { font-size: 13px; font-weight: 700; display: block; text-align: center; margin-bottom: 2px; line-height: 26px; }
  .mob-cal-dn.sun { color: var(--red); }
  .mob-cal-dn.sat { color: var(--blue); }
  .mob-cal-dn.hol { color: var(--red); }
  .mob-ev { display: block; font-size: 9.5px; font-weight: 700; color: #fff; border-radius: 3px; padding: 1px 3px; margin-bottom: 1px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  /* 下部スライドパネル */
  .mob-day-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-radius: 16px 16px 0 0; padding: 0 0 80px; z-index: 95; max-height: 60vh; overflow-y: auto; box-shadow: 0 -4px 24px rgba(44,38,32,.18); transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); }
  .mob-day-sheet.open { transform: translateY(0); }
  .mob-sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 10px auto 14px; }
  .mob-sheet-date { font-size: 15px; font-weight: 700; padding: 0 16px 10px; border-bottom: 1px solid var(--border); }
  .mob-sheet-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .mob-sheet-item:active { background: var(--bg3); }
  .mob-sheet-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .mob-sheet-time { font-size: 11px; color: var(--text3); width: 72px; flex-shrink: 0; }
  .mob-sheet-title { font-size: 14px; font-weight: 600; flex: 1; }
  /* 下部タブバー */
  .mob-tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: none; z-index: 80; padding-bottom: env(safe-area-inset-bottom); }
  .mob-tabbar-inner { display: flex; }
  .mob-tab { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px; cursor: pointer; border: none; background: transparent; color: var(--text3); font-size: 10px; font-family: inherit; gap: 2px; }
  .mob-tab.on { color: var(--accent); }
  .mob-tab-ic { font-size: 20px; line-height: 1; }

// ============================================================
// JAPAN HOLIDAYS
// ============================================================
function jpHols(yr){
  const h={};
  const add=(m,d,n)=>h[`${yr}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`]=n;
  add(1,1,'元日');add(2,11,'建国記念の日');add(2,23,'天皇誕生日');
  add(4,29,'昭和の日');add(5,3,'憲法記念日');add(5,4,'みどりの日');add(5,5,'こどもの日');
  add(8,11,'山の日');add(11,3,'文化の日');add(11,23,'勤労感謝の日');
  const nm=(mo,n)=>{let d=new Date(yr,mo-1,1),dw=d.getDay(),f=dw===1?1:dw===0?2:9-dw;return f+(n-1)*7;};
  add(1,nm(1,2),'成人の日');add(7,nm(7,3),'海の日');add(9,nm(9,3),'敬老の日');add(10,nm(10,2),'スポーツの日');
  add(3,Math.floor(20.8431+0.242194*(yr-1980)-Math.floor((yr-1980)/4)),'春分の日');
  add(9,Math.floor(23.2488+0.242194*(yr-1980)-Math.floor((yr-1980)/4)),'秋分の日');
  Object.entries({...h}).forEach(([ds,n])=>{const d=new Date(ds);if(d.getDay()===0){const ns=new Date(d);ns.setDate(d.getDate()+1);const k=ns.toISOString().slice(0,10);if(!h[k])h[k]='振替休日';}});
  return h;
}

const WE={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'❄️',73:'❄️',75:'❄️',80:'🌦',81:'🌧',82:'🌧',95:'⛈',96:'⛈',99:'⛈'};
let _wc={};
async function wx(dates){
  const k=dates[0]+'_'+dates[dates.length-1];
  if(_wc[k])return _wc[k];
  try{
    const s=dates[0],e=dates[dates.length-1];
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=38.368&longitude=141.068&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max&wind_speed_unit=ms&timezone=Asia%2FTokyo&start_date='+s+'&end_date='+e);
    const j=await r.json();
    const out={};
    (j.daily?.time||[]).forEach((d,i)=>out[d]={code:j.daily.weathercode[i],max:j.daily.temperature_2m_max[i],min:j.daily.temperature_2m_min[i],wind:Math.round((j.daily.windspeed_10m_max?.[i]||0)*10)/10});
    _wc[k]=out;return out;
  }catch{return{};}
}
function wxHtml(w){
  if(!w)return'';
  return`<div style="font-size:15px;line-height:1">${WE[w.code]||''}</div><div style="font-size:10px;color:#c5724a;font-weight:700">${Math.round(w.max)}°<span style="color:var(--text3);font-weight:400">/${Math.round(w.min)}°</span></div><div style="font-size:9px;color:var(--text3)">💨${w.wind}m/s</div>`;
}

const SH=48; // slot height px

function pgCal(){
  if(calV==='month')calMonth();
  else if(calV==='day')calDay();
  else calWeek();
}
function t2px(t){const[h,m]=(t||'00:00').split(':').map(Number);return(h*60+m)/60*SH;}
function dpx(s,e){return Math.max(t2px(e)-t2px(s),18);}
function calNavH(label){
  return`<div class="gh">
    <div style="display:flex;gap:4px"><button class="btn bs bsm" id="cprev">◀</button><button class="btn bs bsm" id="ctod">今日</button><button class="btn bs bsm" id="cnext">▶</button></div>
    <span class="gt" style="padding-left:10px">${label}</span>
    <div style="display:flex;gap:3px">
      <button class="btn bsm ${calV==='day'?'bp':'bs'}" onclick="calV='day';buildPage()">日</button>
      <button class="btn bsm ${calV==='week'?'bp':'bs'}" onclick="calV='week';buildPage()">週</button>
      <button class="btn bsm ${calV==='month'?'bp':'bs'}" onclick="calV='month';buildPage()">月</button>
    </div>
    <div style="display:flex;gap:5px;margin-left:8px">
      <button class="btn bp bsm" onclick="showSchedMo(null,'${today()}')">＋ スケジュール</button>
      <button class="btn bg bsm" onclick="showProjMo()">＋ 案件</button>
    </div>
  </div>`;
}
function bindNav(pf,tf,nf){
  setTimeout(()=>{
    document.getElementById('cprev')?.addEventListener('click',pf);

    document.getElementById('cnext')?.addEventListener('click',nf);

function mtotBar(){
  const tot=D.projects.filter(p=>{if(!p.ed)return false;const d=new Date(p.ed);return d.getFullYear()===calY&&d.getMonth()===calM&&p.status==='完了';}).reduce((s,p)=>s+p.amount,0);
  return`<div class="mtbar"><div style="font-size:13px;color:var(--text2)">${calY}年${calM+1}月 完了案件売上</div><div class="amt" style="font-size:20px;color:var(--green)">${fmt(tot)}</div></div>`;
}
function calADForDay(ds){
  const dd=new Date(ds);
  return[
    ...D.projects.filter(p=>p.sd&&p.ed&&new Date(p.sd)<=dd&&new Date(p.ed)>=dd),
    ...D.schedules.filter(s=>s.date===ds&&s.allDay)
  ];
}
function calSForDay(ds){return D.schedules.filter(s=>s.date===ds&&!s.allDay);}

function calWeek(){
  const days=Array.from({length:7},(_,i)=>{const d=new Date(calWS);d.setDate(calWS.getDate()+i);return d;});
  const now=new Date();const hols=jpHols(calY);
  const hrs=Array.from({length:24},(_,i)=>i);
  const label=`${days[0].getMonth()+1}月${days[0].getDate()}日 〜 ${days[6].getMonth()+1}月${days[6].getDate()}日（${calY}年）`;
  const dns=['日','月','火','水','木','金','土'];
  const nowPx=(now.getHours()*60+now.getMinutes())/60*SH;
  const isThisWk=days.some(d=>d.toDateString()===now.toDateString());

  const hdrs=days.map(dd=>{
    const ds=dd.toISOString().slice(0,10);const dw=dd.getDay();
    const isT=dd.toDateString()===now.toDateString();const hol=hols[ds];const isRed=dw===0||hol;
    return`<div class="gdh-c" style="${hol?'background:rgba(184,64,64,.04)':''}">
      <div class="gdh-dow" style="color:${isRed?'var(--red)':dw===6?'var(--blue)':'var(--text3)'}">${dns[dw]}</div>
      <div class="gdh-dn ${isT?'today':''}" style="${isRed&&!isT?'color:var(--red)':''}">${dd.getDate()}</div>
      ${hol?`<div style="font-size:8px;color:var(--red);font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">🎌${hol}</div>`:''}
      <div id="wx-w-${ds}" style="min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center"></div>
    </div>`;
  }).join('');

  const adRow=days.map(dd=>{
    const ds=dd.toISOString().slice(0,10);const items=calADForDay(ds);
    return`<div class="gadc" onclick="showSchedMo(null,'${ds}',null,null,true)">${items.map(it=>it.phase!==undefined?`<div style="background:${pc(it.phase)};color:#fff;border-radius:3px;padding:1px 3px;font-size:9px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;margin-bottom:1px" onclick="event.stopPropagation();showProjMo(${it.id})">⚡${it.title}</div>`:`<div style="background:${it.color||'var(--accent)'};color:#fff;border-radius:3px;padding:1px 3px;font-size:9px;font-weight:700;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${it.title}</div>`).join('')}</div>`;
  }).join('');

  const tlabs=hrs.map(h=>`<div style="height:${SH}px;border-bottom:1px dashed rgba(44,38,32,.08);display:flex;align-items:flex-start;justify-content:flex-end;padding-right:5px;padding-top:2px;font-size:10px;color:var(--text3);flex-shrink:0;box-sizing:border-box">${String(h).padStart(2,'0')}:00</div>`).join('');

  const dcols=days.map(dd=>{
    const ds=dd.toISOString().slice(0,10);const sc=calSForDay(ds);
    const hlines=hrs.map(()=>`<div class="ghr"></div>`).join('');
    const evs=sc.map(s=>{const top=t2px(s.st);const ht=dpx(s.st,s.et);const pj=s.pid?D.projects.find(p=>p.id===s.pid):null;
      return`<div class="gev" style="top:${top}px;height:${ht}px;background:${s.color||'var(--accent)'}" data-sid="${s.id}" data-st="${s.st}" data-et="${s.et}" data-date="${ds}" onclick="event.stopPropagation();showSchedMo(${s.id},'${ds}')" onmousedown="startDrag(event,${s.id},'${ds}')">
  <div style="font-size:9.5px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(s.title)}</div>
  <div class="gev-time" style="font-size:8.5px;opacity:.85">${s.st}–${s.et}${pj?' · '+pj.title.slice(0,8):''}</div>
  <div class="gev-resize" onmousedown="startResize(event,${s.id},'${ds}')"></div>
</div>`;
    }).join('');
    return`<div class="gcol" data-date="${ds}" style="flex:1;position:relative;border-right:1px solid var(--border)" onclick="clickCal(event,'${ds}',this)">${hlines}${evs}</div>`;
  }).join('');

  document.getElementById('ct').innerHTML=`<div class="gw">${calNavH(label)}
    <div class="gb">
      <!-- 曜日ヘッダー行（固定） -->
      <div style="display:flex;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg3)">
        <div style="width:50px;flex-shrink:0;border-right:1px solid var(--border)"></div>
        <div style="flex:1;display:flex">${hdrs}</div>
      </div>
      <!-- 終日行（固定） -->
      <div style="display:flex;flex-shrink:0;border-bottom:1px solid var(--border);min-height:28px">

function calDay(){
  const ds=new Date(calY,calM,calD).toISOString().slice(0,10);
  const hols=jpHols(calY);const hol=hols[ds];
  const now=new Date();const isT=new Date(ds).toDateString()===now.toDateString();
  const nowPx=isT?(now.getHours()*60+now.getMinutes())/60*SH:null;
  const sc=calSForDay(ds);const ad=calADForDay(ds);
  const hrs=Array.from({length:24},(_,i)=>i);
  const label=`${calY}年${calM+1}月${calD}日${hol?' 🎌'+hol:''}`;
  const tlabs=hrs.map(h=>`<div style="height:${SH}px;border-bottom:1px dashed rgba(44,38,32,.08);padding-left:6px;padding-top:2px;font-size:10px;color:var(--text3)">${String(h).padStart(2,'0')}:00</div>`).join('');
  const evs=sc.map(s=>{const top=t2px(s.st);const ht=dpx(s.st,s.et);const pj=s.pid?D.projects.find(p=>p.id===s.pid):null;
    return`<div class="gev" style="top:${top}px;height:${ht}px;background:${s.color||'var(--accent)'};left:58px;right:4px" onclick="event.stopPropagation();showSchedMo(${s.id},'${ds}')"><div style="font-size:11px;font-weight:700">${esc(s.title)}</div><div style="font-size:9px;opacity:.85">${s.st}–${s.et}${pj?' · '+pj.title:''}</div></div>`;
  }).join('');

  document.getElementById('ct').innerHTML=`<div class="gw">${calNavH(label)}
    <div style="padding:7px 11px;border-bottom:1px solid var(--border);background:rgba(74,124,95,.03);min-height:30px">
      <span style="font-size:11px;color:var(--text3);font-weight:700">終日：</span>
      ${ad.length?ad.map(it=>it.phase!==undefined?`<span style="background:${pc(it.phase)};color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;margin-right:3px">⚡${it.title}</span>`:`<span style="background:${it.color||'var(--accent)'};color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;margin-right:3px">${it.title}</span>`).join(''):`<span style="font-size:11px;color:var(--text3)">なし</span>`}
      <span id="wx-day" style="margin-left:12px;font-size:12px"></span>
    </div>
    <div style="flex:1;overflow-y:auto;position:relative;min-height:400px" onclick="clickCal(event,'${ds}',this)">
      ${tlabs}${nowPx!==null?`<div class="gnow" style="top:${nowPx}px;left:52px"></div>`:''}${evs}
    </div>
  </div>${mtotBar()}`;

  bindNav(
    ()=>{const d=new Date(calY,calM,calD-1);calY=d.getFullYear();calM=d.getMonth();calD=d.getDate();buildPage();},
    ()=>{const d=new Date();calY=d.getFullYear();calM=d.getMonth();calD=d.getDate();buildPage();},
    ()=>{const d=new Date(calY,calM,calD+1);calY=d.getFullYear();calM=d.getMonth();calD=d.getDate();buildPage();}
  );
  (async()=>{const w=await wx([ds]);const el=document.getElementById('wx-day');if(el&&w[ds]){const wd=w[ds];el.innerHTML=`${WE[wd.code]||''} ${Math.round(wd.max)}°/${Math.round(wd.min)}° 💨${wd.wind}m/s`;}})();
}

function calMonth(){
  const first=new Date(calY,calM,1).getDay();const dim=new Date(calY,calM+1,0).getDate();
  const now=new Date();const hols=jpHols(calY);
  const dns=['日','月','火','水','木','金','土'];
  let cells=[];
  const pd=new Date(calY,calM,0).getDate();
  for(let i=first-1;i>=0;i--)cells.push({day:pd-i,cur:false,date:null});
  for(let d=1;d<=dim;d++){cells.push({day:d,cur:true,date:`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`});}
  while(cells.length%7)cells.push({day:cells.length-dim-first+1,cur:false,date:null});

  const rows=cells.map((c,idx)=>{
    const dw=idx%7;const isT=c.cur&&now.getFullYear()===calY&&now.getMonth()===calM&&now.getDate()===c.day;
    const hol=c.date?hols[c.date]:null;const isRed=dw===0||hol;
    let ev='';
    if(c.date){
      calADForDay(c.date).slice(0,1).forEach(it=>{ev+=it.phase!==undefined?`<div style="background:${pc(it.phase)};color:#fff;border-radius:3px;padding:1px 3px;font-size:9px;font-weight:700;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer" onclick="event.stopPropagation();showProjMo(${it.id})">⚡${it.title}</div>`:`<div style="background:${it.color||'var(--accent)'};color:#fff;border-radius:3px;padding:1px 3px;font-size:9px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${it.title}</div>`;});
      calSForDay(c.date).slice(0,2).forEach(s=>{ev+=`<div style="background:${s.color||'var(--accent)'}20;color:${s.color||'var(--accent)'};border-left:2px solid ${s.color||'var(--accent)'};border-radius:2px;padding:1px 3px;font-size:9px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;font-weight:700" onclick="event.stopPropagation();showSchedMo(${s.id},'${c.date}')">${s.st} ${esc(s.title)}</div>`;});
    }
    const dnStyle=isT?'background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px':(isRed?'color:var(--red)':dw===6?'color:var(--blue)':'');
    return`<div id="mc-${c.date||idx}" style="min-height:88px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px;${!c.cur?'background:var(--bg3);opacity:.55':hol?'background:rgba(184,64,64,.03)':''};cursor:pointer;position:relative" onclick="${c.date?`_calDayTap('${c.date}')`:''}" >
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px">
        <span style="${dnStyle};font-size:11px;font-weight:700">${c.day}</span>
        <span id="wx-m-${c.date||'x'}" style="display:flex;flex-direction:column;align-items:flex-end;line-height:1"></span>
      </div>
      ${hol?`<div style="font-size:8px;color:var(--red);font-weight:700;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">🎌${hol}</div>`:''}
      ${ev}
    </div>`;
  }).join('');

  document.getElementById('ct').innerHTML=`<div class="gw">${calNavH(`${calY}年 ${calM+1}月`)}
    <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">
      ${dns.map((d,i)=>`<div style="padding:7px 4px;text-align:center;font-size:11px;font-weight:700;color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--text3)'}">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);overflow-y:auto">${rows}</div>
  </div>${mtotBar()}`;

  bindNav(
    ()=>{calM--;if(calM<0){calM=11;calY--;}buildPage();},
    ()=>{const d=new Date();calY=d.getFullYear();calM=d.getMonth();buildPage();},
    ()=>{calM++;if(calM>11){calM=0;calY++;}buildPage();}
  );
  (async()=>{
    const dates=cells.filter(c=>c.cur&&c.date).map(c=>c.date);
    if(!dates.length)return;
    const w=await wx(dates);
    dates.forEach(ds=>{const el=document.getElementById('wx-m-'+ds);if(el&&w[ds])el.innerHTML=wxHtml(w[ds]);});
  })();
}

function clickCal(e,ds,col){
  const scrollEl=col.closest('[style*="overflow-y:auto"]')||col.closest('[style*="overflow-y: auto"]');
  const scrollTop=scrollEl?scrollEl.scrollTop:0;
  const r=col.getBoundingClientRect();
  const y=e.clientY-r.top+scrollTop; // スクロール量を加算
  const tot=Math.floor(y/SH*60);const hh=String(Math.floor(tot/60)).padStart(2,'0');
  const mm=String(Math.round(tot%60/10)*10).padStart(2,'0'); // 10分スナップ
  const st=`${hh}:${mm}`;const eh=Math.min(23,parseInt(hh)+(parseInt(mm)>=30?1:0));
  const et=`${String(eh).padStart(2,'0')}:${parseInt(mm)>=30?'00':'30'}`;
  showSchedMo(null,ds,st,et,false);
}

// IMAGES
function showImgMo(pid){
  const p=D.projects.find(p=>p.id===pid);if(!p)return;
  mo(`<div class="mt">🖼 工事写真 — ${esc(p.title)}</div>
  <div id="img-area">${imgGrid(p.imgs||[],pid)}</div>
  <div style="margin-top:9px"><input type="file" id="img-in" accept="image/*" multiple style="display:none" onchange="uploadImgs(${pid},this)"><button class="btn bp" onclick="document.getElementById('img-in').click()">📷 写真を追加</button><span style="font-size:11px;color:var(--text3);margin-left:7px">5MB/枚まで</span></div>
  <div class="mf"><button class="btn bs" onclick="cmo()">閉じる</button></div>`);
}
function imgGrid(imgs,pid){
  if(!imgs.length)return`<div style="text-align:center;padding:24px;color:var(--text3)">📷 写真がまだありません</div>`;
  return`<div class="ig">${imgs.map((img,i)=>`<div class="ith" onclick="viewImg('${img.data}','${esc(img.name)}')"><img src="${img.data}" alt="${esc(img.name)}"><button class="idl" onclick="event.stopPropagation();delImg(${pid},${i})">×</button></div>`).join('')}</div>`;
}
function uploadImgs(pid,inp){
  const files=Array.from(inp.files);if(!files.length)return;
  const p=D.projects.find(p=>p.id===pid);if(!p)return;if(!p.imgs)p.imgs=[];
  let done=0;
  files.forEach(f=>{
    if(f.size>5*1024*1024){toast(`${f.name}は5MB超のためスキップ`,'er');done++;return;}
    const r=new FileReader();r.onload=e=>{p.imgs.push({data:e.target.result,name:f.name,added:today()});done++;
      if(done===files.length){save();const a=document.getElementById('img-area');if(a)a.innerHTML=imgGrid(p.imgs,pid);toast(`${files.length}枚追加しました`);}};r.readAsDataURL(f);
  });
}

function _qeAdd(){QI.push({name:'',qty:'1',unit:'式',price:'0',note:''});_qeRI();_qeC();}
function _qeCA(i){// update only changed row amount + totals
  const it=QI[i];const el=document.getElementById('qa-'+i);
  if(el)el.textContent='¥'+fmtN((parseFloat(it.qty)||0)*(parseFloat(it.price)||0));
  _qeC();
}
function _qeC(){
  const sub=QI.reduce((s,it)=>s+(parseFloat(it.qty)||0)*(parseFloat(it.price)||0),0);
  const rate=parseFloat(document.getElementById('qe-tr')?.value||'10');
  const tax=Math.floor(sub*rate/100);
  const upd=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent='¥'+fmtN(v);};
  upd('qe-ts',sub);upd('qe-tt',tax);upd('qe-tg',sub+tax);
  return{sub,tax,total:sub+tax};
}
function _collectQ(){
  const{sub,tax}=_qeC();
  const toNm=gv('qe-cn')||gv('qe-cn');
  return{qn:gv('qe-no'),title:gv('qe-ti'),cid:window._qeSelCid||null,pid:parseInt(gv('qe-pi'))||null,toName:toNm,subject:gv('qe-sb'),date:gv('qe-dt'),validity:gv('qe-vl'),cp:gv('qe-cp'),taxRate:parseFloat(gv('qe-tr')),deliveryPlace:gv('qe-pl'),deliveryDate:gv('qe-dd'),payment:gv('qe-py'),status:gv('qe-st'),memo:gv('qe-me'),items:JSON.parse(JSON.stringify(QI)),amount:sub,tax};
}

function _saveQP(id){

            font-size: 8.5pt; margin-bottom: 8px; }
.info-tbl td { padding: 2px 4px; }
.info-tbl td:first-child { color: #555; width: 62px; background: #f0f0f0; }
.info-tbl td:last-child  { font-weight: bold; }

/* ── ITEMS TABLE ── */
.items-tbl {
  width: 100%; border-collapse: collapse;
  margin-bottom: 7px; font-size: 9pt;
}
.items-tbl th {
  background: #e8e8e8; color: #222;
  padding: 5px 5px; text-align: center;
  font-size: 8.5pt; border: 1px solid #bbb; font-weight: bold;
}
.items-tbl td {
  border: 1px solid #aaa; padding: 4px 5px; vertical-align: middle;
}
.items-tbl tbody tr:nth-child(even) { background: #f9f9f9; }
.td-name  { min-width: 130px; }
.td-num   { text-align: right; white-space: nowrap; width: 70px; }
.td-cen   { text-align: center; width: 40px; }
.td-note  { font-size: 8pt; color: #555; width: 70px; }

/* ── SUBTOTAL ── */
.sub-wrap { display: flex; justify-content: flex-end; margin-bottom: 8px; }
.sub-tbl  { border-collapse: collapse; min-width: 250px; }
.sub-tbl td {
  padding: 4px 9px; font-size: 9.5pt; border: 1px solid #bbb;
}
.sub-tbl td:first-child {
  text-align: center; background: #e8e8e8;
  font-weight: bold; width: 120px; white-space: nowrap;
}
.sub-tbl td:last-child {
  text-align: right; font-weight: bold; min-width: 120px;
}
.sub-tbl .grand td {
  background: #444 !important; color: #fff !important;
  border-color: #444 !important; font-size: 10.5pt;
}

/* ── CONDITIONS ── */
.cond { border: 1px solid #bbb; margin-bottom: 6px;
        font-size: 8.5pt; color: #333; background: #fafafa; }
.cond table { width: 100%; border-collapse: collapse; }
.cond td { padding: 3px 7px; border-bottom: 1px solid #ddd; }
.cond td:nth-child(odd) {
  width: 80px; background: #eee;
  text-align: center; font-weight: bold; color: #444;
}

/* ── MEMO ── */
.memo-box {
  border: 1px solid #ccc; padding: 6px 8px;
  font-size: 8.5pt; color: #333; background: #fafafa;
  min-height: 32px; white-space: pre-wrap; margin-bottom: 6px;
}

/* ── STAMP ROW ── */
.stamp-row { display: flex; justify-content: flex-end; gap: 10px; }
.stamp-box {
  width: 52px; height: 52px; border: 1.5px solid #888;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 3px; font-size: 7.5pt; color: #666;
}

// DELETE CONFIRM
function delCon(type,id){
  const lbl={customer:'顧客',project:'案件',quote:'見積',schedule:'スケジュール'};
  const ov=document.createElement('div');ov.className='cov';ov.id='cov';
  ov.innerHTML=`<div class="cb"><div style="font-size:34px;margin-bottom:9px">⚠️</div><div style="font-size:15px;font-weight:700;margin-bottom:6px">${lbl[type]}を削除しますか？</div><div style="font-size:13px;color:var(--text2);margin-bottom:18px">この操作は取り消せません。</div><div style="display:flex;gap:7px;justify-content:center"><button class="btn bs" onclick="document.getElementById('cov').remove()">キャンセル</button><button class="btn bd" onclick="_del('${type}',${id})">削除する</button></div></div>`;
  document.body.appendChild(ov);
}
function _del(type,id){
  document.getElementById('cov')?.remove();
  if(type==='customer'){D.customers=D.customers.filter(c=>c.id!==id);D.projects=D.projects.filter(p=>p.cid!==id);D.quotes=D.quotes.filter(q=>q.cid!==id);toast('顧客を削除しました');if(detCid===id){detCid=null;page='customers';}}
  else if(type==='project'){D.projects=D.projects.filter(p=>p.id!==id);toast('案件を削除しました');}
  else if(type==='quote'){D.quotes=D.quotes.filter(q=>q.id!==id);toast('見積を削除しました');}
  else if(type==='schedule'){D.schedules=D.schedules.filter(s=>s.id!==id);toast('スケジュールを削除しました');}
  save();cmo();buildPage();
}

// CSV / BACKUP / RESTORE
function exportCSV(type){
  let rows=[],hdrs=[];
  if(type==='customers'){hdrs=['顧客番号','会社名/氏名','担当者','電話番号','メール','住所','種別','ステータス','登録日','メモ'];rows=D.customers.map(c=>[c.cn,c.name,c.contact,c.phone,c.email,c.address,c.type,c.status,c.created,c.memo]);}
  else if(type==='projects'){hdrs=['ID','案件名','顧客番号','顧客名','ステータス','フェーズ','金額','開始日','終了日','メモ'];rows=D.projects.map(p=>[p.id,p.title,cn(p.cid),cname(p.cid),p.status,p.phase,p.amount,p.sd,p.ed,p.memo]);}
  else if(type==='quotes'){hdrs=['見積番号','見積書名','顧客番号','顧客名','見積日','金額(税別)','消費税','税込合計','ステータス'];rows=D.quotes.map(q=>[q.qn,q.title,cn(q.cid),cname(q.cid),q.date,q.amount,q.tax||0,q.amount+(q.tax||0),q.status]);}
  const bom='\uFEFF';const csv=bom+[hdrs,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=`seino_${type}_${today()}.csv`;a.click();toast('CSVをエクスポートしました','in');
}
function backupData(){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({...D,ver:'5.0',exportDate:new Date().toISOString()})],{type:'application/json'}));a.download=`seino_backup_${today()}.json`;a.click();toast('バックアップを保存しました','in');
}
function restoreData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    try{
      const b=JSON.parse(ev.target.result);
      D={customers:b.customers||[],projects:b.projects||[],quotes:b.quotes||[],schedules:b.schedules||[],nextId:b.nextId||200};
      // handle old field names (cid vs customerId, sd/ed vs startDate/endDate)
      D.projects=D.projects.map(p=>({...p,cid:p.cid||p.customerId,sd:p.sd||p.startDate,ed:p.ed||p.endDate,imgs:p.imgs||p.images||[]}));
      D.quotes=D.quotes.map(q=>({...q,cid:q.cid||q.customerId,qn:q.qn||q.quoteNo,cp:q.cp||q.contactPerson}));
      D.schedules=D.schedules.map(s=>({...s,pid:s.pid||s.projectId,st:s.st||s.startTime,et:s.et||s.endTime}));
      D.customers=D.customers.map(c=>({...c,cn:c.cn||c.custNo}));
      _flush();toast('データを復元しました','in');buildPage();_bc();
    }catch{toast('復元に失敗しました','er');}
  };r.readAsText(f);e.target.value='';
}

// TOAST
function toast(msg,type='ok'){
  const el=document.createElement('div');el.className=`tst ts-${type}`;el.textContent=msg;
  document.getElementById('toast').appendChild(el);setTimeout(()=>el.remove(),3200);
}

// ============================================================
// CALENDAR DRAG & DROP
// ============================================================
let _drag={active:false,sid:null,ghost:null,origDate:null,origSt:null,origEt:null,startY:0,startX:0};
const SH_PX=48; // slot height px per hour

function startDrag(e,sid,ds){
  if(e.button!==0)return;
  e.preventDefault();e.stopPropagation();
  const s=D.schedules.find(s=>s.id===sid);if(!s||s.allDay)return;
  const el=e.currentTarget;
  // イベントブロック内の掴んだ位置のオフセットを記録
  const elRect=el.getBoundingClientRect();
  const grabOffsetY=e.clientY-elRect.top; // ブロック内での掴んだY位置
  _drag={active:true,sid,origDate:ds,origSt:s.st,origEt:s.et,
         startY:e.clientY,startX:e.clientX,grabOffsetY};
  // Create ghost
  const g=document.createElement('div');
  g.className='drag-ghost';
  g.style.background=s.color||'var(--accent)';
  g.textContent=s.title;
  document.body.appendChild(g);_drag.ghost=g;
  el.classList.add('dragging');_drag.el=el;
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragEnd);
}

function onDragMove(e){
  if(!_drag.active)return;
  // Move ghost
  const g=_drag.ghost;
  if(g){g.style.left=(e.clientX+12)+'px';g.style.top=(e.clientY-10)+'px';}
  // Highlight target column
  document.querySelectorAll('.gcol').forEach(c=>c.classList.remove('drag-over'));
  const target=document.elementFromPoint(e.clientX,e.clientY)?.closest('.gcol');
  if(target)target.classList.add('drag-over');
}

function onDragEnd(e){
  if(!_drag.active)return;
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd);
  // Clean up ghost & dragging class
  _drag.ghost?.remove();
  _drag.el?.classList.remove('dragging');
  document.querySelectorAll('.gcol').forEach(c=>c.classList.remove('drag-over'));

  // Find target column
  const col=document.elementFromPoint(e.clientX,e.clientY)?.closest('.gcol');
  if(!col){_drag.active=false;return;}
  const newDate=col.dataset.date||_drag.origDate;

  // スクロール量を取得（時間軸スクロールコンテナ）
  const scrollEl=col.closest('[style*="overflow-y:auto"]')||col.closest('[style*="overflow-y: auto"]');
  const scrollTop=scrollEl?scrollEl.scrollTop:0;
  // カーソル位置からスクロール量を加算し、掴んだオフセットを引く
  const rect=col.getBoundingClientRect();
  const rawY=e.clientY-rect.top+scrollTop;
  const y=Math.max(0, rawY - (_drag.grabOffsetY||0));
  const totalMins=Math.floor(y/SH_PX*60);
  const snapMins=Math.round(totalMins/10)*10; // 10分単位スナップ
  const hh=Math.min(23,Math.floor(snapMins/60));
  const mm=snapMins%60;

  // Calc duration from original
  const [osh,osm]=(_drag.origSt||'00:00').split(':').map(Number);
  const [oeh,oem]=(_drag.origEt||'01:00').split(':').map(Number);
  const dur=(oeh*60+oem)-(osh*60+osm);

  const newSt=`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  const endMins=Math.min(23*60+59,hh*60+mm+dur);
  const newEt=`${String(Math.floor(endMins/60)).padStart(2,'0')}:${String(endMins%60).padStart(2,'0')}`;

  // Only update if something changed
  if(newDate!==_drag.origDate||newSt!==_drag.origSt){
    const s=D.schedules.find(s=>s.id===_drag.sid);
    if(s){
      s.date=newDate;s.st=newSt;s.et=newEt;
      save();
      toast(`「${s.title}」を移動しました`);
      buildPage();
    }
  }
  _drag.active=false;
}

function addAdSchedule(pid, adType){
  const p = D.projects.find(p => p.id === pid);
  if(!p) return;
  const cust = p.cid ? D.customers.find(c => c.id === p.cid) : null;
  // 顧客名（最大6文字）を使ってわかりやすいタイトルに
  // 顧客名があれば顧客名、なければ案件名の先頭6文字を使用
  const fullName = cust ? cust.name.replace(/　/g,'').trim() : p.title.replace(/　/g,'').trim();
  const shortName = fullName.length > 6 ? fullName.slice(0, 6) : fullName;
  const ad = AD_TYPES[adType];
  if(!ad) return;

  // 1〜3週間後のランダムな日（7〜21日後）
  const daysAhead = 7 + Math.floor(Math.random() * 15); // 7〜21日
  const schedDate = new Date();
  schedDate.setDate(schedDate.getDate() + daysAhead);
  // 土日を避ける（任意）
  if(schedDate.getDay() === 0) schedDate.setDate(schedDate.getDate() + 1);
  if(schedDate.getDay() === 6) schedDate.setDate(schedDate.getDate() + 2);
  const dateStr = schedDate.toISOString().slice(0, 10);

  const schedTitle = `${shortName}様 ${adType}投函`;
  const newSched = {
    id:      nid(),
    title:   schedTitle,
    date:    dateStr,
    st:      null,
    et:      null,
    allDay:  true,
    cid:     p.cid || null,
    pid:     pid,
    color:   ad.color,
    memo:    `${ad.label}（${p.title}より自動生成）`,
  };
  D.schedules.push(newSched);

  // 履歴に記録
  if(!p.report) p.report = {memo:'', impression:'', adHistory:[]};
  p.report.adHistory.push({
    type:       adType,
    date:       dateStr,
    schedTitle: schedTitle,
    addedAt:    today(),
  });

  save();
  toast(`「${schedTitle}」を ${dateStr.replace(/-/g,'/')} に追加しました 📮`);
  // トースト通知に「カレンダーで確認」リンクを別途表示
  setTimeout(()=>{
    const t=document.createElement('div');
    t.className='tst ts-in';
    t.style.cursor='pointer';
    t.innerHTML=`📅 <u>カレンダーで確認する →</u>`;
    t.onclick=()=>{t.remove();cmo();jumpToCalDate('${dateStr}');};
    document.getElementById('toast').appendChild(t);
    setTimeout(()=>t.remove(),8000);
  },400);
  // モーダルを再描画して履歴を更新
  cmo();
  setTimeout(() => showReportMo(pid), 50);
}

// ============================================================
// CALENDAR EVENT RESIZE (下端ドラッグで時間変更)
// ============================================================
let _resize = {active:false, sid:null, origEt:null, origHt:0, startY:0, el:null, date:null};

function startResize(e, sid, ds){
  if(e.button !== 0) return;
  e.preventDefault();
  e.stopPropagation(); // ドラッグ移動を防ぐ

  const s = D.schedules.find(s => s.id === sid);
  if(!s || s.allDay) return;

  const gevEl = e.currentTarget.closest('.gev');
  if(!gevEl) return;

  _resize = {
    active: true,
    sid,
    date: ds,
    origEt: s.et,
    origHt: parseInt(gevEl.style.height),
    startY: e.clientY,
    el: gevEl,
  };

  gevEl.classList.add('resizing');
  gevEl.style.cursor = 'ns-resize';

  const tip = document.getElementById('resize-tooltip');
  if(tip){ tip.style.display = 'block'; tip.textContent = s.et; }

  document.addEventListener('mousemove', onResizeMove);
  document.addEventListener('mouseup',   onResizeEnd);
}

function onResizeMove(e){
  if(!_resize.active) return;
  // スクロール量込みで正確なY位置を計算
  const scrollEl=_resize.el.closest('[style*="overflow-y:auto"]')||_resize.el.closest('[style*="overflow-y: auto"]');
  const scrollTop=scrollEl?scrollEl.scrollTop:0;
  // カーソルのドキュメント内Y位置 = clientY + scrollTop
  const cursorDocY = e.clientY + scrollTop;
  // イベントの上端のドキュメント内Y位置
  const elRect = _resize.el.getBoundingClientRect();
  const elTopDocY = elRect.top + scrollTop;
  // 新しいブロック高さ = カーソルY - ブロック上端Y
  const newHt = Math.max(SH/6, cursorDocY - elTopDocY); // 最小10分

  // 10分単位にスナップ
  const newMins = Math.round(newHt / SH * 60 / 10) * 10;

  // 開始時間から新しい終了時間を計算
  const s = D.schedules.find(s => s.id === _resize.sid);
  if(!s) return;
  const [sh, sm] = (s.st||'00:00').split(':').map(Number);
  const startMins = sh * 60 + sm;
  const endMins   = Math.min(23*60+50, startMins + Math.max(10, newMins));
  const newEt = `${String(Math.floor(endMins/60)).padStart(2,'0')}:${String(endMins%60).padStart(2,'0')}`;

  // リアルタイムでブロック高さを更新
  const snapHt = (endMins - startMins) / 60 * SH;
  _resize.el.style.height = snapHt + 'px';

  // 時間表示を更新
  const timeEl = _resize.el.querySelector('.gev-time');
  if(timeEl) timeEl.textContent = `${s.st}–${newEt}`;

  // ツールチップ
  const tip = document.getElementById('resize-tooltip');
  if(tip){
    tip.textContent = `${s.st} – ${newEt}（${Math.round((endMins-startMins))}分）`;
    tip.style.left  = (e.clientX + 12) + 'px';
    tip.style.top   = (e.clientY - 28) + 'px';
  }
}

function onResizeEnd(e){
  if(!_resize.active) return;
  document.removeEventListener('mousemove', onResizeMove);
  document.removeEventListener('mouseup',   onResizeEnd);

  const tip = document.getElementById('resize-tooltip');
  if(tip) tip.style.display = 'none';

  _resize.el?.classList.remove('resizing');
  if(_resize.el) _resize.el.style.cursor = '';

  // 最終的な終了時間を確定
  const s = D.schedules.find(s => s.id === _resize.sid);
  if(!s){ _resize.active=false; return; }

  const currentHt = parseInt(_resize.el.style.height) || _resize.origHt;
  const [sh, sm]  = (s.st||'00:00').split(':').map(Number);
  const startMins = sh * 60 + sm;
  const rawMins   = Math.round(currentHt / SH * 60);
  const snapMins  = Math.round(rawMins / 10) * 10;
  const endMins   = Math.min(23*60+50, startMins + Math.max(10, snapMins));
  const newEt     = `${String(Math.floor(endMins/60)).padStart(2,'0')}:${String(endMins%60).padStart(2,'0')}`;

  if(newEt !== _resize.origEt){
    s.et = newEt;

    // 関連案件の終了時間も更新（案件の終了日時が当日と一致している場合）
    if(s.pid){
      const proj = D.projects.find(p => p.id === s.pid);
      if(proj && proj.ed === _resize.date){
        // 案件終了日がスケジュール日と同じ場合のみ更新
        proj.ed = _resize.date;
        toast(`関連案件「${proj.title}」の日程も更新しました`);
      }
    }

    save();
    toast(`終了時間を ${newEt} に変更しました`);
    buildPage();
  }

  _resize.active = false;
}

function genInvNo(){
  // 請求番号: I-00001 形式
  const ns=D.quotes.filter(q=>q.isInvoice).map(q=>parseInt((q.qn||'I-00000').slice(2))||0);
  return'I-'+String((ns.length?Math.max(...ns):0)+1).padStart(5,'0');
}

function _invC(){
  const sub=QI_inv.reduce((s,it)=>s+(parseFloat(it.qty)||0)*(parseFloat(it.price)||0),0);
  const rate=parseFloat(document.getElementById('iv-tr')?.value||'10');
  const tax=Math.floor(sub*rate/100);
  const upd=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent='¥'+fmtN(v);};
  upd('iv-ts',sub);upd('iv-tt',tax);upd('iv-tg',sub+tax);
  return{sub,tax,total:sub+tax};
}
function _collectI(){
  const{sub,tax}=_invC();
  return{qn:gv('iv-no'),isInvoice:true,title:gv('iv-ti'),cid:parseInt(gv('iv-cid'))||window._invSelCid||null,
    toName:gv('iv-cn'),subject:gv('iv-sb'),date:gv('iv-dt'),dueDate:gv('iv-due'),
    cp:gv('iv-cp'),taxRate:parseFloat(gv('iv-tr')),status:gv('iv-st'),
    memo:gv('iv-me'),bankInfo:gv('iv-bank'),
    items:JSON.parse(JSON.stringify(QI_inv)),amount:sub,tax};

function _saveI(id){
  if(!gv('iv-ti')){toast('請求書名を入力してください','er');return;}
  const obj=_collectI();
  if(id){const i=D.quotes.findIndex(q=>q.id===id);D.quotes[i]={...D.quotes[i],...obj};toast('請求書を更新しました');}
  else{D.quotes.push({...obj,id:nid(),created:today()});toast('請求書を登録しました');}
  save();cmo();buildPage();
}
function _saveIP(id){
  if(!gv('iv-ti')){toast('請求書名を入力してください','er');return;}
  const obj=_collectI();let sid=id;
  if(id){const i=D.quotes.findIndex(q=>q.id===id);D.quotes[i]={...D.quotes[i],...obj};}
  else{const nq={...obj,id:nid(),created:today()};D.quotes.push(nq);sid=nq.id;}
  save();cmo();setTimeout(()=>printInvoice(sid),80);buildPage();
}

// MOBILE CALENDAR (スマホ専用)
// ============================================================
let _mobLongPress = null;
let _mobSelDate = null;

function pgCal(){
  if(window.innerWidth <= 768){
    mobCalMonth();
  } else {
    if(calV==='month') calMonth();
    else if(calV==='day') calDay();
    else calWeek();
  }
}

function mobCalMonth(){
  const now = new Date();
  const hols = jpHols(calY);
  const first = new Date(calY, calM, 1).getDay();
  const dim = new Date(calY, calM+1, 0).getDate();
  const dns = ['日','月','火','水','木','金','土'];
  const dnsColors = ['var(--red)','var(--text)','var(--text)','var(--text)','var(--text)','var(--text)','var(--blue)'];

  // 前月の日
  let cells = [];
  const pd = new Date(calY, calM, 0).getDate();
  for(let i=first-1;i>=0;i--) cells.push({day:pd-i,cur:false,date:null});
  for(let d=1;d<=dim;d++){
    const ds = `${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({day:d,cur:true,date:ds,dw:(first+d-1)%7});
  }
  while(cells.length%7) cells.push({day:cells.length-dim-first+1,cur:false,date:null});

  const gridHTML = cells.map((c,idx)=>{
    if(!c.cur) return `<div class="mob-cal-cell other-month"><span class="mob-cal-dn">${c.day}</span></div>`;
    const dw = idx % 7;
    const ds = c.date;
    const isT = now.getFullYear()===calY && now.getMonth()===calM && now.getDate()===c.day;
    const hol = hols[ds];
    const isRed = dw===0 || hol;
    const isSat = dw===6;
    const dnClass = `mob-cal-dn${isRed?' sun':isSat?' sat':''}`;

    // イベント（最大3件）
    const evs = [...calADForDay(ds), ...calSForDay(ds)].slice(0,3).map(it=>{
      const isProj = it.phase !== undefined;
      const color = isProj ? pc(it.phase) : (it.color||'var(--accent)');
      const title = it.title.slice(0,5);
      return `<span class="mob-ev" style="background:${color}">${title}</span>`;
    }).join('');

    return `<div class="mob-cal-cell${isT?' today':''}" 
      data-date="${ds}"
      onclick="_mobTap('${ds}')"
      ontouchstart="_mobTouchStart(event,'${ds}')"
      ontouchend="_mobTouchEnd(event)"
      ontouchmove="_mobTouchEnd(event)">
      <span class="${dnClass}">${isT?`<span>${c.day}</span>`:c.day}</span>
      ${evs}
    </div>`;
  }).join('');

  const dowHTML = dns.map((d,i)=>
    `<div style="color:${dnsColors[i]}">${d}</div>`
  ).join('');

  document.getElementById('ct').innerHTML = `
    <div class="mob-cal">
      <div class="mob-cal-header">
        <div class="mob-cal-nav">
          <button class="btn bs bsm" onclick="calM--;if(calM<0){calM=11;calY--;}mobCalMonth()">◀</button>
          <div class="mob-cal-title">${calM+1}月<span>${calY}年</span></div>
          <button class="btn bs bsm" onclick="calM=new Date().getMonth();calY=new Date().getFullYear();mobCalMonth()">今日</button>
          <button class="btn bs bsm" onclick="calM++;if(calM>11){calM=0;calY++;}mobCalMonth()">▶</button>
        </div>
        <div class="mob-cal-dow">${dowHTML}</div>
      </div>
      <div class="mob-cal-grid">${gridHTML}</div>
    </div>`;
}

// タップ（予定一覧表示）
function _mobTap(ds){
  _mobSelDate = ds;
  const d = new Date(ds);
  const dns = ['日','月','火','水','木','金','土'];
  const hols = jpHols(d.getFullYear());
  const hol = hols[ds];
  const label = `${d.getMonth()+1}月${d.getDate()}日（${dns[d.getDay()]}）${hol?'🎌'+hol:''}`;

  const ad = calADForDay(ds);
  const sc = calSForDay(ds);
  const all = [...ad, ...sc];

  const itemsHTML = all.length ? all.map(it=>{
    const isProj = it.phase !== undefined;
    const color = isProj ? pc(it.phase) : (it.color||'var(--accent)');
    const time = isProj ? '終日' : (it.allDay ? '終日' : `${it.st}–${it.et}`);
    const onclick = isProj
      ? `showProjMo(${it.id})`
      : `showSchedMo(${it.id},'${ds}')`;
    return `<div class="mob-sheet-item" onclick="${onclick}">
      <div class="mob-sheet-dot" style="background:${color}"></div>
      <div class="mob-sheet-time">${time}</div>
      <div class="mob-sheet-title">${esc(it.title)}</div>
      <span style="color:var(--text3);font-size:16px">›</span>
    </div>`;
  }).join('') : `<div style="text-align:center;padding:24px;color:var(--text3)">予定なし</div>`;

  document.getElementById('mob-sheet-date').textContent = label;
  document.getElementById('mob-sheet-body').innerHTML = itemsHTML +
    `<div style="padding:12px 16px">
      <button class="btn bp" style="width:100%;justify-content:center" onclick="showSchedMo(null,'${ds}');closeMobSheet()">＋ この日に追加</button>
    </div>`;

  document.getElementById('mob-day-sheet').classList.add('open');
}

// 長押し（0.5秒で追加）
function _mobTouchStart(e, ds){
  _mobLongPress = setTimeout(()=>{
    _mobLongPress = null;
    showSchedMo(null, ds);
  }, 500);
}
function _mobTouchEnd(e){
  if(_mobLongPress){ clearTimeout(_mobLongPress); _mobLongPress = null; }
}

function closeMobSheet(){
  document.getElementById('mob-day-sheet')?.classList.remove('open');
}

function _calDayTap(ds){
  if(window.innerWidth<=768){
    // スマホ: 選択日のスケジュール一覧を下に表示
    const hols=jpHols(new Date(ds).getFullYear());
    const hol=hols[ds];
    const ad=calADForDay(ds);
    const sc=calSForDay(ds);
    const d=new Date(ds);
    const dns=['日','月','火','水','木','金','土'];
    const label=`${d.getMonth()+1}月${d.getDate()}日（${dns[d.getDay()]}）${hol?'🎌'+hol:''}`;
    // 既存のデイパネルを削除
    document.getElementById('mob-day-panel')?.remove();
    const panel=document.createElement('div');
    panel.id='mob-day-panel';
    panel.style.cssText='position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--accent);border-radius:14px 14px 0 0;padding:14px 16px 32px;z-index:95;max-height:55vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(44,38,32,.15)';
    const items=[
      ...ad.map(it=>it.phase!==undefined
        ?`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="background:${pc(it.phase)};color:#fff;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700">⚡終日</span><span style="font-weight:600">${esc(it.title)}</span><button class="btn bs bsm" style="margin-left:auto" onclick="showProjMo(${it.id})">✏️</button></div>`
        :`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="background:${it.color||'var(--accent)'};color:#fff;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700">終日</span><span style="font-weight:600">${esc(it.title)}</span></div>`
      ),
      ...sc.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="background:${s.color||'var(--accent)'};color:#fff;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700">${s.st}–${s.et}</span><span style="font-weight:600;flex:1">${esc(s.title)}</span><button class="btn bs bsm" onclick="showSchedMo(${s.id},'${ds}')">✏️</button></div>`)
    ].join('');
    panel.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:15px;font-weight:700">${label}</div>
        <button class="btn bs bsm" onclick="document.getElementById('mob-day-panel')?.remove()">✕</button>
      </div>
      ${items||'<div style="text-align:center;padding:16px;color:var(--text3)">予定なし</div>'}
      <button class="btn bp" style="width:100%;justify-content:center;margin-top:10px" onclick="showSchedMo(null,'${ds}');document.getElementById('mob-day-panel')?.remove()">＋ この日に追加</button>
    `;
    document.body.appendChild(panel);
  } else {
    showSchedMo(null,ds);
  }
}

}
