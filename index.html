function exportStockCSV(){
  if(!D.stockItems||!D.stockItems.length){toast('在庫データがありません','er');return;}
  var hdrs=['品名','単位','現在庫数','発注点','発注先','単価'];
  var rows=D.stockItems.map(function(i){
    return[i.name||'',i.unit||'',i.qty||0,i.reorder||0,i.supplier||'',i.price||0];
  });
  var bom='\uFEFF';
  var csv=bom+[hdrs].concat(rows).map(function(r){
    return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');
  }).join('\r\n');
  var now=new Date();
  var fname='在庫一覧_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'.csv';
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=fname;a.click();
  toast('CSVをエクスポートしました ✅','in');
}

// STOCK 在庫管理
// ============================================================
let _stSrch='',_stFKoji='全て',_stFStock='全て',_stFSup='全て',_stDsrT=null,_stFocusSearch=false,_stComposing=false;
let _ime=false; // グローバルIMEコンポジション中フラグ（全テキスト入力共通）
const _KOJI_DEF=['照明工事','配線工事','スイッチ工事','分電盤工事','コンセント工事','エアコン工事','太陽光工事','その他'];
function getKojiTypes(){
  const custom=(D.cfg&&D.cfg.stockKojiTypes)||[];
  return[..._KOJI_DEF,...custom.filter(k=>!_KOJI_DEF.includes(k))];
}
const _UNIT=['個','巻','本','台','式','枚','袋','箱','m','組','セット'];

function pgStock(){
  if(!D.stockItems) D.stockItems=[];
  if(!D.stockLogs)  D.stockLogs=[];
  const items=D.stockItems;

  // ユニークな工事種・発注先
  const kojiTypes=[...new Set(items.map(i=>i.kojiType).filter(Boolean))];
  const suppliers=[...new Set(items.map(i=>i.supplier).filter(Boolean))];
  // staleフィルターリセット（対象データが消えた場合）
  if(_stFKoji!=='全て'&&!kojiTypes.includes(_stFKoji)) _stFKoji='全て';
  if(_stFSup!=='全て'&&!suppliers.includes(_stFSup))   _stFSup='全て';

  // フィルタリング
  const q=_stSrch.toLowerCase();
  let filtered=items.filter(i=>{
    const ms=!q||(i.name||'').toLowerCase().includes(q)||(i.partNo||'').toLowerCase().includes(q)||(i.maker||'').toLowerCase().includes(q)||(i.kojiType||'').toLowerCase().includes(q);
    const mk=_stFKoji==='全て'||(i.kojiType||'')===_stFKoji;
    const mst=_stFStock==='全て'||(_stFStock==='残少のみ'&&i.qty<=(i.reorder||0)&&i.qty>0)||(_stFStock==='在庫なし'&&i.qty<=0);
    const msup=_stFSup==='全て'||(i.supplier||'')===_stFSup;
    return ms&&mk&&mst&&msup;
  });

  // 統計
  const totalItems=items.length;
  const lowStock=items.filter(i=>i.qty>0&&i.qty<=(i.reorder||0)).length;
  const outOfStock=items.filter(i=>i.qty<=0).length;
  const totalValue=items.reduce((s,i)=>s+(i.qty||0)*(i.price||0),0);

  // 残少・在庫なしを上に並べ替え
  filtered.sort((a,b)=>{
    const wa=a.qty<=0?2:a.qty<=(a.reorder||0)?1:0;
    const wb=b.qty<=0?2:b.qty<=(b.reorder||0)?1:0;
    if(wa!==wb)return wb-wa;
    return(a.name||'').localeCompare(b.name||'','ja');
  });

  // テーブル行
  const rows=filtered.length?filtered.map(i=>{
    const isOut=i.qty<=0;
    const isLow=!isOut&&i.qty<=(i.reorder||0);
    const qc=isOut?'var(--red)':isLow?'var(--yellow)':'var(--green)';
    const rowBg=isOut?'background:rgba(184,64,64,.04)':isLow?'background:rgba(200,146,42,.04)':'';
    const warn=isOut?'⛔ ':isLow?'⚠ ':'';
    const kojiTag=i.kojiType?`<span style="background:rgba(74,124,95,.1);color:var(--accent);padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700">${esc(i.kojiType)}</span>`:'';
    const subLine=[i.partNo,i.maker].filter(Boolean).join(' · ');
    const orderBtn=(isOut||isLow)?`<button class="btn bsm" style="color:var(--yellow);border-color:rgba(200,146,42,.5);background:rgba(200,146,42,.07)" onclick="showStockLogMo(${i.id},'入庫')">📋 発注</button>`:'';
    return`<tr style="${rowBg}">
      <td style="max-width:260px">
        <div style="font-weight:700;font-size:12px;margin-bottom:2px">${esc(i.name)}</div>
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          ${subLine?`<span style="font-size:10px;color:var(--text3)">${esc(subLine)}</span>`:''}
          ${kojiTag}
        </div>
      </td>
      <td style="color:${qc};font-weight:900;font-size:13px;white-space:nowrap">${warn}${fmtN(i.qty)}<span style="font-size:10px;font-weight:400"> ${esc(i.unit||'')}</span></td>
      <td style="color:var(--text3);font-size:12px;white-space:nowrap">${fmtN(i.reorder||0)} ${esc(i.unit||'')}</td>
      <td style="font-size:12px;color:var(--text3);white-space:nowrap">${fmt(i.price||0)}</td>
      <td style="white-space:nowrap;text-align:right">
        ${orderBtn}
        <button class="btn bsm bs" onclick="showStockLogMo(${i.id},'入庫')" title="入庫">入</button>
        <button class="btn bsm bs" onclick="showStockLogMo(${i.id},'出庫')" title="出庫">出</button>
        <button class="btn bsm bs" onclick="showStockItemMo(${i.id})" title="編集">✏</button>
      </td>
    </tr>`;
  }).join(''):`<tr><td colspan="5"><div class="emp" style="padding:36px 20px">該当する品目がありません</div></td></tr>`;

  const kojiOpts=kojiTypes.map(k=>`<option value="${esc(k)}" ${_stFKoji===k?'selected':''}>${esc(k)}</option>`).join('');
  const supOpts=suppliers.map(s=>`<option value="${esc(s)}" ${_stFSup===s?'selected':''}>${esc(s)}</option>`).join('');
  const mob=window.innerWidth<=768;

  document.getElementById('ct').innerHTML=`
  <div style="max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:11px">

    <!-- サマリーカード -->
    <div style="display:grid;grid-template-columns:${mob?'1fr 1fr':'repeat(4,1fr)'};gap:10px">
      <div class="sc"><div class="sl">登録品目</div><div class="sv" style="color:var(--blue)">${totalItems}</div><div class="ss">品目数</div></div>
      <div class="sc"><div class="sl">残少アラート</div><div class="sv" style="color:var(--yellow)">${lowStock}</div><div class="ss">発注点以下</div></div>
      <div class="sc"><div class="sl">在庫なし</div><div class="sv" style="color:var(--red)">${outOfStock}</div><div class="ss">要補充</div></div>
      <div class="sc"><div class="sl">在庫総額</div><div class="sv" style="font-size:${mob?'14':'16'}px;color:var(--accent)">${fmt(totalValue)}</div><div class="ss">標準単価×在庫数</div></div>
    </div>

    <!-- フィルター -->
    <div class="card" style="padding:10px 14px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select onchange="_stFKoji=this.value;buildPage()" style="font-size:12px">
          <option value="全て">工事種：全て</option>${kojiOpts}
        </select>
        <select onchange="_stFStock=this.value;buildPage()" style="font-size:12px">
          <option value="全て" ${_stFStock==='全て'?'selected':''}>在庫状態：全て</option>
          <option value="残少のみ" ${_stFStock==='残少のみ'?'selected':''}>残少のみ</option>
          <option value="在庫なし" ${_stFStock==='在庫なし'?'selected':''}>在庫なし</option>
        </select>
        ${supOpts?`<select onchange="_stFSup=this.value;buildPage()" style="font-size:12px">
          <option value="全て">発注先：全て</option>${supOpts}
        </select>`:''}
        ${(_stSrch||_stFKoji!=='全て'||_stFStock!=='全て'||_stFSup!=='全て')?
          `<button class="btn bs bsm" onclick="_stSrch='';_stFKoji='全て';_stFStock='全て';_stFSup='全て';document.getElementById('st-srch').value='';buildPage()">✕ リセット</button>`:''}
      </div>
    </div>

    <!-- テーブル -->
    <div class="tw">
      <table>
        <thead><tr>
          <th>品名 / 型番・メーカー</th>
          <th>在庫数</th>
          <th>発注点</th>
          <th>標準単価</th>
          <th style="min-width:${mob?'80':'160'}px;text-align:right">操作</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    ${totalItems?`<div style="font-size:11px;color:var(--text3);text-align:right">${filtered.length}件表示 / 計${totalItems}品目</div>`:''}

    <!-- 操作ガイド（品目ゼロのとき） -->
    ${!totalItems?`<div class="card" style="text-align:center;padding:36px 20px">
      <div style="font-size:48px;margin-bottom:12px">📦</div>
      <div style="font-weight:900;margin-bottom:6px">品目がまだ登録されていません</div>
      <div style="color:var(--text3);font-size:13px;margin-bottom:18px">電材・資材などを登録すると在庫管理を始められます</div>
      <button class="btn bp" onclick="showStockItemMo()">＋ 最初の品目を登録する</button>
    </div>`:''}

  </div>`;
}

// 品目登録・編集モーダル

  const unitSel=_UNIT.map(u=>`<option ${(item?.unit||'個')===u?'selected':''}>${u}</option>`).join('');
  const delBtn=item?`<button class="btn bd" onclick="delStockItem(${id})">🗑 削除</button>`:'';

  const customTags=customKoji.length?customKoji.map(k=>
    `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:10px;margin:2px 2px 0 0">
      ${esc(k)}<button type="button" onclick="_delKojiType('${esc(k)}')" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:11px;padding:0 0 0 2px;line-height:1">✕</button>

  </div>`);
  setTimeout(()=>document.getElementById('sk-nm')?.focus(),80);
}

function _toggleKojiAdd(){
  const w=document.getElementById('sk-kj-wrap');
  if(!w)return;
  const show=w.style.display==='none'||!w.style.display;
  w.style.display=show?'block':'none';
  if(show)setTimeout(()=>document.getElementById('sk-kj-new')?.focus(),50);
}

function _addKojiType(){
  const inp=document.getElementById('sk-kj-new');
  const val=(inp?.value||'').trim();
  if(!val){toast('工事種名を入力してください','er');return;}
  if(!D.cfg)D.cfg={};
  if(!D.cfg.stockKojiTypes)D.cfg.stockKojiTypes=[];
  if(getKojiTypes().includes(val)){toast('すでに存在する工事種です','er');return;}
  D.cfg.stockKojiTypes.push(val);
  save();_flush();
  // select を全再構築（appendChildより確実）
  const sel=document.getElementById('sk-kj');
  if(sel){
    const allTypes=getKojiTypes();
    sel.innerHTML=allTypes.map(k=>`<option${k===val?' selected':''}>${esc(k)}</option>`).join('');
  }
  if(inp)inp.value='';
  // カスタム一覧を更新
  const box=document.getElementById('sk-kj-custom');
  if(box){
    const custom=D.cfg.stockKojiTypes;
    box.innerHTML=custom.map(k=>
      `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:10px;margin:2px 2px 0 0">
        ${esc(k)}<button type="button" onclick="_delKojiType('${esc(k)}')" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:11px;padding:0 0 0 2px;line-height:1">✕</button>
      </span>`
    ).join('');
  }
  toast(`「${val}」を追加しました ✅`);
}

function _delKojiType(name){
  if(!D.cfg||!D.cfg.stockKojiTypes)return;
  D.cfg.stockKojiTypes=D.cfg.stockKojiTypes.filter(k=>k!==name);
  save();_flush();
  // select を getKojiTypes() から全再構築（removeChild依存を排除）
  const sel=document.getElementById('sk-kj');
  if(sel){
    const cur=sel.value;
    const newTypes=getKojiTypes();
    sel.innerHTML=newTypes.map(k=>`<option${(k===cur&&k!==name)?' selected':''}>${esc(k)}</option>`).join('');
  }
  // カスタム一覧を更新
  const box=document.getElementById('sk-kj-custom');
  if(box){
    const custom=D.cfg.stockKojiTypes;
    box.innerHTML=custom.length?custom.map(k=>

function saveStockItem(id){
  if(!D.stockItems) D.stockItems=[];
  const nm=gv('sk-nm').trim();
  if(!nm){toast('品名を入力してください','er');return;}
  const obj={
    name:nm,
    partNo:gv('sk-pn').trim(),
    maker:gv('sk-mk').trim(),
    kojiType:gv('sk-kj'),
    unit:gv('sk-un'),
    qty:parseFloat(gv('sk-qty'))||0,
    reorder:parseFloat(gv('sk-ro'))||0,
    price:parseFloat(gv('sk-pr'))||0,
    supplier:gv('sk-sup').trim(),
    memo:gv('sk-me').trim(),
  };
  const realId=(id&&id!=='null')?parseInt(id):null;
  if(realId){
    const idx=D.stockItems.findIndex(s=>s.id===realId);
    if(idx>=0){D.stockItems[idx]={...D.stockItems[idx],...obj};toast('更新しました ✅');}
  }else{
    D.stockItems.push({...obj,id:nid(),created:today()});
    toast('登録しました ✅');
  }
  save();_flush();cmo();buildPage();
}

function delStockItem(id){
  if(!confirm('この品目を削除しますか？\n（入出庫ログも削除されます）'))return;
  D.stockItems=(D.stockItems||[]).filter(i=>i.id!==id);
  D.stockLogs=(D.stockLogs||[]).filter(l=>l.itemId!==id);
  save();_flush();cmo();toast('削除しました');buildPage();
}

function _stLogTypeChange(type){
  const w=document.getElementById('sl-in-wrap');

}

function saveStockLog(itemId){
  if(!D.stockLogs) D.stockLogs=[];
  if(!D.stockItems) D.stockItems=[];
  const item=D.stockItems.find(i=>i.id===itemId);
  if(!item){toast('品目が見つかりません','er');return;}
  const type=gv('sl-tp');
  const qty=parseFloat(gv('sl-qty'))||0;
  if(qty<=0){toast('数量を入力してください','er');return;}
  if(type==='出庫'&&item.qty<qty){toast(`在庫数が不足しています（在庫: ${fmtN(item.qty)}${item.unit||''}）`,'er');return;}
  const before=item.qty;
  if(type==='入庫') item.qty=Math.round((item.qty+qty)*100)/100;
  else item.qty=Math.round(Math.max(0,item.qty-qty)*100)/100;
  // 入庫時は単価・発注先を更新
  if(type==='入庫'){
    const np=parseFloat(gv('sl-pr'))||0;
    const ns=gv('sl-sup').trim();
    if(np>0) item.price=np;
    if(ns) item.supplier=ns;
  }
  const log={
    id:nid(),itemId,type,qty,before,after:item.qty,
    date:gv('sl-dt')||today(),
    projectId:parseInt(gv('sl-pj'))||null,
    supplier:gv('sl-sup')||'',
    price:parseFloat(gv('sl-pr'))||0,
    memo:gv('sl-me')||'',
  };
  D.stockLogs.push(log);
  save();_flush();cmo();
  toast(`${type}を記録しました ✅  ${fmtN(before)} → ${fmtN(item.qty)} ${item.unit||''}`);
  if(item.qty<=(item.reorder||0)){
    setTimeout(()=>toast(`⚠ 「${item.name}」が発注点以下です`,'in'),600);
  }
  buildPage();
}

function restoreData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    try{
      const b=JSON.parse(ev.target.result);
      D={customers:b.customers||[],projects:b.projects||[],quotes:b.quotes||[],schedules:b.schedules||[],staff:b.staff||[],stockItems:b.stockItems||[],stockLogs:b.stockLogs||[],bizCards:b.bizCards||[],teams:b.teams||[],timeShifts:b.timeShifts||{},reservations:b.reservations||[],nextId:b.nextId||200,cfg:b.cfg||{}};
      // handle old field names (cid vs customerId, sd/ed vs startDate/endDate)
      D.projects=D.projects.map(p=>({...p,cid:p.cid||p.customerId,sd:p.sd||p.startDate,ed:p.ed||p.endDate,imgs:p.imgs||p.images||[]}));
      D.quotes=D.quotes.map(q=>({...q,cid:q.cid||q.customerId,qn:q.qn||q.quoteNo,cp:q.cp||q.contactPerson}));
      D.schedules=D.schedules.map(s=>({...s,pid:s.pid||s.projectId,st:s.st||s.startTime,et:s.et||s.endTime}));
      D.customers=D.customers.map(c=>({...c,cn:c.cn||c.custNo}));
      _flush();toast('データを復元しました','in');buildPage();_bc();
    }catch{toast('復元に失敗しました','er');}
  };r.readAsText(f);e.target.value='';
}

  const connected=!!_gtoken;
  const lbl=document.getElementById('gdrive-label');
  const sv=document.getElementById('gdrive-save-btn');
  const ld=document.getElementById('gdrive-load-btn');
  const st=document.getElementById('gdrive-status');
  if(lbl) lbl.textContent=connected?'接続中 ✓ 切断する':'Google Drive 接続';
  if(sv) sv.style.display=connected?'flex':'none';
  if(ld) ld.style.display=connected?'flex':'none';
  if(st){
    if(connected){
      st.style.display='block';
      const auto=localStorage.getItem('s5_gdrive_auto')==='1';
      st.innerHTML='<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px"><input type="checkbox" id="gdrive-auto" '+(auto?'checked':'')+' onchange="_gSetAuto(this.checked)"> 自動同期</label>';
      _gautoSync=auto;
    }else{
      st.style.display='none';
    }
  }
}

function _gSetAuto(v){
  _gautoSync=v;
  localStorage.setItem('s5_gdrive_auto',v?'1':'0');
  toast(v?'自動同期を有効にしました':'自動同期を無効にしました','in');
}

function gdriveToggle(){
  if(_gtoken){
    _gtoken=null;
    localStorage.removeItem('s5_gdrive_token');
    _gautoSync=false;
    _gdriveUpdateUI();
    toast('Google Driveから切断しました','in');
    return;
  }
  // Client ID チェック
  let clientId=localStorage.getItem(GDRIVE_CLIENT_ID_KEY)||'';

        Google Cloud ConsoleでOAuthクライアントIDを取得し、以下に入力してください。

function _gSaveClientId(){
  const cid=document.getElementById('gdrive-cid')?.value.trim();
  if(!cid){toast('クライアントIDを入力してください','er');return;}
  localStorage.setItem(GDRIVE_CLIENT_ID_KEY,cid);
  cmo();
  _gAuth(cid);
}

function _gAuth(clientId){
  if(typeof google==='undefined'||!google.accounts){
    toast('Google認証ライブラリを読み込み中...再度お試しください','er');
    return;
  }
  const client=google.accounts.oauth2.initTokenClient({
    client_id:clientId,
    scope:'https://www.googleapis.com/auth/drive.file',
    callback:(resp)=>{
      if(resp.error){
        toast('認証に失敗しました: '+resp.error,'er');
        return;
      }
      _gtoken=resp.access_token;
      localStorage.setItem('s5_gdrive_token',_gtoken);
      _gdriveUpdateUI();
      toast('Google Driveに接続しました ✓','in');
    }
  });
  client.requestAccessToken();
}

// Drive API ヘルパー
async function _gFindFile(){
  const res=await fetch('https://www.googleapis.com/drive/v3/files?q=name%3D%27'+encodeURIComponent(GDRIVE_FILE_NAME)+'%27+and+trashed%3Dfalse&spaces=drive&fields=files(id,name,modifiedTime)',{
    headers:{'Authorization':'Bearer '+_gtoken}
  });
  if(!res.ok) throw new Error('Drive検索失敗: '+res.status);
  const data=await res.json();
  return data.files&&data.files.length?data.files[0]:null;
}

async function _gUpload(content,fileId){
  const metadata={name:GDRIVE_FILE_NAME,mimeType:'application/json'};
  const boundary='----bizlock'+Date.now();
  const body='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(metadata)+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+content+'\r\n--'+boundary+'--';
  const url=fileId
    ?'https://www.googleapis.com/upload/drive/v3/files/'+fileId+'?uploadType=multipart'
    :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const res=await fetch(url,{
    method:fileId?'PATCH':'POST',
    headers:{'Authorization':'Bearer '+_gtoken,'Content-Type':'multipart/related; boundary='+boundary},
    body:body
  });
  if(!res.ok) throw new Error('アップロード失敗: '+res.status);
  return await res.json();
}

async function _gDownload(fileId){
  const res=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media',{
    headers:{'Authorization':'Bearer '+_gtoken}
  });
  if(!res.ok) throw new Error('ダウンロード失敗: '+res.status);
  return await res.json();
}

// 保存
async function gdriveSave(){
  if(!_gtoken){toast('Google Driveに接続してください','er');return;}
  toast('Google Driveに保存中...','in');
  try{
    const content=JSON.stringify({...D,ver:'5.0',exportDate:new Date().toISOString(),syncSource:'gdrive'});
    const existing=await _gFindFile();
    await _gUpload(content,existing?.id||null);
    const now=new Date().toLocaleTimeString('ja-JP');
    toast('Google Driveに保存しました ✓ ('+now+')','in');
    localStorage.setItem('s5_gdrive_lastSync',new Date().toISOString());
  }catch(e){
    if(e.message.includes('401')){
      _gtoken=null;localStorage.removeItem('s5_gdrive_token');
      _gdriveUpdateUI();
      toast('認証が切れました。再接続してください','er');
    }else{
      toast('Drive保存エラー: '+e.message,'er');
    }
  }
}

// 読込
async function gdriveLoad(){
  if(!_gtoken){toast('Google Driveに接続してください','er');return;}
  toast('Google Driveから読み込み中...','in');
  try{
    const file=await _gFindFile();
    if(!file){toast('Driveにデータが見つかりません。先に保存してください','er');return;}
    const b=await _gDownload(file.id);
    D={
      customers:b.customers||[],projects:b.projects||[],quotes:b.quotes||[],
      schedules:b.schedules||[],staff:b.staff||[],
      stockItems:b.stockItems||[],stockLogs:b.stockLogs||[],
      bizCards:b.bizCards||[],teams:b.teams||[],timeShifts:b.timeShifts||{},reservations:b.reservations||[],nextId:b.nextId||200,cfg:b.cfg||{}
    };
    D.projects=D.projects.map(p=>({...p,cid:p.cid||p.customerId,sd:p.sd||p.startDate,ed:p.ed||p.endDate,imgs:p.imgs||p.images||[]}));
    D.quotes=D.quotes.map(q=>({...q,cid:q.cid||q.customerId,qn:q.qn||q.quoteNo,cp:q.cp||q.contactPerson}));
    D.schedules=D.schedules.map(s=>({...s,pid:s.pid||s.projectId,st:s.st||s.startTime,et:s.et||s.endTime}));
    D.customers=D.customers.map(c=>({...c,cn:c.cn||c.custNo}));
    _flush();buildPage();_bc();
    toast('Google Driveからデータを読み込みました ✓','in');
    localStorage.setItem('s5_gdrive_lastSync',new Date().toISOString());
  }catch(e){
    if(e.message.includes('401')){
      _gtoken=null;localStorage.removeItem('s5_gdrive_token');
      _gdriveUpdateUI();
      toast('認証が切れました。再接続してください','er');
    }else{
      toast('Drive読込エラー: '+e.message,'er');
    }
  }
}

// 自動同期（save()から呼ばれる）
function _gdriveAutoSync(){
  if(!_gautoSync||!_gtoken) return;
  clearTimeout(_gdriveAutoSync._t);
  _gdriveAutoSync._t=setTimeout(()=>gdriveSave().catch(()=>{}),5000);
}

function _getAlerts(){
  const today = new Date(); today.setHours(0,0,0,0);
  const days = parseInt(D.cfg?.alertDays||14);
  const limit = new Date(today); limit.setDate(today.getDate()+days);
  const alerts = [];

  const addAlert = (type, label, date, cid, custName, detail) => {
    if(!date) return;
    const d = new Date(date); d.setHours(0,0,0,0);
    const diff = Math.floor((d-today)/(1000*60*60*24));
    if(diff <= days) {
      alerts.push({type, label, date, diff, cid, custName, detail,
        urgent: diff <= 3,
        overdue: diff < 0
      });
    }
  };

  D.customers.forEach(c => {
    const name = c.name;
    // 保有機器
    (c.equipment||[]).forEach(eq => {
      if(eq.warrantyDate) addAlert('equip', `${name}｜${eq.name} 保証期限`, eq.warrantyDate, c.id, name, '保証期限');
      if(eq.nextCheck)    addAlert('equip', `${name}｜${eq.name} 点検予定`, eq.nextCheck, c.id, name, '次回点検');
    });
    // 契約
    const ct = c.contracts||{};
    (ct.warranty||[]).forEach(item  => { if(item.expire) addAlert('contract', `${name}｜保証期限 ${item.title}`, item.expire, c.id, name, '保証'); });
    (ct.maintenance||[]).forEach(item => { if(item.renew)  addAlert('contract', `${name}｜保守契約更新 ${item.title}`, item.renew, c.id, name, '保守契約'); });
    (ct.inspection||[]).forEach(item  => { if(item.next)   addAlert('contract', `${name}｜点検予定 ${item.title}`, item.next, c.id, name, '点検契約'); });
    (ct.lease||[]).forEach(item       => { if(item.end)    addAlert('contract', `${name}｜リース終了 ${item.title}`, item.end, c.id, name, 'リース'); });
  });

  // 案件の終了日
  D.projects.forEach(p => {
    if(p.ed && p.status !== '完了' && p.status !== '中止') {
      const c = p.cid ? D.customers.find(c=>c.id===p.cid) : null;
      addAlert('project', `${c?c.name:'案件'}｜${p.title} 終了日`, p.ed, p.cid, c?.name||'', '案件終了');
    }
  });

  // 見積の有効期限
  D.quotes.forEach(q => {
    if(!q.isInvoice && q.validity) {
      // validity が日付形式の場合
      const m = String(q.validity).match(/(\d{4}[-\/]\d{1,2}[-\/]\d{1,2})/);
      if(m) {
        const c = q.cid ? D.customers.find(c=>c.id===q.cid) : null;
        addAlert('quote', `${c?c.name:'見積'}｜${q.title} 有効期限`, m[1], q.cid, c?.name||'', '見積期限');
      }
    }
  });

  return alerts.sort((a,b) => a.date.localeCompare(b.date));
}
function _alertCount(){
  return _getAlerts().filter(a=>!a.overdue||a.diff>=-7).length;
}

    <div style="display:flex;gap:7px;justify-content:center;margin-top:14px">

function saveWorkRecord(pid,wrIdx){
  var p=D.projects.find(function(pr){return pr.id===pid;});if(!p)return;
  if(!p.workRecords) p.workRecords=[];
  var title=document.getElementById('wr-title').value.trim();
  if(!title){toast('タイトルを入力してください','er');return;}

  var equipRefs=[].slice.call(document.querySelectorAll('.wr-eq-cb:checked')).map(function(cb){
    return {idx:parseInt(cb.value)};
  });

  var obj={
    title:title,
    date:document.getElementById('wr-date').value||today(),
    description:document.getElementById('wr-desc').value.trim(),
    equipRefs:equipRefs,
    materials:document.getElementById('wr-mat').value.trim()
  };

  if(wrIdx>=0&&p.workRecords[wrIdx]){
    // 既存の写真データを保持
    obj.beforeImgs=p.workRecords[wrIdx].beforeImgs||[];
    obj.afterImgs=p.workRecords[wrIdx].afterImgs||[];
    obj.id=p.workRecords[wrIdx].id;
    p.workRecords[wrIdx]=obj;
    toast('施工内容を更新しました ✅');
  } else {
    obj.beforeImgs=[];
    obj.afterImgs=[];
    obj.id=nid();

function delWorkRecord(pid,wrIdx){
  var p=D.projects.find(function(pr){return pr.id===pid;});if(!p||!p.workRecords)return;
  p.workRecords.splice(wrIdx,1);
  save();_flush();cmo();toast('施工内容を削除しました');buildPage();
}

function wrUploadImg(pid,wrIdx,phase,inp){
  var p=D.projects.find(function(pr){return pr.id===pid;});if(!p)return;
  if(!p.workRecords) p.workRecords=[];
  // 新規の場合、まず仮保存する
  if(wrIdx<0){
    var title=document.getElementById('wr-title').value.trim()||'施工記録';
    var obj={
      id:nid(),title:title,date:document.getElementById('wr-date').value||today(),
      description:document.getElementById('wr-desc').value.trim(),
      beforeImgs:[],afterImgs:[],equipRefs:[],
      materials:document.getElementById('wr-mat').value.trim()
    };
    p.workRecords.push(obj);
    wrIdx=p.workRecords.length-1;
    save();
  }
  var wr=p.workRecords[wrIdx];if(!wr)return;
  var key=phase==='before'?'beforeImgs':'afterImgs';
  if(!wr[key])wr[key]=[];
  var files=Array.from(inp.files);if(!files.length)return;
  var done=0;
  files.forEach(function(f){
    if(f.size>5*1024*1024){toast(f.name+'は5MB超のためスキップ','er');done++;return;}
    var r=new FileReader();
    r.onload=function(e){
      wr[key].push({data:e.target.result,name:f.name,added:today()});
      done++;
      if(done===files.length){
        save();cmo();
        showWorkRecordMo(pid,wrIdx);
        toast(files.length+'枚追加しました ✅');
      }
    };
    r.readAsDataURL(f);
  });
}

function wrDelImg(pid,wrIdx,phase,imgIdx){
  var p=D.projects.find(function(pr){return pr.id===pid;});if(!p||!p.workRecords)return;
  var wr=p.workRecords[wrIdx];if(!wr)return;
  var key=phase==='before'?'beforeImgs':'afterImgs';
  if(wr[key])wr[key].splice(imgIdx,1);
  save();cmo();showWorkRecordMo(pid,wrIdx);
  toast('写真を削除しました');
}

function _wrAddModel(){
  const box=document.getElementById('wr-models');if(!box)return;
  const row=document.createElement('div');
  row.style.cssText='display:flex;gap:4px;margin-bottom:4px';
  row.className='wr-model-row';
  row.innerHTML='<input placeholder="型番・品名" style="flex:1;font-size:12px" class="wr-mn">'+
    '<input placeholder="仕様" style="width:100px;font-size:12px" class="wr-ms">'+
    '<button class="btn bd bsm" onclick="this.parentElement.remove()">×</button>';
  box.appendChild(row);
}

function _wrUpload(projId,idx,type,inp){
  const files=Array.from(inp.files);if(!files.length)return;
  const p=D.projects.find(p=>p.id===projId);if(!p)return;
  if(!p.workRecords)p.workRecords=[];
  // 新規作成中の場合、仮レコードを作る
  if(idx<0||idx>=p.workRecords.length){
    p.workRecords.push({title:'',date:today(),description:'',beforePhotos:[],afterPhotos:[],modelNumbers:[],equipmentIds:[],worker:'',memo:''});
    idx=p.workRecords.length-1;
  }
  const r=p.workRecords[idx];
  if(!r.beforePhotos)r.beforePhotos=[];
  if(!r.afterPhotos)r.afterPhotos=[];
  const arr=type==='before'?r.beforePhotos:r.afterPhotos;
  let done=0;
  files.forEach(function(f){
    if(f.size>5*1024*1024){toast(f.name+'は5MB超のためスキップ','er');done++;return;}
    const reader=new FileReader();
    reader.onload=function(e){
      arr.push({data:e.target.result,name:f.name,added:today()});
      done++;
      if(done===files.length){
        save();
        showWorkRecordMo(projId,idx);
        toast(files.length+'枚追加しました ✅');
      }
    };
    reader.readAsDataURL(f);
  });
}

function _wrDelPhoto(projId,idx,type,photoIdx){
  const p=D.projects.find(p=>p.id===projId);if(!p||!p.workRecords||!p.workRecords[idx])return;
  const r=p.workRecords[idx];
  const arr=type==='before'?r.beforePhotos:r.afterPhotos;
  arr.splice(photoIdx,1);
  save();
  showWorkRecordMo(projId,idx);
  toast('写真を削除しました');
}

function saveWorkRecord(projId,idx){
  const p=D.projects.find(p=>p.id===projId);if(!p)return;
  if(!p.workRecords)p.workRecords=[];

  const title=document.getElementById('wr-title')?.value.trim()||'';
  const date=document.getElementById('wr-date')?.value||today();
  const worker=document.getElementById('wr-worker')?.value.trim()||'';
  const description=document.getElementById('wr-desc')?.value.trim()||'';
  const memo=document.getElementById('wr-memo')?.value.trim()||'';

  // 型番収集
  const modelNumbers=[];
  document.querySelectorAll('.wr-model-row').forEach(function(row){
    const mn=row.querySelector('.wr-mn')?.value.trim()||'';
    const ms=row.querySelector('.wr-ms')?.value.trim()||'';
    if(mn) modelNumbers.push({name:mn,spec:ms});
  });

  // 保有機器チェック
  const equipmentIds=[];
  document.querySelectorAll('.wr-eq-cb:checked').forEach(function(cb){
    equipmentIds.push(parseInt(cb.value));
  });

  const isNew=(idx<0||idx>=p.workRecords.length);
  if(isNew){
    // 新規（写真アップロードで仮作成された場合はそれを更新）
    if(idx>=0&&idx<p.workRecords.length){
      // 既存を更新
    }else{
      p.workRecords.push({beforePhotos:[],afterPhotos:[]});
      idx=p.workRecords.length-1;
    }
  }

  const r=p.workRecords[idx];
  r.title=title;
  r.date=date;
  r.worker=worker;
  r.description=description;
  r.memo=memo;
  r.modelNumbers=modelNumbers;
  r.equipmentIds=equipmentIds;
  if(!r.beforePhotos)r.beforePhotos=[];
  if(!r.afterPhotos)r.afterPhotos=[];

  save();_flush();
  toast('施工内容を保存しました ✅');
  showWorkRecordList(projId);
}

function deleteWorkRecord(projId,idx){
  const p=D.projects.find(p=>p.id===projId);
  if(!p||!p.workRecords||!p.workRecords[idx])return;
  if(!confirm('この施工内容を削除しますか？'))return;
  p.workRecords.splice(idx,1);
  save();_flush();
  toast('施工内容を削除しました');
  showWorkRecordList(projId);
}

function _del(type,id){
  document.getElementById('cov')?.remove();
  if(type==='customer'){D.customers=D.customers.filter(c=>c.id!==id);D.projects=D.projects.filter(p=>p.cid!==id);D.quotes=D.quotes.filter(q=>q.cid!==id);toast('顧客を削除しました');if(detCid===id){detCid=null;page='customers';}}
  else if(type==='project'){D.projects=D.projects.filter(p=>p.id!==id);toast('案件を削除しました');}
  else if(type==='quote'){D.quotes=D.quotes.filter(q=>q.id!==id);toast('見積を削除しました');}
  else if(type==='schedule'){D.schedules=D.schedules.filter(s=>s.id!==id);toast('スケジュールを削除しました');}
  else if(type==='bizcard'){D.bizCards=(D.bizCards||[]).filter(b=>b.id!==id);toast('名刺を削除しました');}
  else if(type==='team'){D.teams=(D.teams||[]).filter(t=>t.id!==id);toast('チームを削除しました');}
  save();_flush();buildPage();
}

let _calDragging=null,_calCopied=null;

function _calDragStart(ev,id){
  _calDragging=id;
  ev.dataTransfer.effectAllowed='move';
  ev.dataTransfer.setData('text/plain',String(id));
}

function _calDropDay(ev,container){
  ev.preventDefault();ev.stopPropagation();
  const ds=container.dataset.ds;if(!ds)return;
  const id=parseInt(ev.dataTransfer.getData('text/plain')||_calDragging);
  if(!id)return;
  const s=D.schedules.find(function(s){return s.id===id;});if(!s)return;
  const SH2=window.innerWidth<=768?40:SH;
  const rect=container.getBoundingClientRect();
  const scrollY=container.scrollTop||0;
  const relY=Math.max(0,ev.clientY-rect.top+scrollY);
  const totalMin=Math.round(relY/SH2*60/15)*15;
  const dropH=Math.floor(totalMin/60);
  const dropMm=totalMin%60;
  const p=function(t){var a=(t||'0:00').split(':');return parseInt(a[0])*60+(parseInt(a[1])||0);};
  const dur=Math.max(30,p(s.et)-p(s.st));
  const em=dropH*60+dropMm+dur;
  s.date=ds;
  s.st=dropH+':'+String(dropMm).padStart(2,'0');
  s.et=Math.floor(em/60)+':'+String(em%60).padStart(2,'0');
  _calDragging=null;save();_flush();
  toast('移動しました ✅');buildPage();
}

function _calDropMonth(ev,cell){
  ev.preventDefault();ev.stopPropagation();
  const ds=cell.dataset.ds;if(!ds)return;
  const id=parseInt(ev.dataTransfer.getData('text/plain')||_calDragging);
  if(!id)return;
  const s=D.schedules.find(function(s){return s.id===id;});if(!s)return;
  s.date=ds;
  _calDragging=null;save();_flush();
  toast('移動しました ✅');buildPage();
}

function _calDrop(ev,cell){
  ev.preventDefault();ev.stopPropagation();
  const ds=cell.dataset.ds;if(!ds)return;
  const rect=cell.getBoundingClientRect();
  const SH2=window.innerWidth<=768?40:SH;
  const relY=Math.max(0,ev.clientY-rect.top);
  const totalMin=Math.round(relY/SH2*60/15)*15;
  const dropH=Math.floor(totalMin/60);
  const dropMm=totalMin%60;
  const mm=String(dropMm).padStart(2,'0');
  const p=function(t){const a=(t||'0:00').split(':');return parseInt(a[0])*60+(parseInt(a[1])||0);};
  // 複製モード
  if(_calCopied!==null){
    const src=D.schedules.find(function(s){return s.id===_calCopied;});
    if(src){
      const dur=Math.max(30,p(src.et)-p(src.st));
      const em=dropH*60+dropMm+dur;
      D.schedules.push({...src,id:nid(),date:ds,
        st:dropH+':'+mm,
        et:Math.floor(em/60)+':'+String(em%60).padStart(2,'0')});
      _calCopied=null;save();_flush();
      toast('複製しました ✅');
      const _sb1=document.querySelector('.cal-scroll-body');
      const _st1=_sb1?_sb1.scrollTop:0;
      buildPage();
      const _sb2=document.querySelector('.cal-scroll-body');
      if(_sb2)_sb2.scrollTop=_st1;
      return;
    }
  }
  // 移動モード
  const id=parseInt(ev.dataTransfer.getData('text/plain')||_calDragging);
  if(!id)return;
  const s=D.schedules.find(function(s){return s.id===id;});if(!s)return;
  const dur=Math.max(30,p(s.et)-p(s.st));
  const em=dropH*60+dropMm+dur;
  s.date=ds;
  s.st=dropH+':'+mm;
  s.et=Math.floor(em/60)+':'+String(em%60).padStart(2,'0');
  _calDragging=null;save();_flush();
  toast('移動しました ✅');
  const _sb=document.querySelector('.cal-scroll-body');
  const _scrollTop=_sb?_sb.scrollTop:0;
  buildPage();
  const _sb2=document.querySelector('.cal-scroll-body');
  if(_sb2)_sb2.scrollTop=_scrollTop;
}

function _calCtxMenu(ev,id){
  document.getElementById('_ctx')?.remove();
  const s=D.schedules.find(s=>s.id===id);if(!s)return;
  const m=document.createElement('div');m.id='_ctx';
  m.style.cssText='position:fixed;left:'+ev.clientX+'px;top:'+ev.clientY+'px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px 0;z-index:9999;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,.15)';
  const ttl=document.createElement('div');
  ttl.style.cssText='padding:7px 14px;font-size:11px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px';
  ttl.textContent=s.title;
  m.appendChild(ttl);
  const mk=function(label,fn,color){
    const d=document.createElement('div');
    d.style.cssText='padding:8px 14px;font-size:12px;cursor:pointer;color:'+(color||'var(--text)');
    d.textContent=label;
    d.onmouseenter=function(){d.style.background='var(--bg3)';};
    d.onmouseleave=function(){d.style.background='';};
    d.onclick=function(){document.getElementById('_ctx')?.remove();fn();};
    m.appendChild(d);
  };
  mk('複製（貼り付け待機）',function(){_calCopyMode(id);});
  mk('編集',function(){showSchedMo(id);});
  mk('削除',function(){delCon('schedule',id);},'var(--red)');
  document.body.appendChild(m);
  setTimeout(function(){
    document.addEventListener('click',function h(){
      document.getElementById('_ctx')?.remove();
      document.removeEventListener('click',h);
    });
  },50);
}

function _calCopyMode(id){
  _calCopied=id;
  const s=D.schedules.find(s=>s.id===id);
  toast('「'+s.title+'」を複製待機中 → 貼り付け先をクリック（ESCでキャンセル）',4000);
  const fn=function(e){
    if(e.key==='Escape'){_calCopied=null;toast('キャンセル');document.removeEventListener('keydown',fn);}
  };
  document.addEventListener('keydown',fn);
}
