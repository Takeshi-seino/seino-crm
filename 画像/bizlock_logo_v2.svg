<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f0ede8"/>

  <!-- ===== Section C ===== -->
  <text x="400" y="36" font-family="system-ui,sans-serif" font-size="12" fill="#999" text-anchor="middle" letter-spacing="2">C系 — ダーク × イエロー ブロック</text>

  <!-- C-1: アイコン正方形 -->
  <text x="100" y="68" font-family="system-ui,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">C-1: アイコン単体</text>
  <g transform="translate(58, 80)">
    <rect x="0" y="0" width="84" height="84" rx="18" fill="#1C1C1E"/>
    <rect x="12" y="12" width="18" height="18" rx="3" fill="#2c2c2e"/>
    <rect x="34" y="12" width="18" height="18" rx="3" fill="#FFD600"/>
    <rect x="56" y="12" width="16" height="18" rx="3" fill="#2c2c2e"/>
    <rect x="12" y="34" width="18" height="18" rx="3" fill="#2c2c2e"/>
    <rect x="34" y="34" width="38" height="18" rx="3" fill="#FFD600"/>
    <rect x="12" y="56" width="38" height="16" rx="3" fill="#FFD600"/>
    <rect x="54" y="56" width="18" height="16" rx="3" fill="#2c2c2e"/>
  </g>

  <!-- C-2: 横長ロゴ (dark) -->
  <text x="340" y="68" font-family="system-ui,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">C-2: 横長ロゴ (ダーク背景)</text>
  <g transform="translate(188, 78)">
    <rect x="0" y="0" width="304" height="90" rx="14" fill="#1C1C1E"/>
    <rect x="14" y="14" width="17" height="17" rx="3" fill="#2c2c2e"/>
    <rect x="35" y="14" width="17" height="17" rx="3" fill="#FFD600"/>
    <rect x="56" y="14" width="17" height="17" rx="3" fill="#2c2c2e"/>
    <rect x="14" y="35" width="17" height="17" rx="3" fill="#2c2c2e"/>
    <rect x="35" y="35" width="38" height="17" rx="3" fill="#FFD600"/>
    <rect x="14" y="56" width="38" height="17" rx="3" fill="#FFD600"/>
    <rect x="56" y="56" width="17" height="17" rx="3" fill="#2c2c2e"/>
    <text x="90" y="44" font-family="system-ui,sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Biz</text>
    <text x="90" y="74" font-family="system-ui,sans-serif" font-size="30" font-weight="700" fill="#FFD600" letter-spacing="-0.5">Lock</text>
    <text x="190" y="52" font-family="system-ui,sans-serif" font-size="11" fill="#666" letter-spacing="1">BUSINESS</text>
    <text x="190" y="68" font-family="system-ui,sans-serif" font-size="11" fill="#666" letter-spacing="1">MANAGEMENT</text>
  </g>

  <!-- C-3: ライト背景版 -->
  <text x="680" y="68" font-family="system-ui,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">C-3: ライト背景版</text>
  <g transform="translate(638, 80)">
    <rect x="0" y="0" width="84" height="84" rx="18" fill="#FFD600"/>
    <rect x="12" y="12" width="18" height="18" rx="3" fill="#fff9c4"/>
    <rect x="34" y="12" width="18" height="18" rx="3" fill="#1C1C1E"/>
    <rect x="56" y="12" width="16" height="18" rx="3" fill="#fff9c4"/>
    <rect x="12" y="34" width="18" height="18" rx="3" fill="#fff9c4"/>
    <rect x="34" y="34" width="38" height="18" rx="3" fill="#1C1C1E"/>
    <rect x="12" y="56" width="38" height="16" rx="3" fill="#1C1C1E"/>
    <rect x="54" y="56" width="18" height="16" rx="3" fill="#fff9c4"/>
  </g>

  <!-- Divider -->
  <line x1="40" y1="195" x2="760" y2="195" stroke="#ddd8d0" stroke-width="1"/>

  <!-- ===== Section D ===== -->
  <text x="400" y="224" font-family="system-ui,sans-serif" font-size="12" fill="#999" text-anchor="middle" letter-spacing="2">D系 — ミニマル × シングルブロック × 鍵穴</text>

  <!-- D-1: シンプル横並び -->
  <text x="130" y="256" font-family="system-ui,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">D-1: ベーシック</text>
  <g transform="translate(58, 268)">
    <rect x="0" y="0" width="44" height="44" rx="8" fill="#FFD600"/>
    <circle cx="22" cy="17" r="7" fill="#1a1a1a"/>
    <rect x="18" y="21" width="8" height="14" rx="2" fill="#1a1a1a"/>
    <text x="54" y="30" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#1a1a1a" letter-spacing="-1">BizLock</text>
  </g>

  <!-- D-2: キャッチコピー付き -->
  <text x="130" y="360" font-family="system-ui,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">D-2: キャッチ付き</text>
  <g transform="translate(58, 372)">
    <rect x="0" y="0" width="44" height="44" rx="8" fill="#1a1a1a"/>
    <circle cx="22" cy="17" r="7" fill="#FFD600"/>
    <rect x="18" y="21" width="8" height="14" rx="2" fill="#FFD600"/>
    <text x="54" y="22" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#1a1a1a" letter-spacing="-0.5">BizLock</text>
    <text x="55" y="42" font-family="system-ui,sans-serif" font-size="11" fill="#888" letter-spacing="1.5">YOUR BUSINESS FOUNDATION</text>
  </g>

  <!-- D-3: スタック（縦） -->
  <text x="430" y="256" font-family="system-ui,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">D-3: 縦スタック（アプリ向き）</text>
  <g transform="translate(395, 268)">
    <rect x="0" y="0" width="70" height="70" rx="14" fill="#FFD600"/>
    <circle cx="35" cy="26" r="11" fill="#1a1a1a"/>
    <rect x="28" y="33" width="14" height="22" rx="3" fill="#1a1a1a"/>
    <text x="35" y="100" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="#1a1a1a" text-anchor="middle" letter-spacing="-0.5">BizLock</text>
  </g>

  <!-- D-4: ブロック+鍵穴の組み合わせ発展 -->
  <text x="670" y="256" font-family="system-ui,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">D-4: ブロック+鍵穴 融合</text>
  <g transform="translate(615, 268)">
    <!-- 4ブロックの中に鍵穴 -->
    <rect x="0"  y="0"  width="30" height="30" rx="5" fill="#FFD600"/>
    <rect x="34" y="0"  width="30" height="30" rx="5" fill="#FFD600"/>
    <rect x="0"  y="34" width="30" height="30" rx="5" fill="#FFD600"/>
    <rect x="34" y="34" width="30" height="30" rx="5" fill="#1a1a1a"/>
    <!-- 鍵穴を4つ目のブロックに -->
    <circle cx="49" cy="46" r="7" fill="#FFD600"/>
    <rect x="45" y="50" width="8" height="10" rx="2" fill="#FFD600"/>
    <text x="76" y="28" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#1a1a1a" letter-spacing="-0.5">Biz</text>
    <text x="76" y="56" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#1a1a1a" letter-spacing="-0.5">Lock</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="450" x2="760" y2="450" stroke="#ddd8d0" stroke-width="1"/>

  <!-- Usage examples -->
  <text x="400" y="478" font-family="system-ui,sans-serif" font-size="12" fill="#999" text-anchor="middle" letter-spacing="2">使用例イメージ</text>

  <!-- Favicon size C -->
  <text x="80" y="500" font-family="system-ui,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">favicon</text>
  <g transform="translate(64, 506)">
    <rect x="0" y="0" width="32" height="32" rx="6" fill="#1C1C1E"/>
    <rect x="4"  y="4"  width="7" height="7" rx="1" fill="#2c2c2e"/>
    <rect x="13" y="4"  width="7" height="7" rx="1" fill="#FFD600"/>
    <rect x="4"  y="13" width="16" height="7" rx="1" fill="#FFD600"/>
    <rect x="4"  y="22" width="7" height="6" rx="1" fill="#FFD600"/>
    <rect x="13" y="22" width="7" height="6" rx="1" fill="#2c2c2e"/>
  </g>

  <!-- White bg usage D -->
  <text x="250" y="500" font-family="system-ui,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">名刺・白背景</text>
  <g transform="translate(200, 508)">
    <rect x="0" y="0" width="26" height="26" rx="5" fill="#FFD600"/>
    <circle cx="13" cy="10" r="5" fill="#1a1a1a"/>
    <rect x="10" y="12" width="6" height="9" rx="1.5" fill="#1a1a1a"/>
    <text x="32" y="18" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#1a1a1a" letter-spacing="-0.5">BizLock</text>
  </g>

  <!-- Dark bg usage -->
  <text x="560" y="500" font-family="system-ui,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">ダーク背景</text>
  <rect x="460" y="505" width="200" height="50" rx="8" fill="#111"/>
  <g transform="translate(474, 517)">
    <rect x="0" y="0" width="26" height="26" rx="5" fill="#FFD600"/>
    <circle cx="13" cy="10" r="5" fill="#111"/>
    <rect x="10" y="12" width="6" height="9" rx="1.5" fill="#111"/>
    <text x="32" y="18" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#fff" letter-spacing="-0.5">BizLock</text>
  </g>

  <text x="400" y="590" font-family="system-ui,sans-serif" font-size="10" fill="#ccc" text-anchor="middle">BizLock logo concepts — draft v2</text>
</svg>
