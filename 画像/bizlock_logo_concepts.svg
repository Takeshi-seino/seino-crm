<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <rect width="800" height="520" fill="#f8f7f4"/>

  <!-- Label row -->
  <text x="130" y="38" font-family="system-ui,sans-serif" font-size="13" fill="#999" text-anchor="middle">A: イエロー×ブロック積み</text>
  <text x="400" y="38" font-family="system-ui,sans-serif" font-size="13" fill="#999" text-anchor="middle">B: ゴールド×3Dブロック</text>
  <text x="670" y="38" font-family="system-ui,sans-serif" font-size="13" fill="#999" text-anchor="middle">C: ダーク×アクセントイエロー</text>

  <!-- ========== A: Yellow stacked blocks ========== -->
  <g transform="translate(50, 60)">
    <!-- Block 3 (top) -->
    <rect x="28" y="0"  width="44" height="18" rx="3" fill="#FFD600"/>
    <!-- Block 2 (mid) -->
    <rect x="14" y="22" width="44" height="18" rx="3" fill="#FFC300"/>
    <!-- Block 1 (bot) -->
    <rect x="0"  y="44" width="44" height="18" rx="3" fill="#F0A500"/>
    <!-- Block 4 (bot right) -->
    <rect x="46" y="44" width="18" height="18" rx="3" fill="#FFD600"/>

    <text x="76" y="36" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">Biz</text>
    <text x="76" y="64" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#FFC300" letter-spacing="-0.5">Lock</text>
  </g>

  <!-- A tagline -->
  <text x="130" y="178" font-family="system-ui,sans-serif" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">YOUR BUSINESS FOUNDATION</text>

  <!-- ========== B: Gold 3D isometric block ========== -->
  <g transform="translate(310, 55)">
    <!-- Isometric block top face -->
    <polygon points="40,0 80,20 40,40 0,20" fill="#FFE34D"/>
    <!-- Isometric block left face -->
    <polygon points="0,20 40,40 40,68 0,48" fill="#E6AC00"/>
    <!-- Isometric block right face -->
    <polygon points="80,20 40,40 40,68 80,48" fill="#CCA000"/>
    <!-- Second block on top right (smaller) -->
    <polygon points="58,6 80,17 58,28 36,17" fill="#FFF176"/>

    <text x="90" y="38" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#1a1a1a" letter-spacing="-1">Biz</text>
    <text x="90" y="65" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#CC9900" letter-spacing="-1">Lock</text>
  </g>
  <text x="400" y="178" font-family="system-ui,sans-serif" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">YOUR BUSINESS FOUNDATION</text>

  <!-- ========== C: Dark bg + yellow accent ========== -->
  <g transform="translate(560, 55)">
    <!-- Dark container -->
    <rect x="0" y="0" width="220" height="90" rx="10" fill="#1C1C1E"/>
    <!-- Block grid (3x2 pattern, yellow accent on one) -->
    <rect x="12" y="12" width="20" height="20" rx="3" fill="#333"/>
    <rect x="36" y="12" width="20" height="20" rx="3" fill="#FFD600"/>
    <rect x="60" y="12" width="20" height="20" rx="3" fill="#333"/>
    <rect x="12" y="36" width="20" height="20" rx="3" fill="#333"/>
    <rect x="36" y="36" width="20" height="20" rx="3" fill="#333"/>
    <rect x="60" y="36" width="44" height="20" rx="3" fill="#FFD600"/>
    <rect x="12" y="60" width="44" height="20" rx="3" fill="#FFD600"/>
    <rect x="60" y="60" width="20" height="20" rx="3" fill="#333"/>
    <!-- Text -->
    <text x="92" y="42" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Biz</text>
    <text x="92" y="68" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#FFD600" letter-spacing="-0.5">Lock</text>
  </g>
  <text x="670" y="178" font-family="system-ui,sans-serif" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">YOUR BUSINESS FOUNDATION</text>

  <!-- Divider -->
  <line x1="40" y1="210" x2="760" y2="210" stroke="#e0ddd8" stroke-width="1"/>

  <!-- ========== D: Minimal single block + text ========== -->
  <text x="130" y="248" font-family="system-ui,sans-serif" font-size="13" fill="#999" text-anchor="middle">D: ミニマル×シングルブロック</text>
  <text x="400" y="248" font-family="system-ui,sans-serif" font-size="13" fill="#999" text-anchor="middle">E: ネイビー×イエロー（信頼感）</text>
  <text x="670" y="248" font-family="system-ui,sans-serif" font-size="13" fill="#999" text-anchor="middle">F: 鍵穴×ブロック（Lock直接表現）</text>

  <!-- D: Minimal -->
  <g transform="translate(72, 268)">
    <rect x="0" y="0" width="32" height="32" rx="5" fill="#FFD600"/>
    <rect x="10" y="10" width="12" height="12" rx="2" fill="#1a1a1a"/>
    <text x="42" y="22" font-family="system-ui,sans-serif" font-size="30" font-weight="800" fill="#1a1a1a" letter-spacing="-1">BizLock</text>
  </g>
  <text x="130" y="378" font-family="system-ui,sans-serif" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">YOUR BUSINESS FOUNDATION</text>

  <!-- E: Navy + Yellow -->
  <g transform="translate(295, 265)">
    <!-- 4 blocks in 2x2 -->
    <rect x="0"  y="0"  width="22" height="22" rx="3" fill="#1B3A6B"/>
    <rect x="26" y="0"  width="22" height="22" rx="3" fill="#FFD600"/>
    <rect x="0"  y="26" width="22" height="22" rx="3" fill="#FFD600"/>
    <rect x="26" y="26" width="22" height="22" rx="3" fill="#1B3A6B"/>
    <text x="58" y="22" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#1B3A6B" letter-spacing="-0.5">Biz</text>
    <text x="58" y="48" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#FFD600" letter-spacing="-0.5" paint-order="stroke" stroke="#1B3A6B" stroke-width="0">Lock</text>
  </g>
  <text x="400" y="378" font-family="system-ui,sans-serif" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">YOUR BUSINESS FOUNDATION</text>

  <!-- F: Keyhole + block -->
  <g transform="translate(568, 265)">
    <!-- Block shape with keyhole cutout -->
    <rect x="0" y="0" width="54" height="54" rx="8" fill="#FFD600"/>
    <!-- Keyhole: circle top -->
    <circle cx="27" cy="20" r="9" fill="#1a1a1a"/>
    <!-- Keyhole: rectangle bottom -->
    <rect x="22" y="26" width="10" height="18" rx="2" fill="#1a1a1a"/>
    <text x="64" y="28" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#1a1a1a" letter-spacing="-0.5">Biz</text>
    <text x="64" y="55" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#1a1a1a" letter-spacing="-0.5">Lock</text>
  </g>
  <text x="670" y="378" font-family="system-ui,sans-serif" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">YOUR BUSINESS FOUNDATION</text>

  <!-- Bottom note -->
  <text x="400" y="420" font-family="system-ui,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">どのパターンが近いですか？ → さらにブラッシュアップします</text>

  <!-- Watermark -->
  <text x="400" y="500" font-family="system-ui,sans-serif" font-size="10" fill="#ccc" text-anchor="middle">BizLock logo concepts — draft v1</text>
</svg>
